resource_id: slinky-bundle
name: Slinky Bundle
icon: https://raw.githubusercontent.com/juno-fx/Terra-Official-Plugins/refs/heads/main/plugins/slinky/assets/icon.svg
description: |
  A single install bundle for Slinky — Slurm HPC on Kubernetes.

  Installs cert-manager (prerequisite) and the full Slinky stack:
  slurm-operator CRDs, slurm-operator, and a Slurm cluster with
  CPU and GPU worker nodes.

category: Bundle
tags:
  - slurm
  - hpc
  - slinky
  - schedmd
  - cluster-level
fields:
  - name: cpu_replicas
    description: Number of CPU worker replicas
    required: true
    default: 2
    type: int
  - name: gpu_enabled
    description: Enable GPU worker pool
    required: true
    default: true
    type: boolean
  - name: gpu_replicas
    description: Number of GPU worker replicas
    required: true
    default: 1
    type: int
plugins:
  - plugin: Certificate Manager
    name: cert-manager
    values:
      chart_version: "v1.16.3"
  - plugin: Slinky
    name: slinky
    values:
      cpu_replicas:
        reference: cpu_replicas
      cpu_node_selector: "kubernetes.io/os=linux"
      gpu_enabled:
        reference: gpu_enabled
      gpu_replicas:
        reference: gpu_replicas
      gpu_node_selector: "nvidia.com/gpu.present=true"
