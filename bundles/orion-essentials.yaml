resource_id: orion-essentials
name: Orion Essentials
icon: https://github.com/juno-fx/Terra-Official-Plugins/blob/main/bundles/assets/orion-icon.png?raw=true
description: Orion Essentials is a collection of essential plugins for the Orion platform. Intended to help get new users up and running at first time start up.
category: Bundle
tags:
  - orion
  - juno
  - helios
  - argocd
  - first time setup
  - cluster-level
  - prometheus
  - dashboard
  - grafana
fields:
  - name: host
    description: The DNS name of your Genesis host
    required: true
  - name: path
    description: Connection URL sub path. i.e. `grafana.example.com/my/path/grafana`.
    required: true
  - name: username
    description: Grafana Admin username
    required: true
  - name: password
    description: Grafana Admin password
    required: true
plugins:
  - plugin: Helios
    name: helios-workstations
  - plugin: Prometheus Grafana stack
    name: kube-prometheus-stack
    values:
      host:
        reference: host
      path:
        reference: path
      username:
        reference: username
      password:
        reference: path
  - plugin: ArgoCD Dashboard
    name: argocd
    values:
      host:
        reference: host

