apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ .Release.Name }}-terra-metadata"
  labels:
    kuiper.juno-innovations.com/chart: "{{ .Release.Name }}-scripts-configmap"
  annotations:
    juno-innovations.com/workload: "Workspace"
data:
  chart: "{{ .Release.Name }}-scripts-configmap"
  description: "Claude Desktop streamed as a browser-accessible Linux workstation"
  fields: |
    - name: registry
      description: "Registry to pull the base desktop image from"
      type: string
      required: true
      default: "lscr.io/linuxserver"
    - name: repo
      description: "LinuxServer.io Webtop image to launch the desktop from"
      type: string
      required: true
      default: "webtop"
    - name: tag
      description: "Image tag / desktop environment flavor (e.g. ubuntu-xfce, ubuntu-kde)"
      type: string
      required: true
      default: "ubuntu-xfce"
    - name: gpu
      description: "Attach a GPU for hardware-accelerated rendering"
      type: boolean
      required: true
      default: false
    - name: storage_class
      description: "Storage class for the persistent Claude Desktop config/session volume"
      type: k8sStorageClass
      required: false
    - name: storage_size
      description: "Size of the persistent config/session volume"
      type: string
      required: true
      default: "5Gi"
    - name: timezone
      description: "Container timezone (TZ database name)"
      type: string
      required: false
      default: "Etc/UTC"
    - name: publicAccess
      description: "Allow public access (disable authentication)"
      type: boolean
      required: true
      default: false
    - name: icon
      description: icon
      default: "https://raw.githubusercontent.com/juno-fx/Terra-Official-Plugins/refs/heads/main/plugins/claude-desktop/assets/logo.png"
