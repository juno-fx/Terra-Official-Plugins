apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: "{{ .Values.name }}"
  annotations:
    juno-innovations.com/workload: "Application"
  labels:
    kuiper.juno-innovations.com/kuiper-instance: "{{ .Values.name }}"

spec:
  replicas: 1

  selector:
    matchLabels:
      kuiper.juno-innovations.com/kuiper-instance: "{{ .Values.name }}"

  template:
    metadata:
      labels:
        kuiper.juno-innovations.com/kuiper-instance: "{{ .Values.name }}"

    spec:
      hostname: "{{ .Values.name }}"
      containers:
        - name: nginx
          image: "{{ .Values.nginx_registry }}/{{ .Values.nginx_repo }}:{{ .Values.nginx_tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: nginx
          volumeMounts:
            - name: nginx
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
        - name: code-server
          imagePullPolicy: IfNotPresent
          image: "{{ .Values.registry }}/{{ .Values.repo }}:{{ .Values.tag }}"
          startupProbe:
            tcpSocket:
              port: 8443
            initialDelaySeconds: 2
            failureThreshold: 120  # start up totals 2 * 120 = 4 mins
            periodSeconds: 2
          livenessProbe:
            tcpSocket:
              port: 8443
            failureThreshold: 24
            periodSeconds: 5
          ports:
            - containerPort: 8443
              name: viewer
          env:
            - name: JUNO_PROJECT
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: JUNO_ENVIRONMENT
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: USER
              value: "{{ .Values.user }}"
            - name: HOME
              value: "/home/{{ .Values.user }}"
            - name: PUID
              value: "{{ .Values.puid }}"
            - name: PGID
              value: "{{ .Values.guid }}"
            {{- range .Values.env }}
            - name: {{ .name | quote }}
              value: {{ .value | quote }}
            {{- end }}
          volumeMounts:
            - name: tooling
              mountPath: /custom-cont-init.d/system.sh
              subPath: system.sh
              readOnly: true
            - name: config
              mountPath: /config
            {{- if .Values.volumeMounts }}
            {{- toYaml .Values.volumeMounts | nindent 12 }}
            {{- end }}
      volumes:
        - name: tooling
          configMap:
            name: "{{ .Values.name }}-tooling"
            defaultMode: 0755
        - name: nginx
          configMap:
            name: "{{ .Values.name }}-web-ide"
        - name: config
          persistentVolumeClaim:
            claimName: "{{ .Values.name }}-config"
        {{- if .Values.volumes }}
        {{- toYaml .Values.volumes | nindent 8 }}
        {{- end }}
