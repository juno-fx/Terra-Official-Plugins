resource_id: web-ide
name: web-ide
icon: https://raw.githubusercontent.com/juno-fx/Terra-Official-Plugins/refs/heads/main/plugins/web-ide/scripts/assets/logo.png
description: Web based IDE using code server
category: Development
tags:
- ide
- vscode
- cluster-level
- workload
fields: []
environment_variables:
  - name: PASSWORD
    description: Web UI login password. If neither PASSWORD nor HASHED_PASSWORD is set, the UI has no authentication.
  - name: SUDO_PASSWORD
    description: Enables sudo access in the integrated terminal, protected by this password.
  - name: DEFAULT_WORKSPACE
    description: Directory code-server opens by default when a session starts.
  - name: TZ
    description: Container timezone, e.g. "America/New_York".
