events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    server {
        listen 8080;
        absolute_redirect off;

        location = {{ .Values.prefix }} {
            return 301 {{ .Values.prefix }}/;
        }

        location {{ .Values.prefix }}/ {
            auth_request /auth;
            proxy_pass http://longhorn-frontend.longhorn-system.svc.cluster.local:80/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Accept-Encoding "";

            proxy_hide_header X-Frame-Options;
            proxy_hide_header Content-Security-Policy;

            sub_filter_once off;
            sub_filter_types text/html application/javascript text/javascript;
            sub_filter 'href="/' 'href="{{ .Values.prefix }}/';
            sub_filter 'src="/' 'src="{{ .Values.prefix }}/';
        }

        location = /auth {
            internal;
            set $auth_upstream "http://genesis.{{ .Release.Namespace }}.svc.cluster.local:3000/api/auth-service/{{ .Release.Name }}/";
            proxy_pass $auth_upstream;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header Upgrade "";
            proxy_set_header Connection "";
        }
    }
}
