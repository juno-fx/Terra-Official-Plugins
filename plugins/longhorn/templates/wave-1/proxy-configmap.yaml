apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-longhorn-proxy-config
  namespace: longhorn-system
  annotations:
    argocd.argoproj.io/sync-wave: "1"
data:
  nginx.conf: |
    events {
        worker_connections 1024;
    }

    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;
        sendfile on;
        keepalive_timeout 65;

        server {
            listen 8080;

            location = {{ .Values.prefix }} {
                return 301 $scheme://$host$request_uri/;
            }

            location {{ .Values.prefix }}/ {
                proxy_pass http://longhorn-frontend.longhorn-system.svc.cluster.local:80/;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header Accept-Encoding "";

                sub_filter_once off;
                sub_filter_types text/html application/javascript text/javascript;
                sub_filter 'href="/' 'href="{{ .Values.prefix }}/';
                sub_filter 'src="/' 'src="{{ .Values.prefix }}/';
                sub_filter '"/v1/' '"{{ .Values.prefix }}/v1/';
                sub_filter '"/v2/' '"{{ .Values.prefix }}/v2/';
            }
        }
    }
