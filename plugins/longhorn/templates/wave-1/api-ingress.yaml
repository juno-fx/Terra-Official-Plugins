apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: "{{ .Release.Name }}-longhorn-api-ingress"
  namespace: longhorn-system
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/auth-url: "http://genesis.{{ .Release.Namespace }}.svc.cluster.local:3000/api/auth-service/{{ .Release.Name }}/"
    nginx.ingress.kubernetes.io/auth-signin: /unauthorized/
spec:
  ingressClassName: nginx
  rules:
    - host: "{{ .Values.host }}"
      http:
        paths:
          # Longhorn API paths - pass through unchanged, longhorn-frontend proxies to backend
          - path: "/v1(/.*)?$"
            pathType: ImplementationSpecific
            backend:
              service:
                name: longhorn-frontend
                port:
                  number: 80
          - path: "/v2(/.*)?$"
            pathType: ImplementationSpecific
            backend:
              service:
                name: longhorn-frontend
                port:
                  number: 80
          # Root-level static assets - browser requests these at / due to absolute paths in HTML
          - path: "/[^/]+\\.(css|js|ico|png|woff|woff2|ttf|eot|svg|map)$"
            pathType: ImplementationSpecific
            backend:
              service:
                name: longhorn-frontend
                port:
                  number: 80
