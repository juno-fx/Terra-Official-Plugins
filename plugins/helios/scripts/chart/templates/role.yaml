{{- if .Values.enableAPI }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: helios
  namespace: {{ .Release.Namespace }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["serviceaccounts/token"]
    resourceNames: ["helios"]
    verbs: ["create"]
{{- end }}
