apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.name }}-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/auth-url: "http://hubble.{{ .Release.Namespace }}.svc.cluster.local:3000/api/auth-workstation/{{ .Values.name }}/"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
spec:
  rules:
    - host: {{ .Values.host }}
      http:
        paths:
          - path: "/polaris/{{ .Values.name }}/"
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.name }}
                port:
                  number: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.name }}-view-only-ingress
  annotations:
    kuiper.juno-innovations.com/ingress-extras: "/polaris/{{ .Values.name }}/#shared"
spec:
  rules:
    - host: "{{ .Values.host }}"
      http:
        paths:
          - path: "/polaris/{{ .Values.name }}/shared"
            pathType: Prefix
            backend:
              service:
                name: "shared-instance"
                port:
                  number: 80