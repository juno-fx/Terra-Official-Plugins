{{- if .Values.enableAPI }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: helios
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: helios
subjects:
  - kind: ServiceAccount
    name: helios
    namespace: {{ .Release.Namespace }}
{{- end }}
