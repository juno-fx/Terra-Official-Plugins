apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ .Release.Name }}-terra-metadata"
  labels:
    kuiper.juno-innovations.com/chart: "{{ .Release.Name }}-scripts-configmap"
  annotations:
    juno-innovations.com/workload: "Application"
data:
  chart: "{{ .Release.Name }}-scripts-configmap"
  description: "Helios deployment with desktop streaming"
  fields: |
    - name: icon
      default: "https://raw.githubusercontent.com/juno-fx/Terra-Official-Plugins/refs/heads/main/plugins/helios/scripts/assets/helios-icon.png"
    - name: gpu
      description: "Use a GPU"
      type: boolean
      required: true
    - name: registry
      description: "Registry to pull the image from"
      type: string
      required: true
      default: "junoinnovations"
    - name: repo
      description: "Repository to pull the image from"
      type: string
      required: true
      default: "helios"
    - name: tag
      description: "Tag to pull the image from"
      type: string
      required: true
      default: "unstable-rocky-9"
    - name: enableAPI
      description: "Enable system-to-system communication"
      type: boolean
      required: true
      default: false
    - name: rheaRepo
      description: "Repo to pull the rhea image from"
      type: string
      required: true
      default: "rhea"
    - name: rheaTag      
      description: "Tag to pull the rhea image from"
      type: string
      required: true
      default: "v1.2.3"
    - name: ingressClassName
      description: "Ingress class name. Leave empty for cluster default."
      type: string
      required: false
      default: ""
    - name: nginx_registry
      description: "Registry to pull the nginx sidecar image from"
      type: string
      required: true
      default: "docker.io"
    - name: nginx_repo
      description: "Repository to pull the nginx sidecar image from"
      type: string
      required: true
      default: "nginx"
    - name: nginx_tag
      description: "Tag to pull the nginx sidecar image from"
      type: string
      required: true
      default: "alpine"
    - name: publicAccess
      description: "Allow public access (disable authentication)"
      type: boolean
      required: true
      default: false
