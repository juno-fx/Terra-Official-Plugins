apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ .Release.Name }}-terra-metadata"
  labels:
    kuiper.juno-innovations.com/chart: "{{ .Release.Name }}-scripts-configmap"
data:
  chart: "{{ .Release.Name }}-scripts-configmap"
  description: "Helios deployment with desktop streaming"
  fields: |
    - name: icon
      default: "https://raw.githubusercontent.com/juno-fx/Terra-Official-Plugins/refs/heads/main/plugins/helios/scripts/assets/helios-icon.png"
    - name: gpu
      description: "Use a GPU"
      type: boolean
      required: true
    - name: registry
      description: "Registry to pull the image from"
      type: string
      required: true
      default: "junoinnovations"
    - name: repo
      description: "Repository to pull the image from"
      type: string
      required: true
      default: "helios"
    - name: tag
      description: "Tag to pull the image from"
      type: string
      required: true
      default: "unstable-rocky-9"
    - name: enableAPI
      description: "Enable system-to-system communication"
      type: boolean
      required: true
      default: false
    - name: rheaRepo
      description: "Repo to pull the rhea image from"
      type: string
      required: true
      default: "rhea"
    - name: rheaTag      
      description: "Tag to pull the rhea image from"
      type: string
      required: true
      default: "v1.2.3"
    - name: publicAccess
      description: "Allow public access (disable authentication)"
      type: boolean
      required: true
      default: false
  environment_variables: |
    - name: PASSWORD
      description: Password set for the user to log into the desktop session directly.
    - name: SUDO
      description: Grants the user sudo access on the container.
    - name: SELKIES_FRAMERATE
      description: Streaming framerate for the desktop session, as a range (e.g. "15-60") or fixed value (e.g. "30").
    - name: DISABLE_VGL
      description: Disables the VirtualGL wrapper around the desktop session; apps needing it must be launched manually via vglrun.
