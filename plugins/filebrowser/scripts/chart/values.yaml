# Kuiper-injected standard values — do not remove
name: filebrowser
user:
group:
cpu: "512m"
memory: "256Mi"
cpuLimit: null
memoryLimit: null
idx: 0
guid: 0
puid: 0
host:
pullSecret:
session:
volumeMounts: []
volumes: []
env:
  - name: JUNO
    value: "true"
selector:
plugins: []
_kuiper:

# Filebrowser settings
workspace: ""
root: "/data"
registry: "docker.io"
repo: "filebrowser/filebrowser"
tag: "latest"
ingressClassName: ""
nginx_registry: "docker.io"
nginx_repo: "nginx"
nginx_tag: "alpine"
ingressNamespace: "ingress-nginx"
dataPersistent: false
storageClass: ""
storageSize: "10Gi"
