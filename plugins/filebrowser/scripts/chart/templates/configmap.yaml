apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ .Release.Name }}-config"
  labels:
    kuiper.juno-innovations.com/chart: "{{ .Release.Name }}-scripts-configmap"
data:
  config.yaml: |
    server:
      baseURL: "/filebrowser"
      address: "0.0.0.0"
      port: 8080
      root: "/data"
    authentication:
      noauth:
        enabled: true
    database: "/data/filebrowser.db"
