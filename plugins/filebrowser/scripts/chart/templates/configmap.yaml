apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ .Release.Name }}-config"
  labels:
    kuiper.juno-innovations.com/kuiper-instance: "{{ .Values.name }}"
    kuiper.juno-innovations.com/chart: "{{ .Release.Name }}-scripts-configmap"
data:
  config.yaml: |
    port: "8081"
    address: "0.0.0.0"
    root: "/data"
    baseURL: "/plugin/{{ .Values.name }}"
    log: "stdout"
    database: "/data/filebrowser.db"
    noauth: true
    cacheDir: "/tmp/cache"
