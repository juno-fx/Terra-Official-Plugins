apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: "{{ .Values.name }}"
  annotations:
    kuiper.juno-innovations.com/actions: "stop"
    juno-innovations.com/workload: "Application"
  labels:
    juno-innovations.com/app: "filebrowser"
    juno-innovations.com/user: "{{ .Values.user }}"
    juno-innovations.com/workstation: "{{ .Values.name }}"

spec:
  replicas: 1
  selector:
    matchLabels:
      juno-innovations.com/workstation: "{{ .Values.name }}"
  template:
    metadata:
      labels:
        kuiper.juno-innovations.com/kuiper-instance: "{{ .Values.name }}"
        juno-innovations.com/app: filebrowser
        juno-innovations.com/user: "{{ .Values.user }}"
        juno-innovations.com/workstation: "{{ .Values.name }}"
      annotations:
        # This will block the cluster autoscaler from evicting this pod in the case
        # it can move to a cheaper instance. This does come at a cost, but ideally
        # this should stop from a pod getting ripped out from under existing users.
        cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
      hostname: "{{ .Values.name }}"

      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: juno-innovations.com/workstation
                    operator: In
                    values:
                      - "true"

      tolerations:
        - key: "juno-innovations.com/workstation"
          operator: "Exists"
          effect: "NoSchedule"

      {{- if .Values.pullSecret }}
      imagePullSecrets:
        - name: "{{ .Values.pullSecret }}"
      {{- end }}

      containers:
        - name: filebrowser
          image: "{{ .Values.registry }}/{{ .Values.repo }}:{{ .Values.tag }}"
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              memory: "{{ .Values.memory }}"
              cpu: "{{ .Values.cpu }}"
            {{- if or .Values.memoryLimit .Values.cpuLimit }}
            limits:
              {{- if .Values.cpuLimit }}
              cpu: "{{ .Values.cpuLimit }}"
              {{- end }}
              {{- if .Values.memoryLimit }}
              memory: "{{ .Values.memoryLimit }}"
              {{- end }}
            {{- end }}
          ports:
            - containerPort: 8080
              name: filebrowser
          env:
            - name: FILEBROWSER_CONFIG
              value: "/config/config.yaml"
            - name: FILEBROWSER_LOGFILE
              value: "/dev/stdout"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: filebrowser-data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
            {{- if .Values.volumeMounts }}
            {{- toYaml .Values.volumeMounts | nindent 12 }}
            {{- end }}

      volumes:
        - name: config
          configMap:
            name: "{{ .Release.Name }}-config"
        - name: filebrowser-data
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        {{- if .Values.volumes }}
        {{- toYaml .Values.volumes | nindent 8 }}
        {{- end }}
