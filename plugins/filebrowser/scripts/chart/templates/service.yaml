apiVersion: v1
kind: Service
metadata:
  name: "{{ .Release.Name }}"
  labels:
    kuiper.juno-innovations.com/kuiper-instance: "{{ .Values.name }}"
    kuiper.juno-innovations.com/chart: "{{ .Release.Name }}-scripts-configmap"
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    juno-innovations.com/workstation: "{{ .Values.name }}"
