apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ .Release.Name }}-terra-metadata"
  labels:
    kuiper.juno-innovations.com/chart: "{{ .Release.Name }}-scripts-configmap"
data:
  chart: "{{ .Release.Name }}-scripts-configmap"
  description: "Web-based file browser with drag-and-drop upload. Mount workspace volumes to browse and upload files."
  fields: |
    - name: workspace
      description: "Optional target workspace name. If set, the URL becomes /filebrowser/<workspace>. Otherwise uses the workload name."
      required: false
      type: string
    - name: registry
      description: "Container registry"
      required: true
      default: "docker.io"
    - name: repo
      description: "Container image repository"
      required: true
      default: "filebrowser/filebrowser"
    - name: tag
      description: "Container image tag"
      required: true
      default: "latest"
    - name: ingressNamespace
      description: "Ingress controller namespace. Default: ingress-nginx"
      required: false
      default: "ingress-nginx"
    - name: cpu
      description: "CPU request"
      required: true
      default: "512m"
    - name: memory
      description: "Memory request"
      required: true
      default: "256Mi"
    - name: dataPersistent
      description: "Enable persistent storage for uploaded files and database. When enabled, creates a PVC. Default: false (ephemeral emptyDir)."
      required: false
      type: boolean
      default: "false"
    - name: storageClass
      description: "Storage class for the data PVC. Leave empty for cluster default."
      required: false
      type: string
      default: ""
    - name: storageSize
      description: "Persistent volume size for uploaded files and database."
      required: false
      default: "10Gi"
    - name: ingressClassName
      description: "Ingress class name. Leave empty for cluster default."
      type: string
      required: false
      default: ""
    - name: nginx_registry
      description: "Registry to pull the nginx sidecar image from"
      type: string
      required: true
      default: "docker.io"
    - name: nginx_repo
      description: "Repository to pull the nginx sidecar image from"
      type: string
      required: true
      default: "nginx"
    - name: nginx_tag
      description: "Tag to pull the nginx sidecar image from"
      type: string
      required: true
      default: "alpine"
    - name: root
      description: "Root filesystem path visible in FileBrowser. Set to '/' to browse the entire container filesystem, or '/data' to restrict to the data volume only."
      required: false
      type: string
      default: "/data"
    - name: icon
      default: "https://github.com/juno-fx/Terra-Official-Plugins/blob/main/plugins/filebrowser/scripts/assets/icon.png"

