description: >
  JavaScript (Node.js) runtime environment. Clone a git repo, install
  dependencies, and run your Node.js application. Configurable via env vars:
  git_url (repo to clone), git_ref (branch/tag), build_command (e.g. npm install), run_command (e.g. node main.js), port,
  and network_mode (ingress-auth/ingress-noauth/clusterip/nodeport).
