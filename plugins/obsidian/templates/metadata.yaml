apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ .Release.Name }}-terra-metadata"
  labels:
    kuiper.juno-innovations.com/chart: "{{ .Release.Name }}-scripts-configmap"
  annotations:
    juno-innovations.com/workload: "Application"
data:
  chart: "{{ .Release.Name }}-scripts-configmap"
  description: "Obsidian knowledge base and note-taking"
  fields: |
    - name: icon
      default: "https://raw.githubusercontent.com/juno-fx/Terra-Official-Plugins/refs/heads/main/plugins/obsidian/scripts/assets/obsidian.png"
    - name: registry
      description: "Container registry"
      type: string
      required: true
      default: "lscr.io"
    - name: repo
      description: "Image repository"
      type: string
      required: true
      default: "linuxserver/obsidian"
    - name: tag
      description: "Image tag"
      type: string
      required: true
      default: "latest"
    - name: vault_storage_class
      description: "Storage class for your Obsidian vault. Data persists across restarts."
      type: k8sStorageClass
      required: true
    - name: vault_size
      description: "Storage size for your vault (e.g. 10Gi)."
      type: string
      required: true
      default: "10Gi"
