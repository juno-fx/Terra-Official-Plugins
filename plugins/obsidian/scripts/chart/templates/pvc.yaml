apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: "{{ .Values.name }}-vault"
  annotations:
    kuiper.juno-innovations.com/delete-protection: "true"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: "{{ .Values.vault_storage_class }}"
  resources:
    requests:
      storage: "{{ .Values.vault_size }}"
