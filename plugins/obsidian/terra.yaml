resource_id: obsidian
name: Obsidian
icon: https://github.com/juno-fx/Terra-Official-Plugins/blob/main/plugins/obsidian/scripts/assets/obsidian.png?raw=true
description: Obsidian is a powerful knowledge base and note-taking application that works on top of a local folder of plain text Markdown files.
category: Productivity
tags:
  - obsidian
