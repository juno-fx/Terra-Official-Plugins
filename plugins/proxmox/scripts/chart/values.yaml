# Kuiper-injected standard values — do not remove
name: proxmox
user:
group:
cpu: "2"
memory: "2Gi"
cpuLimit: null
memoryLimit: null
idx: 0
guid: 0
puid: 0
host:
pullSecret:
session:
volumeMounts: []
volumes: []
env:
  - name: JUNO
    value: "true"
selector:
plugins: []
_kuiper:

# Nginx sidecar image
nginx_registry: docker.io
nginx_repo: nginx
nginx_tag: "alpine"

# User-facing fields from metadata.yaml
icon: https://raw.githubusercontent.com/juno-fx/Terra-Official-Plugins/refs/heads/main/plugins/proxmox/assets/logo.png
registry: docker.io
repo: dockurr/proxmox
# Pinned: docker.io/dockurr/proxmox:latest currently points at 9.2.4, which
# has a `set -u` bug in network.sh (references unset $KERNEL) that
# crashloops every container. 9.2.3 is the last known-good build.
tag: "9.2.3"
password: proxmox
debug: "N"
data_size: 32Gi
config_size: 1Gi
persistence_storage_class:
