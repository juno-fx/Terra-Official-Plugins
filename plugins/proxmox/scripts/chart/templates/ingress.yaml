{{- if not (eq .Values._juno_gateway_api true) }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.name }}-proxmox
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/auth-url: "http://hubble.{{ .Release.Namespace }}.svc.cluster.local:3000/api/auth-workstation/{{ .Values.name }}/"
    # Long-lived VNC/xterm.js console websockets.
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
spec:
  rules:
    - host: {{ .Values.host }}
      http:
        paths:
          - path: "{{ .Values.prefix }}/"
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.name }}-proxmox
                port:
                  number: 3000
{{- end }}
