resource_id: proxmox
name: Proxmox VE
icon: https://raw.githubusercontent.com/juno-fx/Terra-Official-Plugins/refs/heads/main/plugins/proxmox/assets/logo.png
description: |
  Proxmox VE hypervisor node running as a workload (via dockur/proxmox).
  Launch a full Proxmox Virtual Environment with KVM acceleration, LXC
  support, and a pre-configured NAT bridge — accessible through the
  Proxmox web UI. Requires nodes with KVM support (/dev/kvm).
category: Infrastructure
tags:
  - cluster-level
  - workload
  - proxmox
  - virtualization
  - hypervisor
  - vm
  - kvm
fields: []
# dockurr/proxmox only documents PASSWORD, which is already exposed as the
# `password` launch field above — no additional custom env vars are documented upstream.
environment_variables: []
