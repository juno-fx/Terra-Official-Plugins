apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-terra-metadata
  annotations:
    juno-innovations.com/workload: "Server"  # mark this as a workload and it's type for the frontend UI
  labels:
    kuiper.juno-innovations.com/chart: "{{ .Release.Name }}-scripts-configmap"
data:
  chart: "{{ .Release.Name }}-scripts-configmap"
  description: "Proxmox VE hypervisor node with KVM acceleration and LXC support"
  fields: |
    - name: icon
      description: icon
      default: https://raw.githubusercontent.com/juno-fx/Terra-Official-Plugins/refs/heads/main/plugins/proxmox/assets/logo.png
    - name: registry
      description: Registry to pull the image from
      type: string
      required: true
      default: docker.io
    - name: repo
      description: Repository to pull the image from
      type: string
      required: true
      default: dockurr/proxmox
    - name: tag
      description: Tag to pull the image from
      type: string
      required: true
      default: 9.2.3
    - name: password
      description: Password for the Proxmox web UI 'root' user
      type: string
      required: true
      default: proxmox
    - name: debug
      description: Enable debug logging (Y/N)
      type: string
      required: false
      default: "N"
    - name: data_size
      description: "Persistent volume size for the Proxmox storage pool (/var/lib/vz) — disk images, ISOs, backups (e.g. 32Gi)."
      type: string
      required: false
      default: "32Gi"
    - name: config_size
      description: "Persistent volume size for the Proxmox cluster configuration (/var/lib/pve-cluster)."
      type: string
      required: false
      default: "1Gi"
    - name: persistence_storage_class
      description: "Storage class for the Proxmox persistent volumes."
      type: k8sStorageClass
      required: false
    - name: nginx_registry
      description: "Container registry for the nginx reverse proxy sidecar"
      type: string
      required: false
      default: docker.io
    - name: nginx_repo
      description: "Container repository for the nginx reverse proxy sidecar"
      type: string
      required: false
      default: nginx
    - name: nginx_tag
      description: "Container tag for the nginx reverse proxy sidecar"
      type: string
      required: false
      default: "alpine"
  # dockurr/proxmox only documents PASSWORD, which is already exposed as the
  # `password` launch field above — no additional custom env vars are documented upstream.
  environment_variables: |
    []
