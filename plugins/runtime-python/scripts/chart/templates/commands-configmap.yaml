apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ .Values.name }}-runtime-commands"
data:
  init-clone.sh: |
    #!/bin/bash
    set -e
    set -x

    WORK_ROOT="/workspace"
    if [ -n "$GIT_URL" ]; then
      rm -rf /workspace/* /workspace/.[!.]* 2>/dev/null || true
      git clone --branch "$GIT_REF" "$GIT_URL" /workspace
    elif [ -n "$SOURCE_PATH" ]; then
      WORK_ROOT="$SOURCE_PATH"
    fi

    if [ -n "$WORK_DIR" ]; then
      case "$WORK_DIR" in
        /*) TARGET_DIR="$WORK_DIR" ;;
        *)  TARGET_DIR="$WORK_ROOT/$WORK_DIR" ;;
      esac
    else
      TARGET_DIR="$WORK_ROOT"
    fi
    mkdir -p "$TARGET_DIR"
    python -m venv "$WORK_ROOT/.venv"
    if [ -n "$BUILD_COMMAND" ]; then
      source "$WORK_ROOT/.venv/bin/activate"
      cd "$TARGET_DIR" && eval "$BUILD_COMMAND"
    fi

  run-app.sh: |
    #!/bin/bash
    set -e
    set -x

    WORK_ROOT="/workspace"
    [ -n "$SOURCE_PATH" ] && [ -z "$GIT_URL" ] && WORK_ROOT="$SOURCE_PATH"

    source "$WORK_ROOT/.venv/bin/activate"
    if [ -n "$WORK_DIR" ]; then
      case "$WORK_DIR" in
        /*) TARGET_DIR="$WORK_DIR" ;;
        *)  TARGET_DIR="$WORK_ROOT/$WORK_DIR" ;;
      esac
    else
      TARGET_DIR="$WORK_ROOT"
    fi
    cd "$TARGET_DIR"
    eval "$RUN_COMMAND"
