apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ .Values.name }}-runtime-commands"
data:
  init-clone.sh: |
    #!/bin/bash
    set -e
    set -x
    git clone --branch "$GIT_REF" "$GIT_URL" /workspace
    if [ -n "$WORK_DIR" ]; then
      case "$WORK_DIR" in
        /*) TARGET_DIR="$WORK_DIR" ;;
        *)  TARGET_DIR="/workspace/$WORK_DIR" ;;
      esac
    else
      TARGET_DIR="/workspace"
    fi
    mkdir -p "$TARGET_DIR"
    python -m venv /workspace/.venv
    if [ -n "$BUILD_COMMAND" ]; then
      cd "$TARGET_DIR" && /workspace/.venv/bin/pip install --upgrade pip && eval "$BUILD_COMMAND"
    fi

  run-app.sh: |
    #!/bin/bash
    set -e
    set -x
    source /workspace/.venv/bin/activate
    if [ -n "$WORK_DIR" ]; then
      case "$WORK_DIR" in
        /*) TARGET_DIR="$WORK_DIR" ;;
        *)  TARGET_DIR="/workspace/$WORK_DIR" ;;
      esac
    else
      TARGET_DIR="/workspace"
    fi
    cd "$TARGET_DIR"
    eval "$RUN_COMMAND"
