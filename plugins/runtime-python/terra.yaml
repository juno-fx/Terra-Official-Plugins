resource_id: runtime-python
name: Runtime Python
icon: https://raw.githubusercontent.com/juno-fx/Terra-Official-Plugins/main/plugins/runtime-python/assets/icon.svg
description: >
  Python runtime environment. Clone a git repo, build, and run your Python
  application. Configurable via env vars: git_url (repo to clone), git_ref
   (branch/tag), build_command (e.g. pip install),
  run_command (e.g. python app.py), port, and network_mode
  (ingress-auth/ingress-noauth/clusterip/nodeport).
category: Development
tags:
  - cluster-level
  - runtime
  - python
