apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-terra-metadata
  annotations:
    juno-innovations.com/workload: "Server"  # mark this as a workload and it's type for the frontend UI
  labels:
    kuiper.juno-innovations.com/chart: "{{ .Release.Name }}-scripts-configmap"
data:
  chart: "{{ .Release.Name }}-scripts-configmap"
  description: "Proxmox VE hypervisor node with KVM acceleration and LXC support"
  fields: |
    - name: icon
      description: icon
      default: https://github.com/dockur/proxmox/raw/master/.github/logo.png
    - name: registry
      description: Registry to pull the image from
      type: string
      required: true
      default: docker.io
    - name: repo
      description: Repository to pull the image from
      type: string
      required: true
      default: dockurr/proxmox
    - name: tag
      description: Tag to pull the image from
      type: string
      required: true
      default: latest
    - name: password
      description: Password for the Proxmox web UI 'root' user
      type: string
      required: true
      default: proxmox
    - name: gpu
      description: Attach a GPU to the Proxmox node (requires the nvidia runtime class)
      type: boolean
      required: false
      default: false
    - name: data_size
      description: "Persistent volume size for the Proxmox storage pool (/var/lib/vz) — disk images, ISOs, backups (e.g. 32Gi)."
      type: string
      required: false
      default: "32Gi"
    - name: config_size
      description: "Persistent volume size for the Proxmox cluster configuration (/var/lib/pve-cluster)."
      type: string
      required: false
      default: "1Gi"
    - name: persistence_storage_class
      description: "Storage class for the Proxmox persistent volumes."
      type: k8sStorageClass
      required: false
