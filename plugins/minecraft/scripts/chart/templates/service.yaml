apiVersion: v1
kind: Service
metadata:
  name: "{{ .Release.Name }}-game"
spec:
  type: NodePort
  selector:
    kuiper.juno-innovations.com/kuiper-instance: "{{ .Release.Name }}"
  ports:
    - port: 25565
      targetPort: 25565
      protocol: TCP
      name: game
---
apiVersion: v1
kind: Service
metadata:
  name: "{{ .Release.Name }}-rcon"
spec:
  type: NodePort
  selector:
    kuiper.juno-innovations.com/kuiper-instance: "{{ .Release.Name }}"
  ports:
    - port: 25575
      targetPort: 25575
      protocol: TCP
      name: rcon