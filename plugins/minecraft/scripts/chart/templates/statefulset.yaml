apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: "{{ .Release.Name }}"
  annotations:
    juno-innovations.com/workload: "Server"
spec:
  replicas: 1
  selector:
    matchLabels:
      kuiper.juno-innovations.com/kuiper-instance: "{{ .Release.Name }}"
  template:
    metadata:
      labels:
        kuiper.juno-innovations.com/kuiper-instance: "{{ .Release.Name }}"
    spec:
      automountServiceAccountToken: false
      containers:
        - name: minecraft
          imagePullPolicy: IfNotPresent
          image: "{{ .Values.registry }}/{{ .Values.repo }}:{{ .Values.tag }}"
          resources:
            requests:
              memory: "{{ .Values.memory }}"
              cpu: "{{ .Values.cpu }}"
            limits:
            {{- if .Values.cpuLimit }}
              cpu: "{{ .Values.cpuLimit }}"
            {{- end }}
            {{- if .Values.memoryLimit }}
              memory: "{{ .Values.memoryLimit }}"
            {{- end }}
          ports:
            - containerPort: 25565
              name: game
            - containerPort: 25575
              name: rcon
          env:
            - name: EULA
              value: "TRUE"
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: "{{ .Release.Name }}"
