apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ .Release.Name }}-terra-metadata"
  labels:
    kuiper.juno-innovations.com/chart: "{{ .Release.Name }}-scripts-configmap"
  annotations:
    juno-innovations.com/workload: "Workspace"
data:
  chart: "{{ .Release.Name }}-scripts-configmap"
  description: "n8n is an open-source workflow automation tool that allows you to connect various applications and services to automate tasks and processes. It provides a visual interface for creating workflows, making it easy to integrate different systems without the need for coding. With n8n, you can automate repetitive tasks, streamline data processing, and enhance productivity by connecting APIs, databases, and other services in a seamless manner."
  fields: |
    - name: icon
      default: "https://raw.githubusercontent.com/juno-fx/Terra-Official-Plugins/refs/heads/main/plugins/n8n/scripts/assets/icon.png"
    - name: registry
      description: "Registry to pull the image from"
      type: string
      required: true
      default: "docker.n8n.io/n8nio"
    - name: repo
      description: "Repository to pull the image from"
      type: string
      required: true
      default: "n8n"
    - name: tag
      description: "Tag to pull the image from"
      type: string
      required: true
      default: "latest"
    - name: webtop_registry
      description: "Registry to pull the webtop image from"
      type: string
      required: true
      default: "lscr.io/linuxserver"
    - name: webtop_repo
      description: "Repository to pull the webtop image from"
      type: string
      required: true
      default: "chromium"
    - name: webtop_tag
      description: "Tag to pull the webtop image from"
      type: string
      required: true
      default: "latest"
    - name: timezone
      description: "Timezone to use for the n8n instance"
      type: string
      required: true
      default: "America/New_York"
    - name: storage_class
      description: Storage class to use for the game disk
      required: true
      type: k8sStorageClass
    - name: storage_size
      description: Storage size to use for the game disk
      default: 10Gi
      required: true
      type: string