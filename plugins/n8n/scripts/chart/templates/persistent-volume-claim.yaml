apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: "{{ .Release.Name }}"
  annotations:
    kuiper.juno-innovations.com/delete-protection: "true"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.storage_class }}
  resources:
    requests:
      storage: {{ .Values.storage_size }}
