apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: "{{ .Release.Name }}"
  annotations:
    juno-innovations.com/workload: "Workspace"
spec:
  replicas: 1
  selector:
    matchLabels:
      kuiper.juno-innovations.com/kuiper-instance: "{{ .Release.Name }}"
  template:
    metadata:
      labels:
        kuiper.juno-innovations.com/kuiper-instance: "{{ .Release.Name }}"
    spec:
      automountServiceAccountToken: false
      containers:
        - name: n8n
          imagePullPolicy: IfNotPresent
          image: "{{ .Values.registry }}/{{ .Values.repo }}:{{ .Values.tag }}"
          resources:
            requests:
              memory: "{{ .Values.memory }}"
              cpu: "{{ .Values.cpu }}"
            limits:
            {{- if .Values.cpuLimit }}
              cpu: "{{ .Values.cpuLimit }}"
            {{- end }}
            {{- if .Values.memoryLimit }}
              memory: "{{ .Values.memoryLimit }}"
            {{- end }}
          ports:
            - containerPort: 5678
              name: ui
          env:
            - name: GENERIC_TIMEZONE
              value: "{{ .Values.timezone }}"
            - name: TZ
              value: "{{ .Values.timezone }}"
            - name: N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS
              value: "true"
            - name: N8N_RUNNERS_ENABLED
              value: "true"
            - name: N8N_PATH
              value: "/polaris/{{ .Values.name }}/"
            {{- range .Values.env }}
            - name: {{ .name | quote }}
              value: {{ .value | quote }}
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: /home/node/.n8n
        - name: nginx
          imagePullPolicy: IfNotPresent
          image: "{{ .Values.nginx_registry }}/{{ .Values.nginx_repo }}:{{ .Values.nginx_tag }}"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: nginx-config
          configMap:
            name: {{ .Release.Name }}-nginx
        - name: data
          persistentVolumeClaim:
            claimName: "{{ .Release.Name }}"
