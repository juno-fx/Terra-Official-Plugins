apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{ .Release.Name }}-argocd-proxy"
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: "{{ .Release.Name }}-argocd-proxy"
  template:
    metadata:
      labels:
        app: "{{ .Release.Name }}-argocd-proxy"
    spec:
      containers:
        - name: proxy
          image: "{{ .Values.nginx_registry }}/{{ .Values.nginx_repo }}:{{ .Values.nginx_tag }}"
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
      volumes:
        - name: nginx-config
          configMap:
            name: "{{ .Release.Name }}-argocd-proxy-config"
