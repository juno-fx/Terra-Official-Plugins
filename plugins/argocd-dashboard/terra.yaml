resource_id: argocd-dashboard
name: ArgoCD Dashboard
icon: https://github.com/juno-fx/Terra-Official-Plugins/blob/main/plugins/argocd-dashboard/assets/logo.png?raw=true
description: Sets up an embedded ArgoCD dashboard available directly in your Genesis instance. This plugin works exclusively with https:// Genesis URLs
category: Infrastructure
tags:
  - argocd
  - ingress
  - ingress-nginx
  - cluster-level
  - dashboard
fields:
  - name: host
    description: The DNS name of your genesis host.
    required: true
  - name: prefix
    description: Connection URL prefix. i.e. `/argocd`. Will default to `/argocd` if not set. This doesn't need changing in most cases.
    required: false
  - name: ingressClassName
    description: Ingress class name. Leave empty for cluster default.
    required: false
  - name: nginx_registry
    description: Registry to pull the nginx sidecar image from
    required: false
    default: docker.io
  - name: nginx_repo
    description: Repository to pull the nginx sidecar image from
    required: false
    default: nginx
  - name: nginx_tag
    description: Tag to pull the nginx sidecar image from
    required: false
    default: alpine
