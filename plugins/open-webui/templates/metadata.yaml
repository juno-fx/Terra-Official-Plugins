apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-terra-metadata
  labels:
    kuiper.juno-innovations.com/chart: "{{ .Release.Name }}-scripts-configmap"
  annotations:
    juno-innovations.com/workload: "Application"
data:
  chart: "{{ .Release.Name }}-scripts-configmap"
  description: "Open WebUI"
  fields: |
    - name: registry
      default: "ghcr.io/open-webui"
    - name: repo
      default: "open-webui"
    - name: tag
      description: "Open WebUI image tag. Pinned — this plugin's nginx sidecar depends on Open WebUI's current asset paths, so bumping this may require updating the sidecar's sub_filter rules."
      type: string
      required: true
      default: "0.10.2"
    - name: icon
      default: "https://raw.githubusercontent.com/juno-fx/Terra-Official-Plugins/refs/heads/main/plugins/open-webui/scripts/assets/logo.png"
    - name: storage_class
      description: Storage class to use for the game disk
      required: true
      type: k8sStorageClass
    - name: storage_size
      description: Storage size to use for the game disk
      default: 10Gi
      required: true
      type: string