apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-terra-metadata
  labels:
    kuiper.juno-innovations.com/chart: "{{ .Release.Name }}-scripts-configmap"
  annotations:
    juno-innovations.com/workload: "Application"
data:
  chart: "{{ .Release.Name }}-scripts-configmap"
  description: "BOINC distributed computing client — LinuxServer.io"
  fields: |
    - name: icon
      description: icon
      default: "https://raw.githubusercontent.com/juno-fx/Terra-Official-Plugins/refs/heads/main/plugins/boinc/assets/logo.png"
    - name: registry
      description: "Container registry"
      type: string
      required: true
      default: "lscr.io"
    - name: repo
      description: "Image repository"
      type: string
      required: true
      default: "linuxserver/boinc"
    - name: tag
      description: "Image tag — use 'latest' for current, 'arm64v8-latest' for ARM64"
      type: string
      required: true
      default: "latest"
    - name: project_url
      description: "BOINC project URL (e.g. https://universeathome.pl/universe/)"
      type: string
      required: true
    - name: account_key
      description: "Weak account key for the project"
      type: string
      required: true
    - name: gpu
      description: "Attach a GPU to this workload"
      type: boolean
      required: true
    - name: storage_class
      description: "Storage class for the BOINC config volume (/config)"
      type: k8sStorageClass
      required: true
    - name: storage_size
      description: "Persistent volume size for BOINC config data"
      type: string
      required: false
      default: "10Gi"
    - name: arch
      description: "Target CPU architecture"
      type: select
      required: true
      default: "amd64"
      options:
        - amd64
        - arm64
        - either
  env_hints: |
    - name: PASSWORD
      description: "Password for the BOINC web GUI — set via the env field"
    - name: TZ
      description: "Timezone for log timestamps (e.g. America/New_York)"
