apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-terra-metadata
  labels:
    kuiper.juno-innovations.com/chart: "{{ .Release.Name }}-scripts-configmap"
  annotations:
    juno-innovations.com/workload: "Terminal"
data:
  chart: "{{ .Release.Name }}-scripts-configmap"
  description: "OpenCode is an open source AI coding agent accessible via browser."
  fields: |
    - name: icon
      default: "https://raw.githubusercontent.com/juno-fx/Terra-Official-Plugins/refs/heads/main/plugins/opencode/assets/icon.png"
    - name: registry
      description: "Registry to pull the nginx sidecar image from"
      type: string
      required: true
      default: "docker.io"
    - name: repo
      description: "Repository to pull the nginx sidecar image from"
      type: string
      required: true
      default: "nginx"
    - name: tag
      description: "Tag to pull the nginx sidecar image from"
      type: string
      required: true
      default: "alpine"
    - name: timezone
      description: "Timezone to use for the opencode instance"
      type: string
      required: true
      default: "America/New_York"
    - name: storage_class
      description: "Storage class to use for the data disk"
      required: true
      type: k8sStorageClass
    - name: storage_size
      description: "Storage size to use for the data disk"
      default: 1Gi
      required: true
      type: string
    - name: ingressNamespace
      description: "Namespace of the ingress controller for plugin access"
      type: string
      required: true
      default: "ingress-nginx"
