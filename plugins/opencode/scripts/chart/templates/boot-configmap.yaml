apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-boot
  labels:
    kuiper.juno-innovations.com/kuiper-instance: "{{ .Release.Name }}"
data:
  boot.sh: |
    #!/bin/sh
    set -e

    # Install tools and build deps for wetty's native modules
    apt-get update -qq && apt-get install -y -qq curl bash python3 make g++ git gosu 2>/dev/null

    export SHELL=/bin/bash

    # Create user from PUID/GUID
    PUID=${PUID:-1000}
    PGID=${PGID:-1000}
    USERNAME=${USER:-user}
    export HOME=/data
    export SHELL=/bin/sh

    if [ "$PUID" != "0" ]; then
      addgroup --gid "$PGID" "$USERNAME" 2>/dev/null || true
      adduser --disabled-password --home /data --ingroup "$USERNAME" --uid "$PUID" "$USERNAME" 2>/dev/null || true
      chsh -s /bin/bash "$USERNAME" 2>/dev/null || true
      chown -R "$PUID:$PGID" /data
      CMD="gosu $USERNAME /bin/bash"
      OPENCODE_USER="$USERNAME"
    else
      CMD="/bin/bash"
      OPENCODE_USER="root"
    fi

    # Install wetty (like Hermes Agent's built-in wetty)
    npm install -g wetty

    # Install opencode so the terminal has the CLI available
    export SHELL=/bin/sh
    curl -fsSL https://opencode.ai/install -o /tmp/opencode-install.sh
    chmod +x /tmp/opencode-install.sh
    SHELL=/bin/sh /tmp/opencode-install.sh || true
    rm -f /tmp/opencode-install.sh
    # opencode installs to ~/.opencode/bin/opencode - symlink to /usr/local/bin
    if [ -f /data/.opencode/bin/opencode ]; then
      ln -sf /data/.opencode/bin/opencode /usr/local/bin/opencode
    fi

    # Make git-serve.sh available on PATH
    ln -sf /opt/boot/git-serve.sh /usr/local/bin/git-serve

    # Start wetty at root — nginx handles prefix
    exec wetty --port {{ .Values.ttyd_port }} --command "$CMD"
  git-serve.sh: |
    #!/bin/bash
    set -e

    SERVICE="${NAME:-opencode}"
    NAMESPACE="${JUNO_PROJECT:-default}"
    FQDN="${SERVICE}.${NAMESPACE}.svc.cluster.local"
    PORT=9418

    REPO_DIR="$(pwd)"
    REPO_NAME="$(basename "$REPO_DIR")"
    PARENT_DIR="$(dirname "$REPO_DIR")"

    echo "=== git-serve ==="
    echo "Serving:  ${REPO_DIR}"
    echo "FQDN:     ${FQDN}"
    echo "Clone URL: git://${FQDN}:${PORT}/${REPO_NAME}"
    echo ""
    echo "Add to Terra sources as:"
    echo "  git://${FQDN}:${PORT}/${REPO_NAME}"
    echo ""

    git daemon --verbose --export-all --reuseaddr \
      --base-path="${PARENT_DIR}" --port="${PORT}" "${REPO_DIR}"