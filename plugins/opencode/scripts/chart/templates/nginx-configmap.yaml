apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-nginx
  labels:
    kuiper.juno-innovations.com/kuiper-instance: "{{ .Values.name }}"
data:
  default.conf: |
    server {
        listen 8080;
        server_name _;

        location /opencode/{{ .Values.name }} {
            proxy_set_header Accept-Encoding "";
            rewrite ^/opencode/{{ .Values.name }}(/|$)(.*) /$2 break;
            proxy_pass http://127.0.0.1:{{ .Values.ttyd_port }};
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_buffering off;
            proxy_cache off;

            sub_filter '/client/' '/opencode/{{ .Values.name }}/client/';
            sub_filter_types text/html;
            sub_filter_once off;
        }
    }
