server {
    listen 8080;
    server_name _;

    location /plugin/{{ .Values.name }} {
        auth_request /auth;
        proxy_set_header Accept-Encoding "";
        rewrite ^/plugin/{{ .Values.name }}(/|$)(.*) /$2 break;
        proxy_pass http://127.0.0.1:{{ .Values.ttyd_port }};
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_cache off;

        sub_filter '/client/' '/plugin/{{ .Values.name }}/client/';
        sub_filter_types text/html;
        sub_filter_once off;
    }

    location = /auth {
        internal;
        proxy_pass http://hubble.{{ .Release.Namespace }}.svc.cluster.local:3000/api/auth-workstation/{{ .Values.name }}/;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Upgrade "";
        proxy_set_header Connection "";
    }
}
