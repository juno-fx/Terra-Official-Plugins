apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Release.Name }}-nvidia-gpu-operator
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Release.Name }}-gpu-operator
  sources:
    - repoURL: https://helm.ngc.nvidia.com/nvidia
      chart: gpu-operator
      targetRevision: {{ .Values.version }}
      helm:
        releaseName: {{ .Release.Name }}-nvidia-gpu-operator
        values: |
          toolkit:
            enabled: true
            nodeSelector:
              juno-innotations.com/gpu-mode: {{ .Values.selector }}

          driver:
            enabled: true
            useOpenKernelModules: {{ .Values.open_kernel_modules }}
            nvidiaDriverCRD:
              enabled: {{ .Values.install_crds }}
            nodeSelector:
              juno-innotations.com/gpu-mode: {{ .Values.selector }}

          operator:
            cleanupCRD: {{ .Values.install_crds }}
            upgradeCRD: {{ .Values.install_crds }}

          sandboxWorkloads:
            enabled: false

          devicePlugin:
            config:
              name: device-plugin-config
              create: true
              data:
                default: |-
                  version: v1
                  flags:
                    migStrategy: none
                  sharing:
                    timeSlicing:
                      renameByDefault: false
                      failRequestsGreaterThanOne: false
                      resources:
                        - name: nvidia.com/gpu
                          replicas: {{ .Values.slicing_config }}
            nodeSelector:
              juno-innotations.com/gpu-mode: {{ .Values.selector }}

          nfd:
            enabled: {{ .Values.nfd_enabled }}

          dcgm:
            enabled: {{ .Values.dcgm_enabled }}
            nodeSelector:
              juno-innotations.com/gpu-mode: {{ .Values.selector }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: true
    syncOptions:
      - CreateNamespace=true
