{{- $ns := .Release.Namespace }}
{{- $slurmSecretName := "slurm-cluster-auth-slurm" }}
{{- $jwtSecretName   := "slurm-cluster-auth-jwt" }}
{{- $slurmSecret := lookup "v1" "Secret" $ns $slurmSecretName }}
{{- $jwtSecret   := lookup "v1" "Secret" $ns $jwtSecretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $slurmSecretName }}
  labels:
    kuiper.juno-innovations.com/kuiper-instance: "slurm-cluster"
  annotations:
    argocd.argoproj.io/sync-wave: "1"
type: Opaque
data:
  slurm.key: {{ $slurmSecret | default dict | dig "data" "slurm.key" (randAscii 1024 | b64enc) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $jwtSecretName }}
  labels:
    kuiper.juno-innovations.com/kuiper-instance: "slurm-cluster"
  annotations:
    argocd.argoproj.io/sync-wave: "1"
type: Opaque
data:
  jwt.key: {{ $jwtSecret | default dict | dig "data" "jwt.key" (randBytes 32 | b64enc | b64enc) }}
