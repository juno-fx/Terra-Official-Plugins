{{- $ns := .Release.Namespace }}
{{- $slurmSecretName := printf "%s-cluster-slurm-auth-slurm" .Release.Name }}
{{- $jwtSecretName   := printf "%s-cluster-slurm-auth-jwt"   .Release.Name }}
{{- $slurmSecret := lookup "v1" "Secret" $ns $slurmSecretName }}
{{- $jwtSecret   := lookup "v1" "Secret" $ns $jwtSecretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $slurmSecretName }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
type: Opaque
data:
  slurm.key: {{ $slurmSecret | default dict | dig "data" "slurm.key" (randAscii 1024 | b64enc) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $jwtSecretName }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
type: Opaque
data:
  jwt.key: {{ $jwtSecret | default dict | dig "data" "jwt.key" (randAscii 1024 | b64enc) }}
