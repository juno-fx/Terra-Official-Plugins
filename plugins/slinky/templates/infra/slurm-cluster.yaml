apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Release.Name }}-slurm-cluster
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.slurm_namespace }}
  sources:
    - repoURL: oci://ghcr.io/slinkyproject/charts/slurm
      chart: slurm
      targetRevision: {{ .Values.slurm_version | default "1.0.0" }}
      helm:
        releaseName: {{ .Release.Name }}-cluster
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: true
    syncOptions:
      - CreateNamespace=true
