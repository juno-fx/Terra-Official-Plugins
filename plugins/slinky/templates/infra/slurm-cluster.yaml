apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Release.Name }}-slurm-cluster
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.slurm_namespace }}
  sources:
    - repoURL: oci://ghcr.io/slinkyproject/charts/slurm
      chart: slurm
      targetRevision: {{ .Values.slurm_version | default "1.0.0" }}
      helm:
        releaseName: {{ .Release.Name }}-cluster
        values: |
          controller:
            slurmctld:
              image:
                repository: ghcr.io/slinkyproject/slurmctld
                tag: 25.11-ubuntu24.04
          restapi:
            replicas: 1
            slurmrestd:
              image:
                repository: ghcr.io/slinkyproject/slurmrestd
                tag: 25.11-ubuntu24.04
          nodesets:
            cpu:
              enabled: true
              replicas: {{ .Values.cpu_nodes }}
              scalingMode: StatefulSet
              slurmd:
                image:
                  repository: ghcr.io/slinkyproject/slurmd
                  tag: 25.11-ubuntu24.04
              partition:
                enabled: true
                configMap:
                  State: UP
                  Default: "NO"
                  MaxTime: UNLIMITED
            gpu:
              enabled: {{ .Values.enable_gpu }}
              replicas: {{ .Values.gpu_nodes }}
              scalingMode: StatefulSet
              slurmd:
                image:
                  repository: ghcr.io/slinkyproject/slurmd
                  tag: 25.11-ubuntu24.04
              extraConfMap:
                Gres: gpu:nvidia:1
                Features: gpu
              podSpec:
                nodeSelector:
                  kubernetes.io/os: linux
                tolerations:
                  - key: nvidia.com/gpu
                    operator: Exists
                    effect: NoSchedule
              partition:
                enabled: true
                configMap:
                  State: UP
                  Default: "NO"
                  MaxTime: UNLIMITED
          loginsets:
            login:
              enabled: true
              replicas: 1
              login:
                image:
                  repository: ghcr.io/slinkyproject/login
                  tag: 25.11-ubuntu24.04
          partitions:
            all:
              enabled: true
              nodesets:
                - ALL
              configMap:
                State: UP
                Default: "YES"
                MaxTime: UNLIMITED
          configFiles:
            gres.conf: |
              AutoDetect=nvidia
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: true
    syncOptions:
      - CreateNamespace=true
