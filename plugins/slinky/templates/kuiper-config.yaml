apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ .Release.Name }}-cluster-kuiper-config"
  labels:
    kuiper.juno-innovations.com/kuiper-instance: "{{ .Release.Name }}-cluster"
data:
  _kuiper: "deprecated"
  name: "{{ .Release.Name }}-cluster"
  user: "system"
  group: "{{ .Release.Namespace }}"
  template: "slinky"
  type: "HPC Cluster"
  description: "Slurm HPC cluster managed by Slinky"
