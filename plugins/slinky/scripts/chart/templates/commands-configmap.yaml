apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ .Values.name }}-slurm-commands"
data:
  init-clone.sh: |
    #!/bin/sh
    set -e
    set -x
    rm -rf /workspace/* /workspace/.[!.]* 2>/dev/null || true
    git clone --branch "$GIT_REF" "$GIT_URL" /workspace
    if [ -n "$WORK_DIR" ]; then
      case "$WORK_DIR" in
        /*) TARGET_DIR="$WORK_DIR" ;;
        *)  TARGET_DIR="/workspace/$WORK_DIR" ;;
      esac
    else
      TARGET_DIR="/workspace"
    fi
    mkdir -p "$TARGET_DIR"
    cd "$TARGET_DIR"
    if [ -n "$BUILD_COMMAND" ]; then
      eval "$BUILD_COMMAND"
    fi

  run-sbatch.sh: |
    #!/bin/bash
    set -x

    # Fetch the munge key from the Slurm cluster's secret
    if [ -n "$MUNGE_SECRET_NAME" ] && [ -n "$MUNGE_SECRET_NAMESPACE" ]; then
      echo "Fetching munge key from secret $MUNGE_SECRET_NAMESPACE/$MUNGE_SECRET_NAME..."
      MUNGE_KEY=$(kubectl get secret "$MUNGE_SECRET_NAME" -n "$MUNGE_SECRET_NAMESPACE" -o jsonpath='{.data.slurm\.key}' 2>/dev/null || true)
      if [ -n "$MUNGE_KEY" ]; then
        echo "$MUNGE_KEY" | base64 -d > /etc/munge/munge.key
        chmod 600 /etc/munge/munge.key
        echo "Munge key written to /etc/munge/munge.key"
      else
        echo "WARNING: Could not fetch munge key. Sackd/sbatch may fail to authenticate."
      fi
    fi

    # Start munged (required by sackd and sbatch for auth/munge)
    if [ -f /etc/munge/munge.key ]; then
      echo "Setting up munge..."
      mkdir -p /var/lib/munge
      chown -R munge:munge /var/lib/munge /etc/munge 2>/dev/null || true
      echo "Starting munged..."
      munged -F --foreground &
      sleep 2
    fi

    # Generate slurm.conf for direct client mode (always, as base config)
    mkdir -p /etc/slurm
    cat > /etc/slurm/slurm.conf <<EOF
    ClusterName=${CLUSTER_NAME:-slurm_slinky-argocd-cluster-slurm}
    SlurmctldHost=${CONTROLLER_HOST}
    SlurmctldPort=${CONTROLLER_PORT:-6817}
    SlurmdPort=6818
    AuthType=auth/munge
    CryptoType=crypto/munge
    EOF
    echo "slurm.conf written"

    # Start sackd in background (Slinky login image) via configless mode
    if command -v sackd &>/dev/null; then
      echo "Starting sackd in configless mode..."
      sackd -D --conf-server ${CONTROLLER_HOST}:${CONTROLLER_PORT:-6817} &
      sleep 5
    fi

    # cd to workspace
    if [ -n "$WORK_DIR" ]; then
      case "$WORK_DIR" in
        /*) TARGET_DIR="$WORK_DIR" ;;
        *)  TARGET_DIR="/workspace/$WORK_DIR" ;;
      esac
    else
      TARGET_DIR="/workspace"
    fi
    cd "$TARGET_DIR"

    # Submit the Slurm job
    echo "Submitting Slurm job..."
    set +e
    JOB_OUTPUT=$(eval "$RUN_COMMAND" 2>&1)
    EXIT_CODE=$?
    set -e
    echo "$JOB_OUTPUT"

    if [ $EXIT_CODE -ne 0 ]; then
      echo "Submission failed with exit code $EXIT_CODE"
      exit $EXIT_CODE
    fi

    # Extract Slurm job ID from "Submitted batch job NNN"
    JOB_ID=$(echo "$JOB_OUTPUT" | grep -oP 'Submitted batch job \K\d+')
    if [ -z "$JOB_ID" ]; then
      echo "Command completed (not an sbatch submission). Exiting."
      exit 0
    fi

    # Stream output while Slurm job runs
    echo "Slurm job $JOB_ID submitted. Streaming output..."
    OUTPUT_FILE=$(ls slurm-${JOB_ID}.out slurm-${JOB_ID}.err 2>/dev/null | head -1)
    if [ -n "$OUTPUT_FILE" ]; then
      tail -f "$OUTPUT_FILE" &
      TAIL_PID=$!
    fi

    while squeue -j "$JOB_ID" -h 2>/dev/null | grep -q .; do
      sleep 10
    done

    kill $TAIL_PID 2>/dev/null || true

    # Check final state — mirror Slurm exit status to K8s Job
    JOB_STATE=$(sacct -j "$JOB_ID" --format=State --noheader -X 2>/dev/null | tr -d ' ')
    echo "Slurm job $JOB_ID final state: $JOB_STATE"

    case "$JOB_STATE" in
      COMPLETED) exit 0 ;;
      *)         exit 1 ;;
    esac
