apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.name }}-slurm-job
  labels:
    kuiper.juno-innovations.com/kuiper-instance: "{{ .Values.name }}"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.name }}-slurm-munge-reader
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - "{{ .Values.munge_secret_name }}"
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: "{{ .Values.name }}-slurm-munge-reader"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: "{{ .Values.name }}-slurm-munge-reader"
subjects:
  - kind: ServiceAccount
    name: "{{ .Values.name }}-slurm-job"
    namespace: {{ .Release.Namespace }}
