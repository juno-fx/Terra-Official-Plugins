apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ .Values.name }}"
  annotations:
    juno-innovations.com/workload: "Application"
    juno-innovations.com/kuiper-state: "{{ .Values._kuiper }}"
  labels:
    kuiper.juno-innovations.com/kuiper-instance: "{{ .Values.name }}"
    juno-innovations.com/user: "{{ .Values.user }}"
    juno-innovations.com/session: "{{ .Values.session }}"
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        kuiper.juno-innovations.com/kuiper-instance: "{{ .Values.name }}"
        juno-innovations.com/user: "{{ .Values.user }}"
    spec:
      serviceAccountName: "{{ .Values.name }}-slurm-job"
      restartPolicy: OnFailure
      automountServiceAccountToken: true
      initContainers:
        - name: clone-and-build
          imagePullPolicy: IfNotPresent
          image: "alpine/git:latest"
          command: ["/commands/init-clone.sh"]
          env:
            - name: GIT_URL
              value: "{{ .Values.git_url }}"
            - name: GIT_REF
              value: "{{ .Values.git_ref }}"
            - name: WORK_DIR
              value: "{{ .Values.work_dir }}"
            - name: BUILD_COMMAND
              value: "{{ .Values.build_command }}"
          volumeMounts:
            - name: commands
              mountPath: /commands
            - name: workspace
              mountPath: /workspace
      containers:
        - name: slurm-submit
          imagePullPolicy: IfNotPresent
          image: "{{ .Values.registry }}/{{ .Values.repo }}:{{ .Values.tag }}"
          command: ["/commands/run-sbatch.sh"]
          env:
            - name: JUNO_PROJECT
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: USER
              value: "{{ .Values.user }}"
            - name: HOME
              value: "/home/{{ .Values.user }}"
            - name: WORK_DIR
              value: "{{ .Values.work_dir }}"
            - name: RUN_COMMAND
              value: "{{ .Values.run_command }}"
            - name: CONTROLLER_HOST
              value: "{{ .Values.controller_host }}"
            - name: CONTROLLER_PORT
              value: "{{ .Values.controller_port }}"
            - name: MUNGE_SECRET_NAME
              value: "{{ .Values.munge_secret_name }}"
            - name: MUNGE_SECRET_NAMESPACE
              value: "{{ .Values.munge_secret_namespace }}"
            {{- range .Values.env }}
            - name: {{ .name | quote }}
              value: {{ .value | quote }}
            {{- end }}
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
          volumeMounts:
            - name: commands
              mountPath: /commands
            - name: workspace
              mountPath: /workspace
      volumes:
        - name: workspace
          emptyDir: {}
        - name: commands
          configMap:
            name: "{{ .Values.name }}-slurm-commands"
            defaultMode: 0755
