resource_id: slinky
name: Slinky
icon: https://raw.githubusercontent.com/juno-fx/Terra-Official-Plugins/refs/heads/main/plugins/slinky/assets/icon.svg
description: Slurm HPC cluster on Kubernetes, powered by SchedMD's Slinky project. Installs cert-manager, slurm-operator, and a Slurm cluster with CPU + GPU nodes.
category: HPC
tags:
  - slurm
  - hpc
  - slinky
  - schedmd
  - cluster-level
fields:
  - name: cert_manager_version
    description: Version of cert-manager to install (prerequisite for slurm-operator webhooks)
    required: true
    type: string
    default: v1.16.3
  - name: operator_version
    description: Version of slurm-operator chart to install (leave empty for latest)
    required: false
    type: string
    default: ""
  - name: slurm_version
    description: Version of slurm chart to install (leave empty for latest)
    required: false
    type: string
    default: ""
  - name: slinky_namespace
    description: Namespace for the slurm-operator
    required: true
    type: string
    default: slinky
  - name: slurm_namespace
    description: Namespace for the Slurm cluster
    required: true
    type: string
    default: slurm
  - name: cpu_nodes
    description: Number of CPU worker replicas
    required: true
    type: int
    default: 2
  - name: enable_gpu
    description: Enable GPU worker node pool
    required: true
    type: boolean
    default: true
  - name: gpu_nodes
    description: Number of GPU worker replicas
    required: true
    type: int
    default: 1
