resource_id: slinky
name: Slinky
icon: https://raw.githubusercontent.com/juno-fx/Terra-Official-Plugins/refs/heads/main/plugins/slinky/assets/icon.svg
description: Slurm HPC cluster on Kubernetes, powered by SchedMD's Slinky project. Installs slurm-operator and a Slurm cluster with GPU-accelerated worker nodes.
category: HPC
tags:
  - slurm
  - hpc
  - slinky
  - schedmd
  - cluster-level
editable: true
fields:
  - name: operator_version
    description: Version of slurm-operator chart to install (leave empty for latest)
    required: false
    type: string
    default: ""
  - name: slurm_version
    description: Version of slurm chart to install (leave empty for latest)
    required: false
    type: string
    default: ""
  - name: slinky_namespace
    description: Namespace for the slurm-operator
    required: true
    type: string
    default: slinky
  - name: slurm_namespace
    description: Namespace for the Slurm cluster
    required: true
    type: string
    default: slurm
  - name: cpu_enabled
    description: Enable CPU worker pool
    required: true
    type: boolean
    default: true
  - name: cpu_replicas
    description: Number of CPU worker replicas
    required: true
    type: int
    default: 2
  - name: cpu_node_selector
    description: Node labels for CPU workers (key=value, comma-separated)
    required: false
    type: string
    default: "kubernetes.io/os=linux"
  - name: gpu_enabled
    description: Enable GPU worker pool
    required: true
    type: boolean
    default: true
  - name: gpu_replicas
    description: Number of GPU worker replicas
    required: true
    type: int
    default: 1
  - name: gpu_node_selector
    description: Node labels for GPU workers (key=value, comma-separated)
    required: false
    type: string
    default: "nvidia.com/gpu=true"

