resource_id: ollama
name: ollama
icon: https://raw.githubusercontent.com/juno-fx/Terra-Official-Plugins/refs/heads/main/plugins/ollama/scripts/assets/logo.jpg
description: Get up and running with large language models.
category: AI
tags:
- llm
- machine-learning
editable: true
fields:
- name: runtime
  description: This is the underlying container runtime. Normally you need to set this to the container runtime that has access to the GPU. For example, "nvidia". You can also leave this empty which will default to CPU.
  required: false
  default: ""
- name: gpu
  description: This is the underlying container runtime. Normally you need to set this to the container runtime that has access to the GPU. For example, "nvidia". You can also leave this empty which will default to CPU.
  required: true
  type: boolean
  default: false
- name: destination
  description: Destination directory (DO NOT ADD A LEADING SLASH "/")
  required: true
  default: "ollama"
- name: install_volume
  description: The name of the install volume to store the persisted data.
  required: true
  type: shared-volume
- name: enable_node_port
  description: Expose a nodeport for the Ollama service. This is required if you want to access the Ollama API from outside the cluster. NOTE, you will need to get the assigned port for kubernetes directly.
  required: true
  type: boolean
  default: false
