resource_id: slurm-operator
name: Slurm Operator
icon: https://raw.githubusercontent.com/juno-fx/Terra-Official-Plugins/refs/heads/main/plugins/slurm-operator/assets/icon.svg
description: Slurm operator and CRDs for Kubernetes, powered by SchedMD's Slinky project. Cluster-level prerequisite for the Slurm Cluster plugin. Requires cert-manager.
category: HPC
tags:
  - slurm
  - hpc
  - slinky
  - schedmd
  - cluster-level
editable: true
fields:
  - name: operator_version
    description: Version of slurm-operator chart to install (leave empty for default)
    required: false
    type: string
    default: ""
  - name: slinky_namespace
    description: Namespace for the slurm-operator and CRDs
    required: true
    type: string
    default: slinky
