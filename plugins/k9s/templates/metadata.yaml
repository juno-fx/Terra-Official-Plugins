apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-terra-metadata
  labels:
    kuiper.juno-innovations.com/chart: "{{ .Release.Name }}-scripts-configmap"
  annotations:
    juno-innovations.com/workload: "Terminal"
data:
  chart: "{{ .Release.Name }}-scripts-configmap"
  description: "k9s is a Kubernetes CLI dashboard tool accessible via browser."
  fields: |
    - name: icon
      default: "https://raw.githubusercontent.com/juno-fx/Terra-Official-Plugins/refs/heads/main/plugins/k9s/assets/icon.png"
    - name: registry
      description: "Registry to pull the nginx sidecar image from"
      type: string
      required: true
      default: "docker.io"
    - name: repo
      description: "Repository to pull the nginx sidecar image from"
      type: string
      required: true
      default: "nginx"
    - name: tag
      description: "Tag to pull the nginx sidecar image from"
      type: string
      required: true
      default: "alpine"
    - name: timezone
      description: "Timezone to use for the k9s instance"
      type: string
      required: true
      default: "America/New_York"
    - name: cluster_access
      description: "Kubernetes RBAC access level for the service account"
      type: select
      required: true
      default: "readonly-ns"
      options:
        - readonly-ns
        - admin-ns
    - name: ingressNamespace
      description: "Namespace of the ingress controller for plugin access"
      type: string
      required: true
      default: "ingress-nginx"
  environment_variables: |
    - name: EDITOR
      description: Text editor invoked by k9s's "e" (edit resource) command.