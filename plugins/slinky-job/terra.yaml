resource_id: slinky-job
name: Slinky Job
icon: https://raw.githubusercontent.com/juno-fx/Terra-Official-Plugins/refs/heads/main/plugins/slinky-job/assets/icon.svg
description: Slurm job submission workload template for Genesis. Clone a git repo, build, and submit sbatch jobs to a Slinky Slurm cluster. Requires slinky to be installed in the target project namespace.
category: HPC
tags:
  - slurm
  - hpc
  - slinky
  - schedmd
  - cluster-level
editable: true
fields:
  - name: controller_host
    description: Slurm controller service DNS name (short name works within the same namespace)
    required: true
    type: string
    default: "slinky-cluster-slurm-controller"
  - name: controller_port
    description: Slurm controller port
    required: true
    type: string
    default: "6817"
  - name: cluster_name
    description: Slurm cluster name (must match ClusterName in slurmctld config)
    required: true
    type: string
    default: "slurm_slinky-cluster"
