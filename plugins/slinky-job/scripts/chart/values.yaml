# Kuiper-injected standard values — do not remove
name: slinky-job
user:
group:
cpu: "1"
memory: "1Gi"
cpuLimit: null
memoryLimit: null
idx: 0
guid: 0
puid: 0
host:
pullSecret:
session:
volumeMounts: []
volumes: []
env:
  - name: JUNO
    value: "true"
selector:
plugins: []
_kuiper:

# User-facing fields
# IMPORTANT: defaults here must mirror the defaults in templates/metadata.yaml data.fields.
# Both must be updated together — values.yaml serves Helm rendering; metadata.yaml serves the Genesis UI.
registry: ghcr.io
repo: slinkyproject/login
tag: 25.11-ubuntu24.04
git_url: "https://github.com/aldmbmtl/runtimes.git"
git_ref: "main"
work_dir: "slurm"
build_command: "chmod +x hello-world.sh gpu-test.sh"
run_command: "sbatch --chdir /tmp hello-world.sh"
