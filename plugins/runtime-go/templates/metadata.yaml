apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ .Release.Name }}-terra-metadata"
  labels:
    kuiper.juno-innovations.com/chart: "{{ .Release.Name }}-scripts-configmap"
  annotations:
    juno-innovations.com/workload: "Application"
data:
  chart: "{{ .Release.Name }}-scripts-configmap"
  description: "Go runtime environment — clone, build, and run your application"
  fields: |
    - name: icon
      default: "https://raw.githubusercontent.com/juno-fx/Terra-Official-Plugins/main/plugins/runtime-go/assets/icon.svg"
    - name: registry
      description: "Container registry"
      type: string
      required: true
      default: "docker.io"
    - name: repo
      description: "Image repository"
      type: string
      required: true
      default: "golang"
    - name: tag
      description: "Image tag"
      type: string
      required: true
      default: "1.22"
    - name: git_url
      description: "Git repository URL to clone"
      type: string
      required: true
      default: "https://github.com/aldmbmtl/runtimes.git"
    - name: git_ref
      description: "Git reference (branch, tag, commit)"
      type: string
      required: true
      default: "main"
    - name: work_dir
      description: "Working directory (relative to repo root, or absolute path)"
      type: string
      required: false
      default: "go"
    - name: build_command
      description: "Build command (e.g. go build -o app .)"
      type: string
      required: false
      default: "go build -o app ."
    - name: run_command
      description: "Command to launch your application"
      type: string
      required: true
      default: "./app"
    - name: port
      description: "Application port"
      type: int
      required: true
      default: 8080
    - name: network_mode
      description: "How to expose the application"
      type: select
      required: true
      default: "ingress-auth"
      options:
        - ingress-auth
        - ingress-noauth
        - clusterip
        - nodeport
    - name: gpu
      description: "Attach a GPU"
      type: boolean
      required: true
