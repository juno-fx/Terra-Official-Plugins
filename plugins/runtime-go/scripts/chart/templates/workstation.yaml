apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: "{{ .Values.name }}"
  annotations:
    juno-innovations.com/workload: "Application"
    juno-innovations.com/shared: "none"
    juno-innovations.com/kuiper-state: "{{ .Values._kuiper }}"
  labels:
    juno-innovations.com/app: "polaris"
    juno-innovations.com/workstation: "{{ .Values.name }}"
    juno-innovations.com/user: "{{ .Values.user }}"
    juno-innovations.com/session: "{{ .Values.session }}"

spec:
  replicas: 1

  selector:
    matchLabels:
      juno-innovations.com/workstation: "{{ .Values.name }}"

  template:
    metadata:
      labels:
        juno-innovations.com/app: polaris
        juno-innovations.com/user: "{{ .Values.user }}"
        juno-innovations.com/workstation: "{{ .Values.name }}"

    spec:
      automountServiceAccountToken: false
      hostname: "{{ .Values.name }}"

      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: juno-innovations.com/workstation
                    operator: In
                    values:
                      - "true"
                  {{- if .Values.selector }}
                  {{- range .Values.selector }}
                  - key: {{ .key | quote }}
                    operator: In
                    values:
                      - {{ .value | quote }}
                  {{- end }}
                  {{- end }}

      tolerations:
        - key: "juno-innovations.com/workstation"
          operator: "Exists"
          effect: "NoSchedule"

      {{- if .Values.gpu }}
      runtimeClassName: nvidia
      {{- end }}

      {{- if .Values.pullSecret }}
      imagePullSecrets:
        - name: "{{ .Values.pullSecret }}"
      {{- end }}

      {{- /* Check if user provides a volumeMount at mountPath "/workspace" */ -}}
      {{- $userWorkspaceMount := false -}}
      {{- range .Values.volumeMounts -}}
      {{- if eq (.mountPath | trimSuffix "/") "/workspace" }}{{ $userWorkspaceMount = true }}{{ end -}}
      {{- end }}

      initContainers:
        - name: clone-and-build
          imagePullPolicy: IfNotPresent
          image: "{{ .Values.registry }}/{{ .Values.repo }}:{{ .Values.tag }}"
          command: ["/commands/init-clone.sh"]
          env:
            - name: GIT_URL
              value: "{{ .Values.git_url }}"
            - name: GIT_REF
              value: "{{ .Values.git_ref }}"
            - name: SOURCE_PATH
              value: "{{ .Values.source_path }}"
            - name: WORK_DIR
              value: "{{ .Values.work_dir }}"
            - name: BUILD_COMMAND
              value: "{{ .Values.build_command }}"
            {{- if .Values.env }}{{- include "runtime-custom-env" . | nindent 12 }}{{- end }}
          volumeMounts:
            - name: commands
              mountPath: /commands
            {{- if not $userWorkspaceMount }}
            - name: workspace
              mountPath: /workspace
            {{- end }}
            {{- if .Values.volumeMounts }}
            {{- toYaml .Values.volumeMounts | nindent 12 }}
            {{- end }}

      containers:
        - name: runtime-go
          imagePullPolicy: IfNotPresent
          image: "{{ .Values.registry }}/{{ .Values.repo }}:{{ .Values.tag }}"
          command: ["/commands/run-app.sh"]
          env:
            - name: JUNO_WORKSTATION
              value: "{{ .Values.name }}"
            - name: JUNO_PROJECT
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: JUNO_ENVIRONMENT
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: USER
              value: "{{ .Values.user }}"
            - name: HOME
              value: "/home/{{ .Values.user }}"
            - name: UID
              value: "{{ .Values.puid }}"
            - name: GID
              value: "{{ .Values.guid }}"
            - name: PREFIX
              value: "/polaris/{{ .Values.name }}/"
            - name: GIT_URL
              value: "{{ .Values.git_url }}"
            - name: SOURCE_PATH
              value: "{{ .Values.source_path }}"
            - name: WORK_DIR
              value: "{{ .Values.work_dir }}"
            - name: RUN_COMMAND
              value: "{{ .Values.run_command }}"
            {{- if .Values.env }}{{- include "runtime-custom-env" . | nindent 12 }}{{- end }}
          resources:
            requests:
              memory: "{{ .Values.memory }}"
              cpu: "{{ .Values.cpu }}"
            {{- if or (or .Values.gpu .Values.memoryLimit) .Values.cpuLimit }}
            limits:
              {{- if .Values.gpu }}
              nvidia.com/gpu: "1"
              {{- end }}
              {{- if .Values.cpuLimit }}
              cpu: "{{ .Values.cpuLimit }}"
              {{- end }}
              {{- if .Values.memoryLimit }}
              memory: "{{ .Values.memoryLimit }}"
              {{- end }}
            {{- end }}
          startupProbe:
            tcpSocket:
              port: {{ .Values.port }}
            initialDelaySeconds: 5
            failureThreshold: 60
            periodSeconds: 2
          livenessProbe:
            tcpSocket:
              port: {{ .Values.port }}
            failureThreshold: 24
            periodSeconds: 5
          ports:
            - containerPort: {{ .Values.port }}
              name: viewer
          volumeMounts:
            - name: commands
              mountPath: /commands
            {{- if not $userWorkspaceMount }}
            - name: workspace
              mountPath: /workspace
            {{- end }}
            - name: shm
              mountPath: /dev/shm
            {{- if .Values.volumeMounts }}
            {{- toYaml .Values.volumeMounts | nindent 12 }}
            {{- end }}
            {{- if .Values.plugins }}
            {{- range .Values.plugins }}
            - name: {{ .name | quote }}
              subPath: {{ .file | quote }}
              mountPath: "/etc/helios/init.d/{{ .name }}/{{ .file }}"
            {{- end }}
            {{- end }}

      {{- /* Check if user provides a volume named "workspace" */ -}}
      {{- $userWorkspaceVol := false -}}
      {{- range .Values.volumes -}}
      {{- if eq .name "workspace" }}{{ $userWorkspaceVol = true }}{{ end -}}
      {{- end }}

      volumes:
        {{- if not $userWorkspaceVol }}
        - name: workspace
          emptyDir: {}
        {{- end }}
        - name: commands
          configMap:
            name: "{{ .Values.name }}-runtime-commands"
            defaultMode: 0755
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
        {{- if .Values.volumes }}
        {{- toYaml .Values.volumes | nindent 8 }}
        {{- end }}
        {{- if .Values.plugins }}
        {{- range .Values.plugins }}
        - name: {{ .name | quote }}
          configMap:
            name: {{ .config | quote }}
            defaultMode: 0777
        {{- end }}
        {{- end }}
{{- define "runtime-custom-env" -}}
{{- range .Values.env -}}
- name: {{ .name | quote }}
  value: {{ .value | quote }}
{{- end -}}
{{- end }}
