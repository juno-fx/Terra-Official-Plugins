resource_id: runtime-go
name: Runtime Go
icon: https://raw.githubusercontent.com/juno-fx/Terra-Official-Plugins/main/plugins/runtime-go/assets/icon.svg
description: >
  Go runtime environment. Clone a git repo, build, and run your Go
  application. Configurable via env vars: git_url (repo to clone), git_ref
   (branch/tag), build_command (e.g. go build),
  run_command (e.g. ./app), port, and network_mode
  (ingress-auth/ingress-noauth/clusterip/nodeport).
