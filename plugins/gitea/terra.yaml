resource_id: gitea
name: Gitea
icon: https://raw.githubusercontent.com/juno-fx/Terra-Official-Plugins/refs/heads/main/plugins/gitea/assets/logo.png
description: Gitea is a community managed lightweight code hosting solution written in Go. It provides a Git server with a web interface for managing repositories, issues, and pull requests. Deploy your own private Git server on the Juno platform.
category: Development
tags:
  - git
  - source-control
  - development
  - cluster-level
fields: []
environment_variables:
  - name: GITEA__mailer__ENABLED
    description: Enables outbound email (set to "true") for notifications and password resets.
  - name: GITEA__mailer__SMTP_ADDR
    description: SMTP server hostname for outbound mail.
  - name: GITEA__mailer__USER
    description: SMTP username.
  - name: GITEA__mailer__PASSWD
    description: SMTP password.
  - name: GITEA__actions__ENABLED
    description: Enables Gitea Actions (built-in CI/CD).
