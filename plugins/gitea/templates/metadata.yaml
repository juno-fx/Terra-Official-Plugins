apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ .Release.Name }}-terra-metadata"
  labels:
    kuiper.juno-innovations.com/chart: "{{ .Release.Name }}-scripts-configmap"
  annotations:
    juno-innovations.com/workload: "Application"
data:
  chart: "{{ .Release.Name }}-scripts-configmap"
  description: "Gitea is a community managed lightweight code hosting solution written in Go. It provides a Git server with a web interface for managing repositories, issues, and pull requests."
  fields: |
    - name: registry
      description: "Registry to pull the Gitea image from"
      type: string
      required: true
      default: "docker.io"
    - name: repo
      description: "Repository to pull the Gitea image from"
      type: string
      required: true
      default: "gitea/gitea"
    - name: tag
      description: "Tag to pull the Gitea image from"
      type: string
      required: true
      default: "1.23"
    - name: nginx_registry
      description: "Registry to pull the nginx sidecar image from"
      type: string
      required: true
      default: "docker.io"
    - name: nginx_repo
      description: "Repository to pull the nginx sidecar image from"
      type: string
      required: true
      default: "nginx"
    - name: nginx_tag
      description: "Tag to pull the nginx sidecar image from"
      type: string
      required: true
      default: "1.29.3"
    - name: storage_class
      description: Storage class to use for the Gitea data disk
      required: true
      type: k8sStorageClass
    - name: storage_size
      description: Storage size to use for the Gitea data disk
      default: 5Gi
      required: true
      type: string
  environment_variables: |
    - name: GITEA__mailer__ENABLED
      description: Enables outbound email (set to "true") for notifications and password resets.
    - name: GITEA__mailer__SMTP_ADDR
      description: SMTP server hostname for outbound mail.
    - name: GITEA__mailer__USER
      description: SMTP username.
    - name: GITEA__mailer__PASSWD
      description: SMTP password.
    - name: GITEA__actions__ENABLED
      description: Enables Gitea Actions (built-in CI/CD).
