# Kuiper-injected standard values — do not remove
name: gitea
user:
group:
cpu: "1"
memory: "1Gi"
cpuLimit: null
memoryLimit: null
idx: 0
guid: 0
puid: 0
host:
pullSecret:
session:
volumeMounts: []
volumes: []
env:
  - name: JUNO
    value: "true"
selector:
plugins: []
_kuiper:

# Gitea container
registry: docker.io
repo: gitea/gitea
tag: "1.23"
app_port: 3000

# Nginx sidecar
ingressClassName: ""
nginx_registry: docker.io
nginx_repo: nginx
nginx_tag: "1.29.3"

# Resource limits (null = no limit unless requested)
shmSize: 256Mi

# Storage
storage_class:
storage_size: "5Gi"
