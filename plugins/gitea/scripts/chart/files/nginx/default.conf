server {
    listen 8080;
    server_name _;

    large_client_header_buffers 4 16k;
    proxy_buffer_size 16k;

    location /plugin/{{ .Values.name }}/ {
        auth_request /auth;
        proxy_set_header Accept-Encoding "";
        rewrite ^/plugin/{{ .Values.name }}/(.*) /$1 break;
        proxy_pass http://127.0.0.1:{{ .Values.app_port }};
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        sub_filter '<head>' '<head><base href="/plugin/{{ .Values.name }}/">';
        sub_filter_types text/html;
        sub_filter_once on;
    }

    location = /auth {
        internal;
        set $auth_upstream "http://hubble.{{ .Release.Namespace }}.svc.cluster.local:3000/api/auth-workstation/{{ .Values.name }}/";
        proxy_pass $auth_upstream;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Upgrade "";
        proxy_set_header Connection "";
    }
}
