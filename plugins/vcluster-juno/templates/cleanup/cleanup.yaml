apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-cleanup
  labels:
    {{- include "vcluster-juno.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PostDelete
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-cleanup
  labels:
    {{- include "vcluster-juno.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PostDelete
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
    argocd.argoproj.io/sync-wave: "0"
rules:
  - apiGroups: [""]
    resources: ["persistentvolumeclaims", "secrets"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-cleanup
  labels:
    {{- include "vcluster-juno.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PostDelete
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
    argocd.argoproj.io/sync-wave: "0"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-cleanup
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-cleanup
    namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-cleanup
  labels:
    {{- include "vcluster-juno.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PostDelete
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
    argocd.argoproj.io/sync-wave: "1"
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 900
  template:
    metadata:
      labels:
        {{- include "vcluster-juno.labels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      {{- if gt (len .Values._juno_terra_image_pull_secrets) 0 }}
      imagePullSecrets:
{{ toYaml .Values._juno_terra_image_pull_secrets | indent 8 }}
      {{- end }}
      serviceAccountName: {{ .Release.Name }}-cleanup
      containers:
        - name: cleanup
          image: "{{ .Values._juno_terra_image }}"
          env:
            - name: CLEANUP
              value: "true"
            - name: VCLUSTER_NAME
              value: "{{ .Release.Name }}"
            - name: VCLUSTER_NAMESPACE
              value: "{{ include "vcluster-juno.namespace" . }}"
          command: [ "/terra/bootstrap.sh" ]
          volumeMounts:
            - name: cleanup
              mountPath: /terra/bootstrap.sh
              subPath: bootstrap.sh
            - name: cleanup
              mountPath: /terra/scripts.base64
              subPath: packaged_scripts.base64
      volumes:
        - name: cleanup
          configMap:
            name: {{ .Release.Name }}-scripts-configmap-cleanup
            defaultMode: 0500
