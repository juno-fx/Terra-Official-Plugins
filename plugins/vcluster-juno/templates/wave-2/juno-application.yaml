apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-juno-application
  labels:
    {{- include "vcluster-juno.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
data:
  juno-application.yaml: |
    apiVersion: argoproj.io/v1alpha1
    kind: Application
    metadata:
      name: juno
      namespace: argocd
      labels:
        {{- include "vcluster-juno.labels" . | nindent 8 }}
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      destination:
        server: https://kubernetes.default.svc
        namespace: argocd
      source:
        repoURL: {{ .Values.genesis_chart_repo }}
        path: .
        targetRevision: {{ .Values.genesis_chart_version | quote }}
        helm:
          releaseName: juno
          values: |
            host: {{ .Values.juno_hostname | quote }}
            ingressClassName: nginx
            titan:
              owner: {{ .Values.titan_owner | quote }}
              uid: {{ .Values.titan_uid }}
              email: {{ .Values.titan_email | quote }}
            env:
              {{- include "vcluster-juno.authEnv" . | trim | nindent 14 }}
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
