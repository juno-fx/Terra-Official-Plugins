apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-installer
  labels:
    {{- include "vcluster-juno.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    # Jobs are immutable — replace on spec change so updates re-run the
    # (idempotent) installer instead of failing the sync.
    argocd.argoproj.io/sync-options: Force=true,Replace=true
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 3600
  template:
    metadata:
      labels:
        {{- include "vcluster-juno.labels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      {{- if gt (len .Values._juno_terra_image_pull_secrets) 0 }}
      imagePullSecrets:
{{ toYaml .Values._juno_terra_image_pull_secrets | indent 8 }}
      {{- end }}
      serviceAccountName: {{ .Release.Name }}-installer
      containers:
        - name: installer
          image: "{{ .Values._juno_terra_image }}"
          env:
            - name: INSTALL
              value: "true"
            - name: VCLUSTER_NAME
              value: "{{ .Release.Name }}"
            - name: VCLUSTER_NAMESPACE
              value: "{{ include "vcluster-juno.namespace" . }}"
            - name: VCLUSTER_SERVER
              value: "{{ include "vcluster-juno.server" . }}"
            - name: ARGOCD_MANIFEST_URL
              value: "https://raw.githubusercontent.com/argoproj/argo-cd/{{ .Values.argocd_version }}/manifests/install.yaml"
            - name: LABEL_NODES
              value: "{{ .Values.label_nodes }}"
            - name: GENESIS_APP_FILE
              value: "/terra/genesis-application.yaml"
          command: [ "/terra/bootstrap.sh" ]
          volumeMounts:
            - name: installer
              mountPath: /terra/bootstrap.sh
              subPath: bootstrap.sh
            - name: installer
              mountPath: /terra/scripts.base64
              subPath: packaged_scripts.base64
            - name: genesis-application
              mountPath: /terra/genesis-application.yaml
              subPath: genesis-application.yaml
      volumes:
        - name: installer
          configMap:
            name: {{ .Release.Name }}-scripts-configmap
            defaultMode: 0500
        - name: genesis-application
          configMap:
            name: {{ .Release.Name }}-genesis-application
