apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-installer
  labels:
    {{- include "vcluster-juno.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-installer
  labels:
    {{- include "vcluster-juno.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-installer
  labels:
    {{- include "vcluster-juno.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-installer
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-installer
    namespace: {{ .Release.Namespace }}
