apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}-console
  labels:
    kuiper.juno-innovations.com/kuiper-instance: "{{ .Values.name }}"
spec:
  replicas: 1
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app: {{ .Values.name }}-console
  template:
    metadata:
      labels:
        app: {{ .Values.name }}-console
    spec:
      serviceAccountName: {{ .Values.name }}-console
      containers:
        - name: kubevirt-console
          image: junoinnovations/kubevirt-console:unstable
          env:
            - name: KUBEVIRT_VM
              value: "{{ .Values.name }}"
          ports:
            - containerPort: 8081
              name: endpoint
        - name: nginx
          image: "{{ .Values.nginx_registry }}/{{ .Values.nginx_repo }}:{{ .Values.nginx_tag }}"
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: nginx-config
          configMap:
            name: {{ .Release.Name }}-nginx