apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.name }}-ingress
  annotations:
    kuiper.juno-innovations.com/ingress-extras: "/kubevirt-console/{{ .Values.name }}/vnc.html?keep_device_awake=true&reconnect=5000&autoconnect=true&resize=scale"
spec:
  {{- if .Values.ingressClassName }}
  ingressClassName: {{ .Values.ingressClassName }}
  {{- end }}
  rules:
    - host: {{ .Values.host }}
      http:
        paths:
          - path: "/kubevirt-console/{{ .Values.name }}/"
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}
                port:
                  number: 8082
