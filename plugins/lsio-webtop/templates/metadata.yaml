apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ .Release.Name }}-terra-metadata"
  labels:
    kuiper.juno-innovations.com/chart: "{{ .Release.Name }}-scripts-configmap"
  annotations:
    juno-innovations.com/workload: "Workspace"  # mark this as a workload and it's type for the
data:
  chart: "{{ .Release.Name }}-scripts-configmap"
  description: "LSIO Webtop deployment for desktop streaming"
  fields: |
    - name: gpu
      description: "Use a GPU"
      type: boolean
      required: true
    - name: registry
      description: "Registry to pull the image from"
      type: string
      required: true
      default: "lscr.io/linuxserver"
    - name: repo
      description: "Repository to pull the image from"
      type: string
      required: true
      default: "chrome"
    - name: tag
      description: "Tag to pull the image from"
      type: string
      required: true
      default: "latest"
    - name: icon
      description: icon
      default: "https://raw.githubusercontent.com/juno-fx/Terra-Official-Plugins/refs/heads/main/plugins/lsio-webtop/scripts/assets/logo.png"
    - name: publicAccess
      description: "Allow public access (disable authentication)"
      type: boolean
      required: true
      default: false
  env_hints: |
    - name: CUSTOM_USER
      description: Username for HTTP basic auth in front of the desktop.
    - name: PASSWORD
      description: Password for HTTP basic auth, used together with CUSTOM_USER.
    - name: DOCKER_MODS
      description: LinuxServer.io mod(s) to install at container start, e.g. additional apps or tools.
    - name: TZ
      description: Timezone for the desktop session, e.g. "America/New_York".
