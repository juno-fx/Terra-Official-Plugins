resource_id: lsio-webtop
name: LSIO Webtop
icon: https://raw.githubusercontent.com/juno-fx/Terra-Official-Plugins/refs/heads/main/plugins/lsio-webtop/scripts/assets/logo.png
description: Webtop containerized workstation from LinuxServer.io.
category: Workstations
tags:
  - selkies
  - vdi
  - lsio
  - cluster-level
fields: []
environment_variables:
  - name: CUSTOM_USER
    description: Username for HTTP basic auth in front of the desktop.
  - name: PASSWORD
    description: Password for HTTP basic auth, used together with CUSTOM_USER.
  - name: DOCKER_MODS
    description: LinuxServer.io mod(s) to install at container start, e.g. additional apps or tools.
  - name: TZ
    description: Timezone for the desktop session, e.g. "America/New_York".
