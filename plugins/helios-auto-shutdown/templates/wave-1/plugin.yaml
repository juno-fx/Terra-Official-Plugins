apiVersion: v1
kind: ConfigMap
metadata:
  name: helios-auto-shutdown
  labels:
    kuiper.juno-innovations.com/plugin: "true"
data:
  shutdown.py: |
    from orionpy.network.orionhttpx import OrionHttpx

    try: 
        response = OrionHttpx().delete(
            "{{ .Release.Namespace }}",
            "kuiper",
            8000,
            f"/kuiper/shutdown/{os.environ.get("JUNO_WORKSTATION")}",
        )
    except Exception as e:
        print(e)

  custom.sh: |
    #!/bin/bash

    set -e
    source /opt/juno/orion/venv/bin/activate
    python /etc/helios/idle.d/shutdown.py >> /tmp/locker.log

  entrypoint.sh: |
    #!/bin/bash

    set -e

    if [ -z "$IDLE_TIME" ]; then
      echo
      echo "IDLE_TIME is not set. Please set it in the workstation template."
      echo "Plugin will not be installed."
      echo "Exiting..."
      echo
      exit 0
    fi

    echo
    echo "Installing Helios Auto Shutdown Plugin"
    echo "IDLE_TIME: $IDLE_TIME"
    echo "JUNO_WORKSTATION: $JUNO_WORKSTATION"
    echo
    cp -v /etc/helios/init.d/helios-auto-shutdown-0/custom.sh /etc/helios/idle.d/custom.sh
    cp -v /etc/helios/init.d/helios-auto-shutdown-0/shutdown.py /etc/helios/idle.d/shutdown.py
    chmod +x /etc/helios/idle.d/custom.sh

    echo "Helios Auto Shutdown Plugin installed successfully."
