resource_id: hermes-agent
name: hermes-agent
icon: https://github.com/juno-fx/Terra-Official-Plugins/blob/main/plugins/hermes-agent/scripts/assets/hermes-logo.png?raw=true
description: Hermes AI agent with multi-provider support (OpenRouter, OpenAI, Anthropic, Ollama) and WebUI.
tags:
- llm
- ai-agent
- hermes
- openai-compatible
- multi-provider
- webui
- workload
- cluster-level
fields: []
environment_variables:
  - name: ANTHROPIC_API_KEY
    description: Anthropic Console API key, used when the agent is configured to use Claude models.
  - name: OPENAI_API_KEY
    description: API key for OpenAI or any OpenAI-compatible endpoint (also used for local Ollama setups).
  - name: OPENROUTER_API_KEY
    description: OpenRouter API key for flexible access to many hosted models.
  - name: HERMES_MODEL
    description: Overrides the default model used by the agent.
