{{- if .Values.persistence_enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: "{{ .Values.name }}-data"
  labels:
    juno-innovations.com/app: "hermes-agent"
    juno-innovations.com/workstation: "{{ .Values.name }}"
    juno-innovations.com/owner: "{{ .Values.name }}"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.persistence_size }}
  storageClassName: {{ .Values.persistence_storage_class }}
{{- end }}
