apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ .Release.Name }}-chat-proxy"
  labels:
    kuiper.juno-innovations.com/chart: "{{ .Release.Name }}-scripts-configmap"
data:
  proxy.py: |
    import http.server, json, os, urllib.request, urllib.error

    API_KEY = os.environ['API_SERVER_KEY']
    BASE = 'http://127.0.0.1:8642/v1'

    class Handler(http.server.BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path == '/health':
                self._send_json(200, {'status': 'ok'})
            elif self.path == '/v1/models':
                self._send_json(200, {
                    'object': 'list',
                    'data': [{'id': 'hermes-agent', 'object': 'model'}]
                })
            else:
                self.send_error(404)

        def do_POST(self):
            if self.path == '/chat':
                self._handle_chat()
            elif self.path == '/v1/chat/completions':
                self._handle_completions()
            else:
                self.send_error(404)

        def _send_json(self, status, data):
            self.send_response(status)
            self.send_header('Content-Type', 'application/json')
            self.end_headers()
            self.wfile.write(json.dumps(data).encode())

        def _forward(self, endpoint, payload):
            req = urllib.request.Request(
                f'{BASE}/{endpoint}', data=payload,
                headers={
                    'Content-Type': 'application/json',
                    'Authorization': f'Bearer {API_KEY}'
                }
            )
            return urllib.request.urlopen(req, timeout=300)

        def _handle_chat(self):
            try:
                length = int(self.headers.get('Content-Length', 0))
                body = json.loads(self.rfile.read(length))
                msgs = body.get('messages')
                if msgs is not None:
                    if not isinstance(msgs, list) or len(msgs) == 0:
                        self.send_error(400, 'invalid messages')
                        return
                    last_input = msgs[-1]['content'] if msgs else ''
                else:
                    last_input = body.get('message', '')
                    if not last_input.strip():
                        self.send_error(400, 'empty message')
                        return
                payload = json.dumps({
                    'model': 'hermes-agent',
                    'input': last_input,
                    'store': True
                }).encode()
                resp = self._forward('responses', payload)
                data = json.loads(resp.read())
                content = ''
                for item in data.get('output', []):
                    if item.get('type') == 'message':
                        for c in item.get('content', []):
                            if c.get('type') == 'output_text':
                                content = c['text']
                                break
                self._send_json(200, {'content': content})
            except urllib.error.HTTPError as e:
                body = e.read().decode(errors='replace')[:500]
                self._send_json(e.code, {'error': body})
            except urllib.error.URLError:
                self._send_json(503, {
                    'error': 'The agent is still starting up. Please try again in a moment.'
                })
            except Exception as e:
                self._send_json(500, {'error': str(e)})

        def _handle_completions(self):
            try:
                length = int(self.headers.get('Content-Length', 0))
                body = json.loads(self.rfile.read(length))
                payload = json.dumps(body).encode()
                resp = self._forward('chat/completions', payload)
                self._send_json(200, json.loads(resp.read()))
            except urllib.error.HTTPError as e:
                body = e.read().decode(errors='replace')[:500]
                self._send_json(e.code, {'error': body})
            except urllib.error.URLError:
                self._send_json(503, {
                    'error': 'The agent is still starting up. Please try again in a moment.'
                })
            except Exception as e:
                self._send_json(500, {'error': str(e)})

        def log_message(self, fmt, *args):
            pass

    if __name__ == '__main__':
        http.server.HTTPServer(('0.0.0.0', 5000), Handler).serve_forever()
