apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ .Release.Name }}-chat-proxy"
  labels:
    kuiper.juno-innovations.com/chart: "{{ .Release.Name }}-scripts-configmap"
data:
  proxy.py: |
    import http.server, json, os, urllib.request, urllib.error

    API_KEY = os.environ['API_SERVER_KEY']
    BASE = 'http://127.0.0.1:8642/v1'

    class Handler(http.server.BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path == '/health':
                self.send_response(200)
                self.send_header('Content-Type', 'application/json')
                self.end_headers()
                self.wfile.write(b'{"status":"ok"}')
            else:
                self.send_error(404)

        def do_POST(self):
            if self.path != '/chat':
                self.send_error(404)
                return
            try:
                length = int(self.headers.get('Content-Length', 0))
                body = json.loads(self.rfile.read(length))
                msg = body.get('message', '')
                if not msg.strip():
                    self.send_error(400, 'empty message')
                    return
                payload = json.dumps({
                    'model': 'hermes-agent',
                    'messages': [{'role': 'user', 'content': msg}],
                    'stream': False
                }).encode()
                req = urllib.request.Request(
                    f'{BASE}/chat/completions', data=payload,
                    headers={
                        'Content-Type': 'application/json',
                        'Authorization': f'Bearer {API_KEY}'
                    }
                )
                resp = urllib.request.urlopen(req, timeout=300)
                data = json.loads(resp.read())
                content = data['choices'][0]['message']['content']
                self.send_response(200)
                self.send_header('Content-Type', 'application/json')
                self.end_headers()
                self.wfile.write(json.dumps({'content': content}).encode())
            except urllib.error.HTTPError as e:
                body = e.read().decode(errors='replace')[:500]
                self.send_response(e.code)
                self.send_header('Content-Type', 'application/json')
                self.end_headers()
                self.wfile.write(json.dumps({'error': body}).encode())
            except Exception as e:
                self.send_response(500)
                self.send_header('Content-Type', 'application/json')
                self.end_headers()
                self.wfile.write(json.dumps({'error': str(e)}).encode())

        def log_message(self, fmt, *args):
            pass

    if __name__ == '__main__':
        http.server.HTTPServer(('0.0.0.0', 5000), Handler).serve_forever()
