apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ .Release.Name }}-init-script"
  labels:
    kuiper.juno-innovations.com/chart: "{{ .Release.Name }}-scripts-configmap"
data:
  start.sh: |
    #!/bin/sh
    set -e

    HERMES_BIN="/opt/hermes/.venv/bin/hermes"

    log() { echo "[init] $*"; }

    # Install wetty BEFORE activating the Python venv so that node-gyp uses the
    # system Python (which has the 'gyp' package available) rather than the venv
    # Python (which does not). The venv activation overrides the PATH-resolved
    # python3, causing node-gyp's gyp_main.py to fail with:
    #   ModuleNotFoundError: No module named 'gyp'
    if ! command -v wetty > /dev/null 2>&1; then
      log "Installing build tools, sudo, and wetty..."
      apt-get install -y build-essential sudo tmux 2>&1
      npm install -g wetty 2>&1
      chmod +x /usr/local/lib/node_modules/wetty/build/main.js
    else
      log "wetty already installed, skipping..."
    fi

    # --- User/group remap (only when PUID != 0) ---
    if [ "${PUID:-0}" != "0" ]; then
      log "Remapping hermes user to PUID=${PUID} PGID=${PGID}"

      # Remap the built-in hermes user to the requested UID/GID
      usermod -u "$PUID" hermes
      groupmod -o -g "$PGID" hermes 2>/dev/null || true
      usermod -s /bin/bash hermes

      # Ensure home directory exists with correct ownership
      mkdir -p "/home/${USER}"
      chown -R hermes:hermes "/home/${USER}"

      # Passwordless sudo for package installs from the terminal
      echo "hermes ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/hermes
      chmod 440 /etc/sudoers.d/hermes

      # Optional password
      if [ -n "${USER_PASS:-}" ]; then
        echo "hermes:$USER_PASS" | chpasswd
      fi

      # Fix ownership of the PVC data volume
      chown hermes:hermes /opt/data
      for sub in cron sessions logs hooks memories skills skins plans workspace home profiles; do
        [ -d "/opt/data/$sub" ] && chown -R hermes:hermes "/opt/data/$sub"
      done

      # Re-chown the entire install tree so the remapped hermes UID can
      # write __pycache__ dirs, egg-info metadata, plugin installs, etc.
      # The image ships with UID 10000; after usermod the on-disk numeric
      # UID stays at 10000, causing EACCES on any write.  /opt/hermes is
      # the image's own filesystem (not a bind mount), so recursive is safe.
      chown -R hermes:hermes /opt/hermes

      # Ensure the Python venv is traversable by the hermes user
      chmod -R o+rX /opt/hermes/.venv
    else
      log "PUID=0, running as root (legacy mode)"
    fi

    # --- Write .tmux.conf for color/emoji support ---
    cat > "/home/${USER}/.tmux.conf" << 'TMUXCONF'
# Enable truecolor (24-bit) — fixes washed-out colors
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# UTF-8 support — emoji rendering
set -g status-utf8 on

# Mouse scroll and select
set -g mouse on

# Big scrollback
set -g history-limit 50000
TMUXCONF
    chown hermes:hermes "/home/${USER}/.tmux.conf" 2>/dev/null || true

    _SU=""
    [ "${PUID:-0}" != "0" ] && _SU="sudo -E -u hermes"

    cleanup() {
      log "Shutting down..."
      kill "${GATEWAY_PID:-}" "${DASHBOARD_PID:-}" "${WETTY_PID:-}" 2>/dev/null || true
      wait
      exit
    }
    trap cleanup TERM INT

    # Helper: run a command as hermes user (when not root), else run directly
    # -E preserves container env vars (HERMES_HOME, API_SERVER_KEY, etc.)
    # that sudo would otherwise strip on env_reset.
    as_user() {
      if [ -n "$_SU" ]; then
        $_SU "$@"
      else
        "$@"
      fi
    }

    log "Starting gateway..."
    as_user "$HERMES_BIN" gateway run 2>&1 | sed 's/^/[gateway] /' &
    GATEWAY_PID=$!

    log "Waiting for gateway health..."
    i=1
    until curl -sf http://127.0.0.1:8642/health > /dev/null 2>&1; do
      sleep 2
      i=$((i + 1))
      [ "$i" -gt 60 ] && { log "Gateway failed to start"; exit 1; }
    done
    log "Gateway ready"

    log "Starting dashboard..."
    as_user "$HERMES_BIN" dashboard --host 127.0.0.1 --port 9120 --no-open 2>&1 | sed 's/^/[dashboard] /' &
    DASHBOARD_PID=$!

    log "Starting wetty..."
    # tmux preserves shell sessions across page refreshes.
    # -A attaches to existing session "hermes" or creates it.
    # Source venv before tmux so env vars are baked into the session.
    WETTY_CMD="bash -c '. /opt/hermes/.venv/bin/activate && exec tmux new-session -A -s hermes bash'"
    [ -n "$_SU" ] && WETTY_CMD="$_SU ${WETTY_CMD}"
    wetty -b /hermes/__NAME__ --allow-iframe -p 7681 \
      -c "${WETTY_CMD}" \
      2>&1 | sed 's/^/[wetty] /' &
    WETTY_PID=$!

    wait
