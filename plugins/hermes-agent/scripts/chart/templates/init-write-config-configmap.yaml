apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ .Release.Name }}-init-write-config"
  labels:
    kuiper.juno-innovations.com/chart: "{{ .Release.Name }}-scripts-configmap"
data:
  write-config.sh: |
    #!/bin/sh
    set -e

    : "${PUID:=1000}"
    : "${PGID:=1000}"
    : "${NAME:=hermes-agent}"

    echo "Fixing ownership for PUID=${PUID}:${PGID}"
    chown -R "${PUID}:${PGID}" /opt/data

    mkdir -p /opt/data/dashboard-themes

    # --- Copy theme ---
    if [ ! -f /opt/data/dashboard-themes/juno.yaml ]; then
      cp /opt/templates/theme/juno.yaml /opt/data/dashboard-themes/juno.yaml
    fi

    # --- Substitute init script template ---
    sed "s/__NAME__/${NAME}/g" \
      /opt/templates/init/start.sh > /opt/init/start.sh
    chmod 755 /opt/init/start.sh
