apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ .Release.Name }}-terminal-html"
  labels:
    kuiper.juno-innovations.com/chart: "{{ .Release.Name }}-scripts-configmap"
data:
  terminal.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Terminal</title>
    <link rel="stylesheet" href="xterm.css">
    <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;background:#191919}
    #status{position:absolute;top:8px;left:8px;z-index:10;color:#94a3b8;font:13px Menlo,Consolas,monospace;pointer-events:none}
    #terminal{height:100%;padding:4px}
    </style>
    </head>
    <body>
    <div id="status">Connecting...</div>
    <div id="terminal"></div>
    <script src="xterm.js"></script>
    <script src="xterm-addon-fit.js"></script>
    <script>
    (function(){
      var statusEl = document.getElementById('status');

      function setStatus(msg) {
        if (statusEl) statusEl.textContent = msg;
      }

      if (typeof Terminal === 'undefined') {
        setStatus('Error: xterm.js failed to load');
        return;
      }

      var terminal = new Terminal({
        theme: {background:'#191919',cursor:'#f8aa5f',foreground:'#e8e8f0',
          selectionBackground:'#334155',selectionForeground:'#f1f5f9'},
        fontSize:14,fontFamily:'Menlo,Consolas,monospace',cursorBlink:true,
        allowTransparency:true,scrollback:10000
      });
      var fitAddon = new FitAddon.FitAddon();
      terminal.loadAddon(fitAddon);
      terminal.open(document.getElementById('terminal'));
      fitAddon.fit();
      window.addEventListener('resize',function(){fitAddon.fit()});
      setStatus('');

      var parts = window.location.pathname.split('/').filter(Boolean);
      var base = '/' + parts.slice(0,2).join('/');
      var token = '';
      var ws = null;
      var reconnectTimer = null;

      function getToken() {
        setStatus('Connecting...');
        if (!token) {
          fetch(base + '/dashboard/').then(function(r){return r.text();}).then(function(html){
            var m = html.match(/__HERMES_SESSION_TOKEN__[=]["]?([a-zA-Z0-9_-]+)/);
            if (m && m[1]) { token = m[1]; doConnect(); }
            else { setStatus('Auth failed'); setTimeout(getToken, 3000); }
          }).catch(function(){
            setStatus('Retrying...');
            setTimeout(getToken, 2000);
          });
        } else {
          doConnect();
        }
      }

      function doConnect() {
        var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        var url = proto + '//' + location.host + base + '/dashboard/api/pty?token=' + token;
        setStatus('Connecting...');
        ws = new WebSocket(url);
        ws.onopen = function(){
          setStatus('');
          terminal.focus();
          if (statusEl) statusEl.style.display = 'none';
        };
        ws.onclose = function(){
          setStatus('Disconnected - reconnecting...');
          if (reconnectTimer) clearTimeout(reconnectTimer);
          reconnectTimer = setTimeout(getToken, 3000);
        };
        ws.onerror = function(e){
          setStatus('WebSocket error - retrying...');
          if (reconnectTimer) clearTimeout(reconnectTimer);
          reconnectTimer = setTimeout(getToken, 3000);
        };
        ws.onmessage = function(ev){terminal.write(ev.data);};
        terminal.onData(function(data){if(ws && ws.readyState===1)ws.send(data);});
        terminal.onResize(function(size){
          if(ws && ws.readyState===1) ws.send(JSON.stringify({action:'resize',cols:size.cols,rows:size.rows}));
        });
      }

      getToken();
    })();
    </script>
    </body>
    </html>
