{{- if .Values.cluster_read_access }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: "{{ .Values.name }}"
  annotations:
    kuiper.juno-innovations.com/hidden: "true"
  labels:
    kuiper.juno-innovations.com/kuiper-instance: "{{ .Values.name }}"
    juno-innovations.com/workstation: "{{ .Values.name }}"
    juno-innovations.com/owner: "{{ .Values.name }}"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: "{{ .Values.name }}-cluster-reader"
  annotations:
    kuiper.juno-innovations.com/hidden: "true"
  labels:
    kuiper.juno-innovations.com/kuiper-instance: "{{ .Values.name }}"
    juno-innovations.com/workstation: "{{ .Values.name }}"
    juno-innovations.com/owner: "{{ .Values.name }}"
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: "{{ .Values.name }}-cluster-reader"
  annotations:
    kuiper.juno-innovations.com/hidden: "true"
  labels:
    kuiper.juno-innovations.com/kuiper-instance: "{{ .Values.name }}"
    juno-innovations.com/workstation: "{{ .Values.name }}"
    juno-innovations.com/owner: "{{ .Values.name }}"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: "{{ .Values.name }}-cluster-reader"
subjects:
  - kind: ServiceAccount
    name: "{{ .Values.name }}"
    namespace: "{{ .Release.Namespace }}"
{{- end }}
