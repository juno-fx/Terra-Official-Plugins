apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{ .Values.name }}"
  annotations:
    juno-innovations.com/kuiper-state: "{{ .Values._kuiper }}"
    juno-innovations.com/workload: "AI Agent"
  labels:
    juno-innovations.com/app: "hermes-agent"
    juno-innovations.com/workstation: "{{ .Values.name }}"
    juno-innovations.com/user: "{{ .Values.user }}"
    juno-innovations.com/session: "{{ .Values.session }}"
spec:
  replicas: 1
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      juno-innovations.com/workstation: "{{ .Values.name }}"
  template:
    metadata:
      labels:
        juno-innovations.com/app: "hermes-agent"
        juno-innovations.com/user: "{{ .Values.user }}"
        juno-innovations.com/workstation: "{{ .Values.name }}"
    spec:
      automountServiceAccountToken: false
      initContainers:
        - name: write-env
          image: busybox
          command:
            - sh
            - -c
          env:
            - name: API_SERVER_KEY
              value: {{ .Values.api_server_key }}
            - name: OPENROUTER_API_KEY
              value: {{ .Values.llm_provider_key }}
      containers:
        - name: hermes-agent
          image: nousresearch/hermes-agent:latest
          imagePullPolicy: IfNotPresent
          args: ["gateway", "run"]
          ports:
            - name: api
              containerPort: 8642
              protocol: TCP
          env:
            - name: API_SERVER_HOST
              value: "0.0.0.0"
          resources:
            requests:
              memory: "{{ .Values.memory }}"
              cpu: "{{ .Values.cpu }}"
            limits:
              memory: "{{ .Values.memoryLimit }}"
              cpu: "{{ .Values.cpuLimit }}"
