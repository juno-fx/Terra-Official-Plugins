apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{ .Values.name }}"
  annotations:
    juno-innovations.com/kuiper-state: "{{ .Values._kuiper }}"
    juno-innovations.com/workload: "AI Agent"
  labels:
    juno-innovations.com/app: "hermes-agent"
    juno-innovations.com/workstation: "{{ .Values.name }}"
    juno-innovations.com/user: "{{ .Values.user }}"
    juno-innovations.com/session: "{{ .Values.session }}"
spec:
  replicas: 1
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      juno-innovations.com/workstation: "{{ .Values.name }}"
  template:
    metadata:
      labels:
        juno-innovations.com/app: "hermes-agent"
        juno-innovations.com/user: "{{ .Values.user }}"
        juno-innovations.com/workstation: "{{ .Values.name }}"
    spec:
      {{- if .Values.cluster_read_access }}
      serviceAccountName: "{{ .Values.name }}"
      automountServiceAccountToken: true
      {{- else }}
      automountServiceAccountToken: false
      {{- end }}
      initContainers:
        - name: write-config
          image: busybox
          command:
            - sh
            - -c
            - |
              set -e

              # --- Write .env ---
              cat > /opt/data/.env << EOF
              API_SERVER_ENABLED=true
              API_SERVER_KEY=${API_SERVER_KEY}
              API_SERVER_HOST=127.0.0.1
              API_SERVER_PORT=8642
              GATEWAY_ALLOW_ALL_USERS=true
              EOF
              PROVIDER_VALUE="${PROVIDER}"
              case "${PROVIDER}" in
                openrouter) KEY_NAME="OPENROUTER_API_KEY" ;;
                openai)     KEY_NAME="OPENAI_API_KEY";    PROVIDER_VALUE="openai-codex" ;;
                anthropic)  KEY_NAME="ANTHROPIC_API_KEY" ;;
                ollama)     KEY_NAME="";                  PROVIDER_VALUE="custom" ;;
                *)          KEY_NAME="" ;;
              esac
              if [ -n "${KEY_NAME}" ] && [ -n "${API_KEY}" ]; then
                echo "${KEY_NAME}=${API_KEY}" >> /opt/data/.env
              fi

              # --- Write config.yaml ---
              cat > /opt/data/config.yaml << EOF
              model:
                default: "${MODEL}"
                provider: ${PROVIDER_VALUE}
              EOF
              if [ "${PROVIDER}" = "ollama" ]; then
                echo "  base_url: \"${OLLAMA_BASE_URL}\"" >> /opt/data/config.yaml
              fi
              echo "  supports_tools: true" >> /opt/data/config.yaml
              cat >> /opt/data/config.yaml << EOF

              agent:
                max_turns: 15
              approvals:
                mode: off
              EOF
              cat >> /opt/data/config.yaml << EOF

              dashboard:
                theme: juno
              EOF
              cat >> /opt/data/config.yaml << EOF

              platform_toolsets:
                cli:
                  - hermes-cli
              EOF
              cat >> /opt/data/config.yaml << EOF

              web:
                backend: ddgs
              EOF

              # --- Write SOUL.md ---
              cat > /opt/data/SOUL.md << EOF
              You are ${NAME}, a helpful AI assistant.
              ${PERSONALITY}

              All agents in this cluster are accessible at {name}:5000.
              When asked to talk to another agent (like "talk to brian"), use delegate_task with:
                provider="custom"
                base_url="http://NAME:5000/v1"
                model="hermes-agent"
              Replace NAME with the agent's name (e.g. base_url="http://brian:5000/v1").
              EOF

              chmod 644 /opt/data/*

              mkdir -p /opt/data/dashboard-themes

              # --- Copy static files from ConfigMaps ---
              cp /opt/templates/proxy/proxy.py /opt/proxy/proxy.py
              cp /opt/templates/www/chat.html /opt/www/chat.html
              cp /opt/templates/theme/juno.yaml /opt/data/dashboard-themes/juno.yaml

              # --- Substitute nginx template ---
              sed "s/__NAME__/${NAME}/g" \
                /opt/templates/nginx/nginx.conf > /opt/proxy/nginx.conf

              chmod 644 /opt/proxy/proxy.py /opt/proxy/nginx.conf
          env:
            - name: API_SERVER_KEY
              value: {{ .Values.api_server_key | quote }}
            - name: MODEL
              value: {{ .Values.model | quote }}
            - name: PROVIDER
              value: {{ .Values.provider | quote }}
            - name: PERSONALITY
              value: {{ .Values.personality | quote }}
            - name: NAME
              value: {{ .Values.name | quote }}
            - name: API_KEY
              value: {{ .Values.api_key | quote }}
            {{- if eq .Values.provider "ollama" }}
            - name: OLLAMA_BASE_URL
              value: {{ .Values.ollama_base_url | quote }}
            {{- end }}
            {{- range .Values.env }}
            - name: {{ .name | quote }}
              value: {{ .value | quote }}
            {{- end }}
          volumeMounts:
            - name: hermes-data
              mountPath: /opt/data
            - name: proxy-config
              mountPath: /opt/proxy
            - name: www-data
              mountPath: /opt/www
            - name: nginx-template
              mountPath: /opt/templates/nginx
            - name: chat-proxy
              mountPath: /opt/templates/proxy
            - name: chat-html
              mountPath: /opt/templates/www
            - name: dashboard-theme
              mountPath: /opt/templates/theme

      containers:
        - name: hermes-gateway
          image: "nousresearch/hermes-agent:{{ .Values.tag }}"
          imagePullPolicy: IfNotPresent
          args: ["gateway", "run"]
          ports:
            - name: api
              containerPort: 8642
              protocol: TCP
          env:
            - name: HERMES_HOME
              value: /opt/data
            {{- if eq .Values.provider "ollama" }}
            - name: OLLAMA_BASE_URL
              value: {{ .Values.ollama_base_url | quote }}
            {{- end }}
          {{- range .Values.env }}
            - name: {{ .name | quote }}
              value: {{ .value | quote }}
          {{- end }}
          resources:
            requests:
              memory: "{{ .Values.memory }}"
              cpu: "{{ .Values.cpu }}"
            {{- if or .Values.memoryLimit .Values.cpuLimit }}
            limits:
            {{- if .Values.cpuLimit }}
              cpu: "{{ .Values.cpuLimit }}"
            {{- end }}
            {{- if .Values.memoryLimit }}
              memory: "{{ .Values.memoryLimit }}"
            {{- end }}
            {{- end }}
          volumeMounts:
            - name: hermes-data
              mountPath: /opt/data

        - name: hermes-dashboard
          image: "nousresearch/hermes-agent:{{ .Values.tag }}"
          imagePullPolicy: IfNotPresent
          args: ["dashboard", "--host", "127.0.0.1", "--port", "9120", "--no-open"]
          ports:
            - name: dash-internal
              containerPort: 9120
              protocol: TCP
          env:
            - name: HERMES_HOME
              value: /opt/data
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
          volumeMounts:
            - name: hermes-data
              mountPath: /opt/data

        - name: chat-proxy
          image: python:3.12-alpine
          imagePullPolicy: IfNotPresent
          command: ["python3", "/opt/proxy/proxy.py"]
          ports:
            - name: agent-api
              containerPort: 5000
              protocol: TCP
          env:
            - name: API_SERVER_KEY
              value: {{ .Values.api_server_key | quote }}
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
          volumeMounts:
            - name: proxy-config
              mountPath: /opt/proxy

        - name: nginx
          image: nginx:alpine
          imagePullPolicy: IfNotPresent
          command: ["nginx", "-g", "daemon off;", "-c", "/opt/proxy/nginx.conf"]
          ports:
            - name: http
              containerPort: 9119
              protocol: TCP
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
          volumeMounts:
            - name: proxy-config
              mountPath: /opt/proxy
            - name: www-data
              mountPath: /opt/www

      volumes:
        - name: hermes-data
          emptyDir: {}
        - name: proxy-config
          emptyDir: {}
        - name: www-data
          emptyDir: {}
        - name: nginx-template
          configMap:
            name: "{{ .Release.Name }}-nginx-template"
        - name: chat-proxy
          configMap:
            name: "{{ .Release.Name }}-chat-proxy"
        - name: chat-html
          configMap:
            name: "{{ .Release.Name }}-chat-html"
        - name: dashboard-theme
          configMap:
            name: "{{ .Release.Name }}-dashboard-theme"
