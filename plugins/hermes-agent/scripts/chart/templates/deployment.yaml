apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{ .Values.name }}"
  annotations:
    juno-innovations.com/kuiper-state: "{{ .Values._kuiper }}"
    juno-innovations.com/workload: "AI Agent"
  labels:
    juno-innovations.com/app: "hermes-agent"
    juno-innovations.com/workstation: "{{ .Values.name }}"
    juno-innovations.com/user: "{{ .Values.user }}"
    juno-innovations.com/session: "{{ .Values.session }}"
spec:
  replicas: 1
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      juno-innovations.com/workstation: "{{ .Values.name }}"
  template:
    metadata:
      labels:
        juno-innovations.com/app: "hermes-agent"
        juno-innovations.com/user: "{{ .Values.user }}"
        juno-innovations.com/workstation: "{{ .Values.name }}"
    spec:
      {{- if .Values.cluster_read_access }}
      serviceAccountName: "{{ .Values.name }}"
      automountServiceAccountToken: true
      {{- else }}
      automountServiceAccountToken: false
      {{- end }}
      initContainers:
        - name: write-config
          image: busybox
          command:
            - sh
            - -c
            - |
              set -e

              # --- Write .env ---
              cat > /opt/data/.env << EOF
              API_SERVER_ENABLED=true
              API_SERVER_KEY=${API_SERVER_KEY}
              API_SERVER_HOST=127.0.0.1
              API_SERVER_PORT=8642
              GATEWAY_ALLOW_ALL_USERS=true
              EOF
              PROVIDER_VALUE="${PROVIDER}"
              case "${PROVIDER}" in
                openrouter) KEY_NAME="OPENROUTER_API_KEY" ;;
                openai)     KEY_NAME="OPENAI_API_KEY";    PROVIDER_VALUE="openai-codex" ;;
                anthropic)  KEY_NAME="ANTHROPIC_API_KEY" ;;
                ollama)     KEY_NAME="";                  PROVIDER_VALUE="custom" ;;
                *)          KEY_NAME="" ;;
              esac
              if [ -n "${KEY_NAME}" ] && [ -n "${API_KEY}" ]; then
                echo "${KEY_NAME}=${API_KEY}" >> /opt/data/.env
              fi

              # --- Write config.yaml ---
              cat > /opt/data/config.yaml << EOF
              model:
                default: "${MODEL}"
                provider: ${PROVIDER_VALUE}
              EOF
              if [ "${PROVIDER}" = "ollama" ]; then
                echo "  base_url: \"${OLLAMA_BASE_URL}\"" >> /opt/data/config.yaml
              fi
              cat >> /opt/data/config.yaml << EOF
              dashboard:
                theme: juno
              EOF

              # --- Write SOUL.md ---
              cat > /opt/data/SOUL.md << EOF
              ${PERSONALITY}
              EOF

              chmod 644 /opt/data/*

              # --- Write Juno theme ---
              mkdir -p /opt/data/dashboard-themes
              cat > /opt/data/dashboard-themes/juno.yaml << THEME
              name: juno
              label: Juno
              description: Juno Innovations brand theme
              palette:
                background:
                  hex: "#0f172a"
                  alpha: 1.0
                midground:
                  hex: "#22d3ee"
                  alpha: 1.0
                foreground:
                  hex: "#ffffff"
                  alpha: 0.0
                warmGlow: "rgba(6, 182, 212, 0.2)"
                noiseOpacity: 0.4
              typography:
                fontSans: '"Inter", system-ui, -apple-system, sans-serif'
                fontMono: '"JetBrains Mono", ui-monospace, monospace'
                fontUrl: "https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
                baseSize: 14px
                lineHeight: "1.5"
                letterSpacing: "-0.006em"
              layout:
                radius: 0.5rem
                density: comfortable
              colorOverrides:
                primary: "#22d3ee"
                ring: "#22d3ee"
                accent: "#06b6d4"
                border: "rgba(34, 211, 238, 0.25)"
              THEME
              chmod 644 /opt/data/dashboard-themes/juno.yaml

              # --- Write nginx proxy config ---
              mkdir -p /opt/proxy
              cat > /opt/proxy/nginx.conf << NGINXEOF
              events {}
              http {
                  server {
                      listen 9119;
                      location /hermes/${NAME}/ {
                          proxy_pass http://127.0.0.1:9120/;
                          proxy_http_version 1.1;
                          proxy_set_header Upgrade \$http_upgrade;
                          proxy_set_header Connection "upgrade";
                          proxy_set_header X-Forwarded-Prefix /hermes/${NAME};
                          proxy_set_header X-Real-IP \$remote_addr;
                          proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                          proxy_set_header X-Forwarded-Proto \$scheme;
                      }
                  }
              }
              NGINXEOF
              chmod 644 /opt/proxy/nginx.conf
          env:
            - name: API_SERVER_KEY
              value: {{ .Values.api_server_key | quote }}
            - name: MODEL
              value: {{ .Values.model | quote }}
            - name: PROVIDER
              value: {{ .Values.provider | quote }}
            - name: PERSONALITY
              value: {{ .Values.personality | quote }}
            - name: NAME
              value: {{ .Values.name | quote }}
            - name: API_KEY
              value: {{ .Values.api_key | quote }}
            {{- if eq .Values.provider "ollama" }}
            - name: OLLAMA_BASE_URL
              value: {{ .Values.ollama_base_url | quote }}
            {{- end }}
            {{- range .Values.env }}
            - name: {{ .name | quote }}
              value: {{ .value | quote }}
            {{- end }}
          volumeMounts:
            - name: hermes-data
              mountPath: /opt/data
            - name: proxy-config
              mountPath: /opt/proxy

      containers:
        - name: hermes-gateway
          image: "nousresearch/hermes-agent:{{ .Values.tag }}"
          imagePullPolicy: IfNotPresent
          args: ["gateway", "run"]
          ports:
            - name: api
              containerPort: 8642
              protocol: TCP
          env:
            - name: HERMES_HOME
              value: /opt/data
            {{- if eq .Values.provider "ollama" }}
            - name: OLLAMA_BASE_URL
              value: {{ .Values.ollama_base_url | quote }}
            {{- end }}
          {{- range .Values.env }}
            - name: {{ .name | quote }}
              value: {{ .value | quote }}
          {{- end }}
          resources:
            requests:
              memory: "{{ .Values.memory }}"
              cpu: "{{ .Values.cpu }}"
            {{- if or .Values.memoryLimit .Values.cpuLimit }}
            limits:
            {{- if .Values.cpuLimit }}
              cpu: "{{ .Values.cpuLimit }}"
            {{- end }}
            {{- if .Values.memoryLimit }}
              memory: "{{ .Values.memoryLimit }}"
            {{- end }}
            {{- end }}
          volumeMounts:
            - name: hermes-data
              mountPath: /opt/data

        - name: hermes-dashboard
          image: "nousresearch/hermes-agent:{{ .Values.tag }}"
          imagePullPolicy: IfNotPresent
          args: ["dashboard", "--host", "127.0.0.1", "--port", "9120", "--no-open", "--tui"]
          ports:
            - name: dash-internal
              containerPort: 9120
              protocol: TCP
          env:
            - name: HERMES_HOME
              value: /opt/data
            - name: HERMES_TUI_DIR
              value: /opt/hermes/ui-tui
            - name: GATEWAY_HEALTH_URL
              value: http://127.0.0.1:8642
          {{- range .Values.env }}
            - name: {{ .name | quote }}
              value: {{ .value | quote }}
          {{- end }}
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
          volumeMounts:
            - name: hermes-data
              mountPath: /opt/data

        - name: nginx-proxy
          image: nginx:alpine
          imagePullPolicy: IfNotPresent
          command: ["nginx", "-g", "daemon off;", "-c", "/opt/proxy/nginx.conf"]
          ports:
            - name: nginx
              containerPort: 9119
              protocol: TCP
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
          volumeMounts:
            - name: proxy-config
              mountPath: /opt/proxy

      volumes:
        - name: hermes-data
          emptyDir: {}
        - name: proxy-config
          emptyDir: {}
