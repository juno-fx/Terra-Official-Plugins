apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{ .Values.name }}"
  annotations:
    juno-innovations.com/kuiper-state: "{{ .Values._kuiper }}"
    juno-innovations.com/workload: "AI Agent"
  labels:
    juno-innovations.com/app: "hermes-agent"
    juno-innovations.com/workstation: "{{ .Values.name }}"
    juno-innovations.com/user: "{{ .Values.user }}"
    juno-innovations.com/session: "{{ .Values.session }}"
spec:
  replicas: 1
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      juno-innovations.com/workstation: "{{ .Values.name }}"
  template:
    metadata:
      labels:
        juno-innovations.com/app: "hermes-agent"
        juno-innovations.com/user: "{{ .Values.user }}"
        juno-innovations.com/workstation: "{{ .Values.name }}"
    spec:
      {{- if .Values.cluster_read_access }}
      serviceAccountName: "{{ .Values.name }}"
      automountServiceAccountToken: true
      {{- else }}
      automountServiceAccountToken: false
      {{- end }}
      initContainers:
        - name: write-config
          image: busybox
          command:
            - sh
            - -c
            - |
              set -e

              # --- Write .env ---
              cat > /opt/data/.env << EOF
              API_SERVER_ENABLED=true
              API_SERVER_KEY=${API_SERVER_KEY}
              API_SERVER_HOST=127.0.0.1
              API_SERVER_PORT=8642
              GATEWAY_ALLOW_ALL_USERS=true
              EOF
              PROVIDER_VALUE="${PROVIDER}"
              case "${PROVIDER}" in
                openrouter) KEY_NAME="OPENROUTER_API_KEY" ;;
                openai)     KEY_NAME="OPENAI_API_KEY";    PROVIDER_VALUE="openai-codex" ;;
                anthropic)  KEY_NAME="ANTHROPIC_API_KEY" ;;
                ollama)     KEY_NAME="";                  PROVIDER_VALUE="custom" ;;
                *)          KEY_NAME="" ;;
              esac
              if [ -n "${KEY_NAME}" ] && [ -n "${API_KEY}" ]; then
                echo "${KEY_NAME}=${API_KEY}" >> /opt/data/.env
              fi

              # --- Write config.yaml ---
              cat > /opt/data/config.yaml << EOF
              model:
                default: "${MODEL}"
                provider: ${PROVIDER_VALUE}
              EOF
              if [ "${PROVIDER}" = "ollama" ]; then
                echo "  base_url: \"${OLLAMA_BASE_URL}\"" >> /opt/data/config.yaml
              fi

              # --- Write SOUL.md ---
              cat > /opt/data/SOUL.md << EOF
              ${PERSONALITY}
              EOF

              chmod 644 /opt/data/*

              # --- Write nginx config ---
              mkdir -p /opt/proxy
              cat > /opt/proxy/nginx.conf << NGINXEOF
              events {}
              http {
                  server {
                      listen 9119;

                      location /hermes/${NAME}/api/chat {
                          proxy_pass http://127.0.0.1:5000/chat;
                          proxy_http_version 1.1;
                          proxy_set_header Upgrade \$http_upgrade;
                          proxy_set_header Connection "upgrade";
                          proxy_buffering off;
                          proxy_cache off;
                      }

                      location /hermes/${NAME}/ {
                          alias /opt/www/;
                          index chat.html;
                      }
                  }
              }
              NGINXEOF

              # --- Write chat proxy ---
              cat > /opt/proxy/proxy.py << PYEOF
              import http.server, json, os, urllib.request, urllib.error, sys

              API_KEY = os.environ['API_SERVER_KEY']
              BASE = 'http://127.0.0.1:8642/v1'

              class Handler(http.server.BaseHTTPRequestHandler):
                  def do_POST(self):
                      if self.path != '/chat':
                          self.send_error(404)
                          return
                      try:
                          length = int(self.headers.get('Content-Length', 0))
                          body = json.loads(self.rfile.read(length))
                          msg = body.get('message', '')
                          if not msg.strip():
                              self.send_error(400, 'empty message')
                              return
                          payload = json.dumps({
                              'model': 'hermes-agent',
                              'messages': [{'role': 'user', 'content': msg}],
                              'stream': True
                          }).encode()
                          req = urllib.request.Request(
                              f'{BASE}/chat/completions', data=payload,
                              headers={
                                  'Content-Type': 'application/json',
                                  'Authorization': f'Bearer {API_KEY}'
                              }
                          )
                          self.send_response(200)
                          self.send_header('Content-Type', 'text/event-stream')
                          self.send_header('Cache-Control', 'no-cache')
                          self.send_header('X-Accel-Buffering', 'no')
                          self.end_headers()
                          resp = urllib.request.urlopen(req, timeout=300)
                          while True:
                              chunk = resp.read(4096)
                              if not chunk:
                                  break
                              self.wfile.write(chunk)
                              self.wfile.flush()
                      except urllib.error.HTTPError as e:
                          self.send_error(e.code, str(e))
                      except Exception as e:
                          self.send_error(500, str(e))

                  def log_message(self, fmt, *args):
                      pass

              if __name__ == '__main__':
                  http.server.HTTPServer(('127.0.0.1', 5000), Handler).serve_forever()
              PYEOF

              # --- Write chat.html ---
              mkdir -p /opt/www
              cat > /opt/www/chat.html << 'CHATHTML'
              <!DOCTYPE html>
              <html lang="en">
              <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width,initial-scale=1">
              <title>Hermes</title>
              <link rel="preconnect" href="https://fonts.googleapis.com">
              <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
              <style>
              *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
              :root{--bg:#0f172a;--surface:#1e293b;--border:#334155;--accent:#22d3ee;--accent-hover:#06b6d4;
                --text:#f1f5f9;--text-muted:#94a3b8;--user-msg:#1e3a5f;--radius:8px;--font:'Inter',system-ui,sans-serif}
              html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5}
              #app{display:flex;flex-direction:column;height:100%;max-width:800px;margin:0 auto;padding:0 16px}
              header{display:flex;align-items:center;gap:10px;padding:16px 0;border-bottom:1px solid var(--border);margin-bottom:16px}
              header h1{font-size:16px;font-weight:600;color:var(--accent)}
              .logo{width:28px;height:28px;border-radius:6px;background:var(--accent);display:flex;align-items:center;justify-content:center;
                font-size:14px;font-weight:700;color:var(--bg)}
              #header-right{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-muted)}
              #messages{flex:1;overflow-y:auto;padding:8px 0;display:flex;flex-direction:column;gap:12px}
              .msg{max-width:85%;padding:10px 14px;border-radius:var(--radius);line-height:1.5;white-space:pre-wrap;word-break:break-word}
              .msg.user{align-self:flex-end;background:var(--user-msg);border:1px solid rgba(34,211,238,0.2)}
              .msg.assistant{align-self:flex-start;background:var(--surface);border:1px solid var(--border)}
              .msg.system{display:none}
              .msg .label{font-size:11px;font-weight:600;margin-bottom:4px;color:var(--text-muted)}
              .msg.assistant .label{color:var(--accent)}
              .msg .content p{margin-bottom:8px}
              .msg .content p:last-child{margin-bottom:0}
              .msg .content code{background:rgba(0,0,0,0.3);padding:1px 4px;border-radius:3px;font-size:13px}
              .msg .content pre{background:rgba(0,0,0,0.3);border-radius:var(--radius);padding:12px;overflow-x:auto;margin:8px 0;font-size:13px}
              .msg .content pre code{background:none;padding:0}
              .thinking{background:rgba(34,211,238,0.08);border:1px solid rgba(34,211,238,0.15);border-radius:var(--radius);
                padding:10px 14px;margin-bottom:8px;font-size:13px;color:var(--text-muted)}
              .thinking summary{cursor:pointer;font-weight:500;color:var(--accent)}
              .stream-cursor{animation:blink 0.8s infinite}
              @keyframes blink{50%{opacity:0}}
              #input-area{border-top:1px solid var(--border);padding:16px 0;display:flex;gap:8px}
              #input{flex:1;padding:10px 14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);
                color:var(--text);font-size:14px;font-family:var(--font);outline:none;transition:border-color 0.15s}
              #input:focus{border-color:var(--accent)}
              #input::placeholder{color:var(--text-muted)}
              #send-btn{padding:10px 20px;border-radius:var(--radius);border:none;background:var(--accent);color:var(--bg);
                font-size:14px;font-weight:600;cursor:pointer;transition:background 0.15s;font-family:var(--font)}
              #send-btn:hover{background:var(--accent-hover)}
              #send-btn:disabled{opacity:0.4;cursor:not-allowed}
              #error-bar{display:none;padding:8px 12px;background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);
                border-radius:var(--radius);margin-top:8px;font-size:13px;color:#fca5a5}
              @media(max-width:600px){.msg{max-width:95%}#app{padding:0 8px}}
              </style>
              </head>
              <body>
              <div id="app">
                <header>
                  <div class="logo">H</div>
                  <h1>Hermes</h1>
                  <div id="header-right">
                    <span id="model-name"></span>
                  </div>
                </header>
                <div id="messages"></div>
                <div id="error-bar"></div>
                <div id="input-area">
                  <input id="input" type="text" placeholder="Type a message..." autofocus>
                  <button id="send-btn">Send</button>
                </div>
              </div>
              <script>
              (function(){
                'use strict';
                var base = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);
                var chatUrl = window.location.origin + base + 'api/chat';

                var msgsEl = document.getElementById('messages');
                var inputEl = document.getElementById('input');
                var sendBtn = document.getElementById('send-btn');
                var errorBar = document.getElementById('error-bar');
                var modelEl = document.getElementById('model-name');

                function showError(msg) {
                  errorBar.textContent = msg;
                  errorBar.style.display = 'block';
                  setTimeout(function(){ errorBar.style.display = 'none'; }, 8000);
                }

                function addMsg(role, text) {
                  var div = document.createElement('div');
                  div.className = 'msg ' + role;
                  var label = document.createElement('div');
                  label.className = 'label';
                  label.textContent = role === 'user' ? 'You' : 'Hermes';
                  div.appendChild(label);
                  var content = document.createElement('div');
                  content.className = 'content';
                  content.textContent = text;
                  div.appendChild(content);
                  msgsEl.appendChild(div);
                  msgsEl.scrollTop = msgsEl.scrollHeight;
                  return content;
                }

                function sendMessage() {
                  var text = inputEl.value.trim();
                  if (!text) return;
                  inputEl.value = '';
                  sendBtn.disabled = true;

                  addMsg('user', text);

                  var cursorSpan = document.createElement('span');
                  cursorSpan.className = 'stream-cursor';
                  cursorSpan.textContent = '\u2588';

                  var assistantContent = addMsg('assistant', '');
                  assistantContent.appendChild(cursorSpan);

                  var currentText = '';

                  fetch(chatUrl, {
                    method: 'POST',
                    credentials: 'include',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({message: text})
                  }).then(function(resp){
                    if (!resp.ok) {
                      return resp.text().then(function(t){ throw new Error(t || 'HTTP ' + resp.status); });
                    }
                    var reader = resp.body.getReader();
                    var decoder = new TextDecoder();
                    var buffer = '';

                    function readChunk() {
                      reader.read().then(function(result){
                        if (result.done) {
                          if (cursorSpan.parentNode) cursorSpan.remove();
                          sendBtn.disabled = false;
                          inputEl.focus();
                          return;
                        }
                        buffer += decoder.decode(result.value, {stream:true});
                        var lines = buffer.split('\n');
                        buffer = lines.pop() || '';

                        for (var i = 0; i < lines.length; i++) {
                          var line = lines[i].trim();
                          if (!line || line === 'data: [DONE]') continue;
                          if (line.startsWith('data: ')) {
                            try {
                              var parsed = JSON.parse(line.substring(6));
                              var delta = parsed.choices && parsed.choices[0];
                              if (delta && delta.delta) {
                                if (delta.delta.content) {
                                  currentText += delta.delta.content;
                                  if (cursorSpan.parentNode) cursorSpan.remove();
                                  assistantContent.textContent = currentText;
                                  assistantContent.appendChild(cursorSpan);
                                  msgsEl.scrollTop = msgsEl.scrollHeight;
                                }
                                if (delta.delta.reasoning_content && !assistantContent.querySelector('.thinking')) {
                                  var thinkDiv = document.createElement('div');
                                  thinkDiv.className = 'thinking';
                                  var summary = document.createElement('summary');
                                  summary.textContent = 'Thinking...';
                                  thinkDiv.appendChild(summary);
                                  thinkDiv.appendChild(document.createTextNode(delta.delta.reasoning_content));
                                  assistantContent.insertBefore(thinkDiv, assistantContent.firstChild);
                                }
                              }
                            } catch(e) {}
                          }
                        }
                        readChunk();
                      }).catch(function(err){
                        if (cursorSpan.parentNode) cursorSpan.remove();
                        assistantContent.textContent = currentText || 'Error: ' + err.message;
                        showError('Connection error: ' + err.message);
                        sendBtn.disabled = false;
                      });
                    }
                    readChunk();
                  }).catch(function(err){
                    if (cursorSpan.parentNode) cursorSpan.remove();
                    assistantContent.textContent = 'Error: ' + err.message;
                    showError('Failed to connect: ' + err.message);
                    sendBtn.disabled = false;
                  });
                }

                sendBtn.addEventListener('click', sendMessage);
                inputEl.addEventListener('keydown', function(e){ if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }});
              })();
              </script>
              </body>
              </html>
              CHATHTML
          env:
            - name: API_SERVER_KEY
              value: {{ .Values.api_server_key | quote }}
            - name: MODEL
              value: {{ .Values.model | quote }}
            - name: PROVIDER
              value: {{ .Values.provider | quote }}
            - name: PERSONALITY
              value: {{ .Values.personality | quote }}
            - name: NAME
              value: {{ .Values.name | quote }}
            - name: API_KEY
              value: {{ .Values.api_key | quote }}
            {{- if eq .Values.provider "ollama" }}
            - name: OLLAMA_BASE_URL
              value: {{ .Values.ollama_base_url | quote }}
            {{- end }}
            {{- range .Values.env }}
            - name: {{ .name | quote }}
              value: {{ .value | quote }}
            {{- end }}
          volumeMounts:
            - name: hermes-data
              mountPath: /opt/data
            - name: proxy-config
              mountPath: /opt/proxy
            - name: www-data
              mountPath: /opt/www

      containers:
        - name: hermes-gateway
          image: "nousresearch/hermes-agent:{{ .Values.tag }}"
          imagePullPolicy: IfNotPresent
          args: ["gateway", "run"]
          ports:
            - name: api
              containerPort: 8642
              protocol: TCP
          env:
            - name: HERMES_HOME
              value: /opt/data
            {{- if eq .Values.provider "ollama" }}
            - name: OLLAMA_BASE_URL
              value: {{ .Values.ollama_base_url | quote }}
            {{- end }}
          {{- range .Values.env }}
            - name: {{ .name | quote }}
              value: {{ .value | quote }}
          {{- end }}
          resources:
            requests:
              memory: "{{ .Values.memory }}"
              cpu: "{{ .Values.cpu }}"
            {{- if or .Values.memoryLimit .Values.cpuLimit }}
            limits:
            {{- if .Values.cpuLimit }}
              cpu: "{{ .Values.cpuLimit }}"
            {{- end }}
            {{- if .Values.memoryLimit }}
              memory: "{{ .Values.memoryLimit }}"
            {{- end }}
            {{- end }}
          volumeMounts:
            - name: hermes-data
              mountPath: /opt/data

        - name: chat-proxy
          image: python:3.12-alpine
          imagePullPolicy: IfNotPresent
          command: ["python3", "/opt/proxy/proxy.py"]
          env:
            - name: API_SERVER_KEY
              value: {{ .Values.api_server_key | quote }}
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
          volumeMounts:
            - name: proxy-config
              mountPath: /opt/proxy

        - name: nginx
          image: nginx:alpine
          imagePullPolicy: IfNotPresent
          command: ["nginx", "-g", "daemon off;", "-c", "/opt/proxy/nginx.conf"]
          ports:
            - name: http
              containerPort: 9119
              protocol: TCP
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
          volumeMounts:
            - name: proxy-config
              mountPath: /opt/proxy
            - name: www-data
              mountPath: /opt/www

      volumes:
        - name: hermes-data
          emptyDir: {}
        - name: proxy-config
          emptyDir: {}
        - name: www-data
          emptyDir: {}
