apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: "{{ .Values.name }}"
  annotations:
    juno-innovations.com/kuiper-state: "{{ .Values._kuiper }}"
    juno-innovations.com/workload: "AI Agent"
  labels:
    juno-innovations.com/app: "hermes-agent"
    juno-innovations.com/workstation: "{{ .Values.name }}"
    juno-innovations.com/user: "{{ .Values.user }}"
    juno-innovations.com/session: "{{ .Values.session }}"
spec:
  replicas: 1
  selector:
    matchLabels:
      juno-innovations.com/workstation: "{{ .Values.name }}"
  template:
    metadata:
      labels:
        juno-innovations.com/app: "hermes-agent"
        juno-innovations.com/user: "{{ .Values.user }}"
        juno-innovations.com/workstation: "{{ .Values.name }}"
    spec:
      {{- if ne .Values.cluster_access "none" }}
      serviceAccountName: "{{ .Values.name }}"
      automountServiceAccountToken: true
      {{- else }}
      automountServiceAccountToken: false
      {{- end }}
      securityContext:
        fsGroup: {{ .Values.guid }}
      initContainers:
        - name: write-config
          image: busybox
          command: ["sh", "/opt/init-config/write-config.sh"]
          volumeMounts:
            - name: hermes-data
              mountPath: /opt/data
            - name: nginx-out
              mountPath: /opt/proxy
            - name: nginx-template
              mountPath: /opt/templates/nginx
            - name: init-script
              mountPath: /opt/templates/init
            - name: init-out
              mountPath: /opt/init
            - name: dashboard-theme
              mountPath: /opt/templates/theme
            - name: init-write-config
              mountPath: /opt/init-config

      containers:
        - name: hermes-agent
          image: "{{ if .Values.registry }}{{ .Values.registry }}/{{ end }}{{ .Values.repo }}:{{ .Values.tag }}"
          imagePullPolicy: IfNotPresent
          command: ["/opt/init/start.sh"]
          ports:
            - name: api
              containerPort: 8642
              protocol: TCP
            - name: dash-internal
              containerPort: 9120
              protocol: TCP
            - name: wetty
              containerPort: 7681
              protocol: TCP
            - name: git
              containerPort: {{ .Values.git_port }}
              protocol: TCP
          startupProbe:
            tcpSocket:
              port: 7681
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: 7681
            periodSeconds: 5
            failureThreshold: 6
          env:
            - name: HERMES_HOME
              value: /opt/data
            - name: USER
              value: {{ .Values.user | quote }}
            - name: HOME
              value: "/home/{{ .Values.user }}"
            - name: PUID
              value: {{ .Values.puid | quote }}
            - name: PGID
              value: {{ .Values.guid | quote }}
            {{- range .Values.env }}
            - name: {{ .name | quote }}
              value: {{ .value | quote }}
            {{- end }}
          resources:
            requests:
              memory: "{{ .Values.memory }}"
              cpu: "{{ .Values.cpu }}"
            {{- if or .Values.memoryLimit .Values.cpuLimit }}
            limits:
            {{- if .Values.cpuLimit }}
              cpu: "{{ .Values.cpuLimit }}"
            {{- end }}
            {{- if .Values.memoryLimit }}
              memory: "{{ .Values.memoryLimit }}"
            {{- end }}
            {{- end }}
          volumeMounts:
            {{- if .Values.volumeMounts }}
            {{- toYaml .Values.volumeMounts | nindent 12 }}
            {{- end }}
            - name: hermes-data
              mountPath: /opt/data
            - name: init-out
              mountPath: /opt/init

        - name: nginx
          image: nginx:alpine
          imagePullPolicy: IfNotPresent
          command: ["nginx", "-g", "daemon off;", "-c", "/opt/proxy/nginx.conf"]
          ports:
            - name: http
              containerPort: 9119
              protocol: TCP
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
          volumeMounts:
            - name: nginx-out
              mountPath: /opt/proxy

      volumes:
        {{- if .Values.volumes }}
        {{- toYaml .Values.volumes | nindent 8 }}
        {{- end }}
        - name: hermes-data
          persistentVolumeClaim:
            claimName: "{{ .Values.name }}-data"
        - name: nginx-out
          emptyDir: {}
        - name: init-out
          emptyDir: {}
        - name: nginx-template
          configMap:
            name: "{{ .Release.Name }}-nginx-template"
        - name: init-script
          configMap:
            name: "{{ .Release.Name }}-init-script"
        - name: dashboard-theme
          configMap:
            name: "{{ .Release.Name }}-dashboard-theme"
        - name: init-write-config
          configMap:
            name: "{{ .Release.Name }}-init-write-config"
