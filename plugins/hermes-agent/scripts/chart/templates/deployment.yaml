apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{ .Values.name }}"
  annotations:
    juno-innovations.com/kuiper-state: "{{ .Values._kuiper }}"
    juno-innovations.com/workload: "AI Agent"
  labels:
    juno-innovations.com/app: "hermes-agent"
    juno-innovations.com/workstation: "{{ .Values.name }}"
    juno-innovations.com/user: "{{ .Values.user }}"
    juno-innovations.com/session: "{{ .Values.session }}"
spec:
  replicas: 1
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      juno-innovations.com/workstation: "{{ .Values.name }}"
  template:
    metadata:
      labels:
        juno-innovations.com/app: "hermes-agent"
        juno-innovations.com/user: "{{ .Values.user }}"
        juno-innovations.com/workstation: "{{ .Values.name }}"
    spec:
      {{- if .Values.cluster_read_access }}
      serviceAccountName: "{{ .Values.name }}"
      automountServiceAccountToken: true
      {{- else }}
      automountServiceAccountToken: false
      {{- end }}
      initContainers:
        - name: write-config
          image: busybox
          command:
            - sh
            - -c
            - |
              set -e

              # --- Write .env ---
              cat > /opt/data/.env << EOF
              API_SERVER_ENABLED=true
              API_SERVER_KEY=${API_SERVER_KEY}
              API_SERVER_HOST=127.0.0.1
              API_SERVER_PORT=8642
              GATEWAY_ALLOW_ALL_USERS=true
              EOF
              {{- if eq .Values.provider "openrouter" }}
              echo "OPENROUTER_API_KEY=${OPENROUTER_API_KEY}" >> /opt/data/.env
              {{- else if eq .Values.provider "openai" }}
              echo "OPENAI_API_KEY=${OPENAI_API_KEY}" >> /opt/data/.env
              {{- else if eq .Values.provider "anthropic" }}
              echo "ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}" >> /opt/data/.env
              {{- end }}

              # --- Write config.yaml ---
              cat > /opt/data/config.yaml << EOF
              model:
                default: "${MODEL}"{{- if eq .Values.provider "ollama" }}
                provider: custom
                base_url: "${OLLAMA_BASE_URL}"{{- else if eq .Values.provider "openai" }}
                provider: openai-codex{{- else }}
                provider: ${PROVIDER}{{- end }}
              EOF

              # --- Write SOUL.md ---
              cat > /opt/data/SOUL.md << EOF
              ${PERSONALITY}
              EOF

              chmod 644 /opt/data/*

              # --- Write nginx proxy config for dashboard ---
              mkdir -p /opt/proxy
              cat > /opt/proxy/nginx.conf << NGINXEOF
              events {}
              http {
                  server {
                      listen 9119;
                      location /hermes/${NAME}/ {
                          proxy_pass http://127.0.0.1:9120/;
                          proxy_set_header X-Forwarded-Prefix /hermes/${NAME};
                          proxy_set_header Host \$host;
                          proxy_set_header X-Real-IP \$remote_addr;
                          proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                          proxy_set_header X-Forwarded-Proto \$scheme;
                      }
                  }
              }
              NGINXEOF
              chmod 644 /opt/proxy/nginx.conf
          env:
            - name: API_SERVER_KEY
              value: {{ .Values.api_server_key | quote }}
            - name: MODEL
              value: {{ .Values.model | quote }}
            - name: PROVIDER
              value: {{ .Values.provider | quote }}
            - name: PERSONALITY
              value: {{ .Values.personality | quote }}
            - name: NAME
              value: {{ .Values.name | quote }}
            {{- if eq .Values.provider "openrouter" }}
            - name: OPENROUTER_API_KEY
              value: {{ .Values.openrouter_api_key | quote }}
            {{- else if eq .Values.provider "openai" }}
            - name: OPENAI_API_KEY
              value: {{ .Values.openai_api_key | quote }}
            {{- else if eq .Values.provider "anthropic" }}
            - name: ANTHROPIC_API_KEY
              value: {{ .Values.anthropic_api_key | quote }}
            {{- else if eq .Values.provider "ollama" }}
            - name: OLLAMA_BASE_URL
              value: {{ .Values.ollama_base_url | quote }}
            {{- end }}
            {{- range .Values.env }}
            - name: {{ .name | quote }}
              value: {{ .value | quote }}
            {{- end }}
          volumeMounts:
            - name: hermes-data
              mountPath: /opt/data
            - name: proxy-config
              mountPath: /opt/proxy
      containers:
        - name: hermes-gateway
          image: "nousresearch/hermes-agent:{{ .Values.tag }}"
          imagePullPolicy: IfNotPresent
          args: ["gateway", "run"]
          ports:
            - name: api
              containerPort: 8642
              protocol: TCP
          env:
            - name: HERMES_HOME
              value: /opt/data
            {{- if eq .Values.provider "ollama" }}
            - name: OLLAMA_BASE_URL
              value: {{ .Values.ollama_base_url | quote }}
            {{- end }}
          {{- range .Values.env }}
            - name: {{ .name | quote }}
              value: {{ .value | quote }}
          {{- end }}
          resources:
            requests:
              memory: "{{ .Values.memory }}"
              cpu: "{{ .Values.cpu }}"
            {{- if or .Values.memoryLimit .Values.cpuLimit }}
            limits:
            {{- if .Values.cpuLimit }}
              cpu: "{{ .Values.cpuLimit }}"
            {{- end }}
            {{- if .Values.memoryLimit }}
              memory: "{{ .Values.memoryLimit }}"
            {{- end }}
            {{- end }}
          volumeMounts:
            - name: hermes-data
              mountPath: /opt/data

        - name: hermes-dashboard
          image: "nousresearch/hermes-agent:{{ .Values.tag }}"
          imagePullPolicy: IfNotPresent
          args: ["dashboard", "--host", "127.0.0.1", "--port", "9120", "--no-open"]
          ports:
            - name: dashboard-internal
              containerPort: 9120
              protocol: TCP
          env:
            - name: HERMES_HOME
              value: /opt/data
          {{- range .Values.env }}
            - name: {{ .name | quote }}
              value: {{ .value | quote }}
          {{- end }}
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
          volumeMounts:
            - name: hermes-data
              mountPath: /opt/data

        - name: nginx-proxy
          image: nginx:alpine
          imagePullPolicy: IfNotPresent
          command: ["nginx", "-g", "daemon off;", "-c", "/opt/proxy/nginx.conf"]
          ports:
            - name: dashboard
              containerPort: 9119
              protocol: TCP
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
          volumeMounts:
            - name: proxy-config
              mountPath: /opt/proxy

      volumes:
        - name: hermes-data
          emptyDir: {}
        - name: proxy-config
          emptyDir: {}
