apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ .Release.Name }}-nginx-template"
  labels:
    kuiper.juno-innovations.com/chart: "{{ .Release.Name }}-scripts-configmap"
data:
  nginx.conf: |
    events {}
    http {
        server {
            listen 9119;

            location /hermes/__NAME__/terminal/ws {
                proxy_pass http://127.0.0.1:7681;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_buffering off;
                proxy_cache off;
            }

            location /hermes/__NAME__/terminal/ {
                alias /opt/www/;
                index terminal.html;
            }

            location /hermes/__NAME__/dashboard/ {
                proxy_pass http://127.0.0.1:9120/;
                proxy_set_header X-Forwarded-Prefix /hermes/__NAME__/dashboard;
            }

            location /hermes/__NAME__/ {
                return 302 https://$host/hermes/__NAME__/terminal/;
            }
        }
    }
