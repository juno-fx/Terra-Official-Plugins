apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ .Release.Name }}-nginx-template"
  labels:
    kuiper.juno-innovations.com/chart: "{{ .Release.Name }}-scripts-configmap"
data:
  nginx.conf: |
    events {}
    http {
        server {
            listen 9119;

            location = /hermes/__NAME__/dashboard {
                rewrite ^ /hermes/__NAME__/dashboard/ last;
            }

            location = /hermes/__NAME__/dashboard/api/auth/me {
                default_type application/json;
                return 200 '{"user_id":"local","email":"","display_name":"","org_id":"","provider":"","expires_at":null}';
            }

            location /hermes/__NAME__/dashboard/ {
                proxy_pass http://127.0.0.1:9120/;
                proxy_set_header X-Forwarded-Prefix /hermes/__NAME__/dashboard;
                proxy_set_header Accept-Encoding "";
                sub_filter_once off;
                sub_filter '"/assets/' '"/hermes/__NAME__/dashboard/assets/';
            }

            location /hermes/__NAME__ {
                proxy_pass http://127.0.0.1:7681;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_buffering off;
                proxy_cache off;
            }
        }
    }
