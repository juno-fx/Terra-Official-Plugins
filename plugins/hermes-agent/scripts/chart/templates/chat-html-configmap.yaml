apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ .Release.Name }}-chat-html"
  labels:
    kuiper.juno-innovations.com/chart: "{{ .Release.Name }}-scripts-configmap"
data:
  chat.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title id="page-title">Chat</title>
    <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#191919;--surface:#1e1e1e;--surface-alt:#272727;--border:rgba(255,255,255,0.15);
      --accent:#f8aa5f;--accent-hover:#ea8a01;--text:#ffffff;--text-muted:#94a3b8;
      --user-msg:#2e3440;--radius:8px;
      --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Oxygen,Ubuntu,Cantarell,sans-serif}
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5}
    ::-webkit-scrollbar{width:10px}
    ::-webkit-scrollbar-track{background:#191919}
    ::-webkit-scrollbar-thumb{background:#505050}
    ::-webkit-scrollbar-thumb:hover{background:#ea8a01}
    input:-webkit-autofill,input:-webkit-autofill:hover,input:-webkit-autofill:focus,input:-webkit-autofill-active{
      -webkit-box-shadow:0 0 0 30px #191919 inset!important}
    #app{display:flex;flex-direction:row;height:100%}
    #sidebar{width:220px;min-width:220px;background:var(--surface);display:flex;flex-direction:column;border-right:1px solid var(--border);height:100%;overflow:hidden}
    #sidebar-header{padding:12px;border-bottom:1px solid var(--border)}
    #new-session-btn{width:100%;padding:8px;border-radius:var(--radius);border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;font-size:13px;font-family:var(--font)}
    #new-session-btn:hover{border-color:var(--accent)}
    #session-list{flex:1;overflow-y:auto;padding:4px 0}
    .session-item{padding:8px 12px;cursor:pointer;font-size:13px;color:var(--text-muted);border-left:2px solid transparent;display:flex;justify-content:space-between;align-items:center;transition:background 0.15s,color 0.15s}
    .session-item:hover{background:var(--surface-alt);color:var(--text)}
    .session-item.active{border-left-color:var(--accent);color:var(--text);background:var(--surface-alt)}
    .session-item .name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
    .session-item .actions{display:none;gap:2px;margin-left:4px}
    .session-item:hover .actions{display:flex}
    .session-item .actions button{background:none;border:none;color:var(--text-muted);cursor:pointer;padding:1px 3px;font-size:12px;line-height:1}
    .session-item .actions button:hover{color:var(--accent)}
    #chat-panel{flex:1;display:flex;flex-direction:column;min-width:0;padding:0 16px}
    header{display:flex;align-items:center;gap:10px;padding:16px 0;border-bottom:1px solid var(--border)}
    header h1{font-size:16px;font-weight:600;color:var(--accent)}
    .logo{width:28px;height:28px;border-radius:6px;background:var(--accent);display:flex;align-items:center;justify-content:center;
      font-size:13px;font-weight:700;color:var(--bg)}
    #header-right{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-muted)}
    #messages{flex:1;overflow-y:auto;padding:8px 0;display:flex;flex-direction:column;gap:12px}
    .msg{max-width:85%;padding:10px 14px;border-radius:var(--radius);line-height:1.5;white-space:pre-wrap;word-break:break-word}
    .msg.user{align-self:flex-end;background:var(--user-msg);border:1px solid var(--border)}
    .msg.assistant{align-self:flex-start;background:var(--surface);border:1px solid var(--border)}
    .msg .label{font-size:11px;font-weight:600;margin-bottom:4px;color:var(--text-muted)}
    .msg.assistant .label{color:var(--accent)}
    .msg .content p{margin-bottom:8px}
    .msg .content p:last-child{margin-bottom:0}
    .msg .content code{background:rgba(0,0,0,0.3);padding:1px 4px;border-radius:3px;font-size:13px}
    .msg .content pre{background:rgba(0,0,0,0.3);border-radius:var(--radius);padding:12px;overflow-x:auto;margin:8px 0;font-size:13px}
    .msg .content pre code{background:none;padding:0}
    .typing-dots{display:inline-flex;gap:3px;padding:4px 0;vertical-align:middle}
    .typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:dot-pulse 1.4s infinite;display:inline-block}
    .typing-dots span:nth-child(2){animation-delay:0.2s}
    .typing-dots span:nth-child(3){animation-delay:0.4s}
    @keyframes dot-pulse{0%,60%,100%{opacity:0.3}30%{opacity:1}}
    .cancel-btn{font-size:11px;color:var(--text-muted);cursor:pointer;border:none;background:none;
      padding:2px 8px;border-radius:4px;margin-top:4px;transition:color 0.15s;font-family:var(--font)}
    .cancel-btn:hover{color:var(--accent)}
    .cancel-btn:disabled{opacity:0.3;cursor:default}
    #input-area{border-top:1px solid var(--border);padding:16px 0;display:flex;gap:8px}
    #input{flex:1;padding:10px 14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface-alt);
      color:var(--text);font-size:14px;font-family:var(--font);outline:none;transition:border-color 0.15s}
    #input:focus{border-color:var(--accent)}
    #input::placeholder{color:var(--text-muted)}
    #send-btn{padding:10px 20px;border-radius:var(--radius);border:none;background:var(--accent);color:#000;
      font-size:14px;font-weight:600;cursor:pointer;transition:background 0.15s;font-family:var(--font)}
    #send-btn:hover{background:var(--accent-hover)}
    #send-btn:disabled{opacity:0.4;cursor:not-allowed}
    #error-bar{display:none;padding:8px 12px;background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);
      border-radius:var(--radius);margin-top:8px;font-size:13px;color:#fca5a5}
    @media(max-width:768px){.msg{max-width:95%}#sidebar{display:none}#chat-panel{padding:0 8px}}
    </style>
    </head>
    <body>
    <div id="app">
      <div id="sidebar">
        <div id="sidebar-header">
          <button id="new-session-btn">+ New Session</button>
        </div>
        <div id="session-list"></div>
      </div>
      <div id="chat-panel">
        <header>
          <div class="logo" id="logo-letter">H</div>
          <h1 id="agent-name">Agent</h1>
          <div id="header-right"></div>
        </header>
        <div id="messages"></div>
        <div id="error-bar"></div>
        <div id="input-area">
          <input id="input" type="text" placeholder="Type a message..." autofocus>
          <button id="send-btn">Send</button>
        </div>
      </div>
    </div>
    <script>
    (function(){
      'use strict';
      var parts = window.location.pathname.split('/').filter(Boolean);
      var agentName = parts[1] || 'Agent';
      var base = '/' + parts.slice(0, 2).join('/') + '/';
      var chatUrl = window.location.origin + base + 'api/chat';

      document.getElementById('page-title').textContent = agentName;
      document.getElementById('agent-name').textContent = agentName;
      document.getElementById('logo-letter').textContent = agentName.charAt(0).toUpperCase();

      var msgsEl = document.getElementById('messages');
      var inputEl = document.getElementById('input');
      var sendBtn = document.getElementById('send-btn');
      var errorBar = document.getElementById('error-bar');

      var sessKey = 'hermes_sess_' + agentName;
      var store = JSON.parse(localStorage.getItem(sessKey) || '{"cur":null,"sessions":{}}');
      var curMsgs = [];
      var processing = false;

      function saveStore() { try { localStorage.setItem(sessKey, JSON.stringify(store)); } catch(e) {} }

      function curSess() { return store.sessions[store.cur]; }
      function curName() { var s = curSess(); return s ? s.name : 'New Session'; }
      function setCurName(n) { var s = curSess(); if (s) { s.name = n; s.updated = Date.now(); saveStore(); renderSessions(); } }

      function newSession(name) {
        var id = 's' + Date.now();
        store.sessions[id] = {name: name || 'New Session', messages: [], responseId: null, created: Date.now(), updated: Date.now()};
        store.cur = id;
        saveStore();
        curMsgs = [];
        clearChat();
        renderSessions();
        focusInput();
      }

      function switchSession(id) {
        if (id === store.cur || !store.sessions[id]) return;
        if (curSess()) curSess().messages = curMsgs;
        store.cur = id;
        saveStore();
        curMsgs = store.sessions[id].messages || [];
        clearChat();
        curMsgs.forEach(function(m){ addMsg(m.role, m.content); });
        msgsEl.scrollTop = msgsEl.scrollHeight;
        renderSessions();
        focusInput();
      }

      function deleteSession(id) {
        if (!store.sessions[id]) return;
        var keys = Object.keys(store.sessions);
        if (keys.length <= 1) { newSession(); delete store.sessions[id]; saveStore(); renderSessions(); return; }
        delete store.sessions[id];
        store.cur = keys.filter(function(k){ return k !== id; })[keys.length - 2] || keys[0];
        saveStore();
        curMsgs = store.sessions[store.cur] ? store.sessions[store.cur].messages : [];
        clearChat();
        curMsgs.forEach(function(m){ addMsg(m.role, m.content); });
        msgsEl.scrollTop = msgsEl.scrollHeight;
        renderSessions();
      }

      function renderSessions() {
        var list = document.getElementById('session-list');
        list.innerHTML = '';
        var keys = Object.keys(store.sessions);
        if (keys.length === 0) { newSession(); return; }
        keys.forEach(function(id) {
          var s = store.sessions[id];
          var div = document.createElement('div');
          div.className = 'session-item' + (id === store.cur ? ' active' : '');
          div.innerHTML = '<span class="name">' + (s.name || 'Session') + '</span>' +
            '<span class="actions">' +
            '<button data-del="' + id + '">\u2716</button>' +
            '</span>';
          div.addEventListener('click', function(e) {
            if (e.target.tagName !== 'BUTTON') switchSession(id);
          });
          div.querySelector('[data-del]').addEventListener('click', function(e) {
            e.stopPropagation(); deleteSession(id);
          });
          list.appendChild(div);
        });
      }

      function clearChat() {
        msgsEl.innerHTML = '';
        errorBar.style.display = 'none';
      }

      function focusInput() { setTimeout(function() { try { inputEl.focus(); } catch(e) {} }, 100); }

      // Init: ensure at least one session
      (function init() {
        var keys = Object.keys(store.sessions);
        if (keys.length === 0 || !store.sessions[store.cur]) newSession('Session 1');
        curMsgs = curSess() ? curSess().messages.slice() : [];
        curMsgs.forEach(function(m){ addMsg(m.role, m.content); });
        msgsEl.scrollTop = msgsEl.scrollHeight;
        renderSessions();
      })();

      document.getElementById('new-session-btn').addEventListener('click', function(){ newSession(); });

      function showError(msg) {
        errorBar.textContent = msg;
        errorBar.style.display = 'block';
        setTimeout(function(){ errorBar.style.display = 'none'; }, 8000);
      }

      function addMsg(role, text) {
        var div = document.createElement('div');
        div.className = 'msg ' + role;
        var label = document.createElement('div');
        label.className = 'label';
        label.textContent = role === 'user' ? 'You' : agentName;
        div.appendChild(label);
        var content = document.createElement('div');
        content.className = 'content';
        content.textContent = text;
        div.appendChild(content);
        msgsEl.appendChild(div);
        msgsEl.scrollTop = msgsEl.scrollHeight;
        return content;
      }

      function sendMessage() {
        var text = inputEl.value.trim();
        if (!text) return;
        inputEl.value = '';
        sendBtn.disabled = true;
        processing = true;

        addMsg('user', text);

        var dots = document.createElement('span');
        dots.className = 'typing-dots';
        dots.innerHTML = '<span></span><span></span><span></span>';
        var assistantContent = addMsg('assistant', '');
        assistantContent.appendChild(dots);

        var controller = new AbortController();
        var cancelBtn = document.createElement('button');
        cancelBtn.className = 'cancel-btn';
        cancelBtn.textContent = 'Cancel';
        assistantContent.parentNode.appendChild(cancelBtn);

        cancelBtn.addEventListener('click', function(){
            controller.abort();
            cancelBtn.disabled = true;
            cancelBtn.textContent = 'Stopping...';
        });

        var messagesToSend = curMsgs.concat([{role:'user', content:text}]);
        var sess = curSess();
        var reqBody = {messages: messagesToSend};
        if (sess && sess.responseId) reqBody.previous_response_id = sess.responseId;
        var done = false;
        var textBuffer = '';

        fetch(chatUrl, {
            method: 'POST',
            credentials: 'include',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify(reqBody),
            signal: controller.signal
        }).then(function(resp){
            if (!resp.ok) {
                return resp.text().then(function(t){
                    dots.remove(); cancelBtn.remove();
                    try { var d = JSON.parse(t); textBuffer = d.error || 'Error ' + resp.status; } catch(e) { textBuffer = t; }
                    assistantContent.textContent = textBuffer;
                    showError(textBuffer);
                    sendBtn.disabled = false; processing = false;
                });
            }
            var reader = resp.body.getReader();
            var decoder = new TextDecoder();
            var buf = '';
            var lastRespId = null;

            function readChunk() {
                reader.read().then(function(result){
                    if (result.done) {
                        if (!done) {
                            dots.remove(); cancelBtn.remove();
                            assistantContent.textContent = textBuffer || '';
                            msgsEl.scrollTop = msgsEl.scrollHeight;
                            sendBtn.disabled = false; processing = false; inputEl.focus();
                            if (textBuffer && !done) {
                                curMsgs.push({role:'user',content:text},{role:'assistant',content:textBuffer});
                                if (curSess()) {
                                    curSess().messages = curMsgs.slice();
                                    curSess().updated = Date.now();
                                    if (lastRespId) curSess().responseId = lastRespId;
                                    saveStore(); renderSessions();
                                }
                            }
                            done = true;
                        }
                        return;
                    }
                    buf += decoder.decode(result.value, {stream:true});
                    var lines = buf.split('\n');
                    buf = lines.pop() || '';
                    var currentEvent = '';

                    for (var i = 0; i < lines.length; i++) {
                        var line = lines[i];
                        if (line.startsWith('event: ')) {
                            currentEvent = line.substring(7).trim();
                        } else if (line.startsWith('data: ')) {
                            try {
                                var d = JSON.parse(line.substring(6));
                                if (d.type === 'response.output_text.delta' && d.delta) {
                                    textBuffer += d.delta;
                                    dots.remove();
                                    assistantContent.textContent = textBuffer;
                                    msgsEl.scrollTop = msgsEl.scrollHeight;
                                } else if (d.type === 'function_call' || d.type === 'function_call_output') {
                                    // skip - don't show tool internals
                                } else if (d.type === 'response.completed' && d.response) {
                                    lastRespId = d.response.id;
                                    var finalText = '';
                                    var out = d.response.output || [];
                                    for (var oi = 0; oi < out.length; oi++) {
                                        if (out[oi].type === 'message') {
                                            var ct = out[oi].content || [];
                                            for (var ci = 0; ci < ct.length; ci++) {
                                                if (ct[ci].type === 'output_text') finalText = ct[ci].text;
                                            }
                                        }
                                    }
                                    if (finalText) textBuffer = finalText;
                                }
                            } catch(e) {}
                        }
                    }
                    readChunk();
                }).catch(function(err){
                    if (err.name === 'AbortError') return;
                    if (!done) {
                        dots.remove(); cancelBtn.remove();
                        assistantContent.textContent = textBuffer || 'Error: ' + err.message;
                        showError('Connection error');
                        sendBtn.disabled = false; processing = false;
                        done = true;
                    }
                });
            }
            readChunk();
        }).catch(function(err){
            if (err.name === 'AbortError') {
                dots.remove(); cancelBtn.remove();
                assistantContent.textContent = '(Cancelled)';
                sendBtn.disabled = false; processing = false;
                return;
            }
            dots.remove(); cancelBtn.remove();
            assistantContent.textContent = 'Error: ' + err.message;
            showError('Request failed');
            sendBtn.disabled = false; processing = false;
        });
      }

      sendBtn.addEventListener('click', sendMessage);
      inputEl.addEventListener('keydown', function(e){ if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }});
    })();
    </script>
    </body>
    </html>
