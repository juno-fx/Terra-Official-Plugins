apiVersion: v1
kind: Service
metadata:
  name: "{{ .Values.name }}"
spec:
  selector:
    juno-innovations.com/workstation: "{{ .Values.name }}"
  ports:
    - port: 9119
      targetPort: 9119
      protocol: TCP
      name: nginx
    - port: {{ .Values.git_port }}
      targetPort: {{ .Values.git_port }}
      protocol: TCP
      name: git
