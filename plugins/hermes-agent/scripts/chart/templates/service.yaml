apiVersion: v1
kind: Service
metadata:
  name: "{{ .Release.Name }}"
spec:
  selector:
    juno-innovations.com/workstation: "{{ .Values.name }}"
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
    - port: {{ .Values.git_port }}
      targetPort: {{ .Values.git_port }}
      protocol: TCP
      name: git
