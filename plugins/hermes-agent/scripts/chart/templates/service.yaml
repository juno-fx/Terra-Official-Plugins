apiVersion: v1
kind: Service
metadata:
  name: "{{ .Values.name }}"
spec:
  selector:
    juno-innovations.com/workstation: "{{ .Values.name }}"
  ports:
    - port: 9119
      targetPort: 9119
      protocol: TCP
      name: nginx
    - port: 5000
      targetPort: 5000
      protocol: TCP
      name: agent-api
