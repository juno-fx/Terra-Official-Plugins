events {}
http {
    server {
        listen 8080;

        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        location = /plugin/{{ .Values.name }}/dashboard {
            rewrite ^ /plugin/{{ .Values.name }}/dashboard/ last;
        }

        location = /plugin/{{ .Values.name }}/dashboard/api/auth/me {
            default_type application/json;
            return 200 '{"user_id":"local","email":"","display_name":"","org_id":"","provider":"","expires_at":null}';
        }

        location /plugin/{{ .Values.name }}/dashboard/ {
            auth_request /auth;
            proxy_pass http://127.0.0.1:9120/;
            proxy_set_header X-Forwarded-Prefix /plugin/{{ .Values.name }}/dashboard;
            proxy_set_header Accept-Encoding "";
            sub_filter_once off;
            sub_filter '"/assets/' '"/plugin/{{ .Values.name }}/dashboard/assets/';
        }

        location /plugin/{{ .Values.name }} {
            auth_request /auth;
            proxy_pass http://127.0.0.1:7681;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_buffering off;
            proxy_cache off;
        }

        location = /auth {
            internal;
            proxy_pass http://hubble.{{ .Release.Namespace }}.svc.cluster.local:3000/api/auth-workstation/{{ .Values.name }}/;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header Upgrade "";
            proxy_set_header Connection "";
        }
    }
}
