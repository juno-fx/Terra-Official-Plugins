apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ .Release.Name }}-terra-metadata"
  labels:
    kuiper.juno-innovations.com/chart: "{{ .Release.Name }}-scripts-configmap"
  annotations:
    juno-innovations.com/workload: "AI Agent"
data:
  chart: "{{ .Release.Name }}-scripts-configmap"
  description: "Hermes AI agent with web dashboard."
  fields: |
    - name: icon
      default: "https://raw.githubusercontent.com/NousResearch/hermes-agent/main/assets/banner.png"
    - name: tag
      description: "Container image tag."
      type: string
      required: false
      default: latest
    - name: registry
      description: "Container image registry (e.g. docker.io/myregistry). Leave empty for default."
      type: string
      required: false
      default: ""
    - name: repo
      description: "Container image repository."
      type: string
      required: false
      default: "nousresearch/hermes-agent"
    - name: cluster_access
      description: "Kubernetes RBAC access level for this agent."
      type: select
      required: false
      default: none
      options:
        - none
        - readonly-ns
        - admin-ns
    - name: personality
      description: "Personality / system prompt prefix for this agent. Written to SOUL.md on first deploy only."
      type: multi-line
      required: false
    - name: persistence_size
      description: "Persistent volume size (e.g. 1Gi, 500Mi)."
      type: string
      required: false
      default: "1Gi"
    - name: persistence_storage_class
      description: "Storage class for the persistent volume."
      type: k8sStorageClass
      required: false

