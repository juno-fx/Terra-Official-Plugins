apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ .Release.Name }}-terra-metadata"
  labels:
    kuiper.juno-innovations.com/chart: "{{ .Release.Name }}-scripts-configmap"
  annotations:
    juno-innovations.com/workload: "AI Agent"
data:
  chart: "{{ .Release.Name }}-scripts-configmap"
  description: "Hermes AI agent with multi-provider support (OpenRouter, OpenAI, Anthropic, Ollama) and web dashboard."
  fields: |
    - name: icon
      default: "https://raw.githubusercontent.com/NousResearch/hermes-agent/main/assets/banner.png"
    - name: provider
      description: "LLM provider to use."
      type: select
      required: true
      default: openrouter
      options:
        - openrouter
        - openai
        - anthropic
        - ollama
    - name: api_key
      description: "API key for the selected provider. Not needed for Ollama."
      type: string
      required: false
    - name: ollama_base_url
      description: "Ollama server URL (e.g. http://ollama:11434). Only used when provider is Ollama."
      type: string
      required: false
    - name: api_server_key
      description: "Auth token for the Hermes OpenAI-compatible API and web dashboard. Other pods use this to call the agent."
      type: string
      required: true
    - name: model
      description: "Model name. Defaults per provider: OpenRouter -> meta-llama/llama-3.1-8b-instruct:free, OpenAI -> gpt-4o, Anthropic -> claude-sonnet-4-20250514, Ollama -> llama3.2"
      type: string
      required: false
      default: "meta-llama/llama-3.1-8b-instruct:free"
    - name: tag
      description: "Container image tag."
      type: string
      required: false
      default: latest
    - name: cluster_read_access
      description: "Grant this agent namespace-scoped read-only access (creates Role, ServiceAccount, RoleBinding in the current namespace)."
      type: boolean
      required: false
      default: false
    - name: personality
      description: "Personality / system prompt prefix for this agent. Written to SOUL.md on first deploy only."
      type: multi-line
      required: false
    - name: persistence_size
      description: "Persistent volume size (e.g. 1Gi, 500Mi)."
      type: string
      required: false
      default: "1Gi"
    - name: persistence_storage_class
      description: "Storage class for the persistent volume."
      type: k8sStorageClass
      required: false

