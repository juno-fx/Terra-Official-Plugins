apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ .Release.Name }}-terra-metadata"
  labels:
    kuiper.juno-innovations.com/chart: "{{ .Release.Name }}-scripts-configmap"
  annotations:
    juno-innovations.com/workload: "AI Agent"
data:
  chart: "{{ .Release.Name }}-scripts-configmap"
  description: "Hermes AI agent with OpenAI-compatible API"
  fields: |
    - name: icon
      default: "https://raw.githubusercontent.com/NousResearch/hermes-agent/main/assets/banner.png"
    - name: llm_provider_key
      description: "Your OpenRouter API key (https://openrouter.ai/keys). Hermes uses this to call LLMs."
      type: string
      required: true
    - name: api_server_key
      description: "Auth token that other pods use to call the Hermes OpenAI-compatible API at port 8642."
      type: string
      required: true
