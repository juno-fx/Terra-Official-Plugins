apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{ .Release.Name }}"
  labels:
    terra.juno-innovations.com/app: "{{ .Release.Name }}"
spec:
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      terra.juno-innovations.com/app: "{{ .Release.Name }}"
  template:
    metadata:
      name: "{{ .Release.Name }}"
      labels:
        terra.juno-innovations.com/app: "{{ .Release.Name }}"
    spec:
      automountServiceAccountToken: false
      initContainers:
        - name: write-env
          image: busybox
          command:
            - sh
            - -c
            - |
              cat > /opt/data/.env << EOF
              API_SERVER_KEY=${API_SERVER_KEY}
              OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
              GATEWAY_ALLOW_ALL_USERS=true
              EOF
          env:
            - name: API_SERVER_KEY
              value: {{ .Values.api_server_key | quote }}
            - name: OPENROUTER_API_KEY
              value: {{ .Values.llm_provider_key | quote }}
          volumeMounts:
            - name: mount
              mountPath: "/opt/data"
              subPath: {{ .Values.sub_path }}
      containers:
        - name: hermes-agent
          image: nousresearch/hermes-agent:latest
          imagePullPolicy: IfNotPresent
          args: ["gateway", "run"]
          ports:
            - name: api
              containerPort: 8642
              protocol: TCP
          env:
            - name: API_SERVER_HOST
              value: "0.0.0.0"
          resources:
            limits:
              memory: "4Gi"
              cpu: "2000m"
            requests:
              memory: "1Gi"
              cpu: "500m"
          volumeMounts:
            - name: mount
              mountPath: "/opt/data"
              subPath: {{ .Values.sub_path }}
      volumes:
        - name: mount
          persistentVolumeClaim:
            claimName: {{ .Values.install_volume.name }}
