resource_id: "claude-code"
name: "Claude Code - Web Terminal"
icon: ""
description: "Claude Code AI coding agent web terminal powered by wetty"
category: "development"
tags:
  - cluster-level
editable: false
fields:
  - name: registry
    description: "Registry to pull the nginx sidecar image from"
    type: string
    default: "docker.io"
  - name: repo
    description: "Repository to pull the nginx sidecar image from"
    type: string
    default: "nginx"
  - name: tag
    description: "Tag to pull the nginx sidecar image from"
    type: string
    default: "alpine"
  - name: timezone
    description: "Timezone for the instance"
    type: string
    default: "America/New_York"
  - name: storage_class
    description: "Storage class for data disk"
    type: string
  - name: storage_size
    description: "Storage size for data disk"
    type: string
    default: "10Gi"
  - name: env
    description: "Environment variables (e.g. ANTHROPIC_API_KEY)"
    type: list
    fields:
      - name: name
        description: "Variable name"
        type: string
        required: true
      - name: value
        description: "Variable value"
        type: string
        required: true
