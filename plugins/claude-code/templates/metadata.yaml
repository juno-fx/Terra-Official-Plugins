apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ .Release.Name }}-terra-metadata"
  labels:
    kuiper.juno-innovations.com/chart: "{{ .Release.Name }}-scripts-configmap"
  annotations:
    juno-innovations.com/workload: "Terminal"
data:
  chart: "{{ .Release.Name }}-scripts-configmap"
  description: "Claude Code AI coding agent in a web terminal (wetty)"
  fields: |
    - name: icon
      default: "https://raw.githubusercontent.com/juno-fx/Terra-Official-Plugins/refs/heads/main/plugins/claude-code/assets/logo.png"
    - name: nginx_registry
      description: "Registry to pull the nginx sidecar image from"
      type: string
      required: true
      default: "docker.io"
    - name: nginx_repo
      description: "Repository to pull the nginx sidecar image from"
      type: string
      required: true
      default: "nginx"
    - name: nginx_tag
      description: "Tag to pull the nginx sidecar image from"
      type: string
      required: true
      default: "alpine"
    - name: timezone
      description: "Timezone for the claude-code instance"
      type: string
      required: true
      default: "America/New_York"
    - name: storage_class
      description: "Storage class for the persistent /data disk"
      type: k8sStorageClass
      required: false
    - name: storage_size
      description: "Storage size for the persistent /data disk"
      type: string
      required: true
      default: "10Gi"
    - name: publicAccess
      description: "Allow public access (disable authentication)"
      type: boolean
      required: true
      default: false
    - name: cluster_access
      description: "Kubernetes RBAC access level for this agent."
      type: select
      required: false
      default: none
      options:
        - none
        - readonly-ns
        - admin-ns
