apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ .Release.Name }}-terra-metadata"
  labels:
    kuiper.juno-innovations.com/chart: "{{ .Release.Name }}-scripts-configmap"
  annotations:
    juno-innovations.com/workload: "Terminal"
data:
  chart: "{{ .Release.Name }}-scripts-configmap"
  description: "Claude Code AI coding agent in a web terminal (wetty)"
  fields: |
    - name: registry
      description: "Registry to pull the nginx sidecar image from"
      type: string
      required: true
      default: "docker.io"
    - name: repo
      description: "Repository to pull the nginx sidecar image from"
      type: string
      required: true
      default: "nginx"
    - name: tag
      description: "Tag to pull the nginx sidecar image from"
      type: string
      required: true
      default: "alpine"
    - name: timezone
      description: "Timezone for the claude-code instance"
      type: string
      required: true
      default: "America/New_York"
    - name: env
      description: "Environment variables (e.g. ANTHROPIC_API_KEY)"
      type: list
      required: false
      default: []
      fields:
        - name: name
          description: "Environment variable name"
          type: string
          required: true
        - name: value
          description: "Environment variable value"
          type: string
          required: true
