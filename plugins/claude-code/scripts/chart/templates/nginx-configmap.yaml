apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-nginx
  labels:
    kuiper.juno-innovations.com/kuiper-instance: "{{ .Values.name }}"
data:
  default.conf: |
    server {
        listen 8080;
        server_name _;

        location /claude/{{ .Values.name }} {
            proxy_set_header Accept-Encoding "";
            rewrite ^/claude/{{ .Values.name }}(/|$)(.*) /$2 break;
            proxy_pass http://127.0.0.1:{{ .Values.ttyd_port }};
            proxy_http_version 1.1;

            # WebSocket support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Disable buffering for WebSocket/streaming
            proxy_buffering off;
            proxy_cache off;

            # Rewrite asset paths in HTML responses
            sub_filter '/client/' '/claude/{{ .Values.name }}/client/';
            sub_filter_types text/html;
            sub_filter_once off;

            # Long timeout for web terminal sessions
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }
