apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: "{{ .Values.name }}-data"
  labels:
    kuiper.juno-innovations.com/kuiper-instance: "{{ .Values.name }}"
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.storage_class }}
  storageClassName: "{{ .Values.storage_class }}"
  {{- end }}
  resources:
    requests:
      storage: "{{ .Values.storage_size }}"
