apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ .Release.Name }}-tooling"
  labels:
    kuiper.juno-innovations.com/kuiper-instance: "{{ .Values.name }}"
data:
  system.sh: |
    #!/bin/sh
    set -e

    # set noninteractive frontend for apt
    export DEBIAN_FRONTEND=noninteractive

    # update and install packages
    apt update -y
    apt upgrade -y
    apt install make rsync wget curl neofetch psmisc {{ .Values.packages }} -y

    # setup neofetch
    ln -sf /bin/neofetch /bin/fastfetch

    # ensure home directory exists
    if [ ! -d "$HOME" ]; then
      echo "Home directory $HOME does not exist, creating it"
      mkdir -p "$HOME"
      chown abc:abc "$HOME"
    fi

    # clean out defaults
    rm -rfv /config/workspace

    # setup a symlink from /config/data to the users home directory under the vllm-dev-kit folder
    mv /config/data /config/data.bak || true
    mkdir -vp "$HOME/vllm-dev-kit/data"
    ln -sv "$HOME/vllm-dev-kit/data" /config/data

    # apply defaults only if /config/data is empty and a backup exists
    if [ -d /config/data.bak ] && [ -z "$(ls -A /config/data)" ]; then
      echo "/config/data is empty, restoring defaults"
      rsync -a -P --delete /config/data.bak/ /config/data/ || true
    else
      echo "Skipping restore, /config/data already has content or no backup exists."
    fi

    # setup a symlink from /config/extensions to the users home directory under the vllm-dev-kit folder
    mv /config/extensions /config/extensions.bak || true
    mkdir -vp "$HOME/vllm-dev-kit/extensions"
    ln -sv "$HOME/vllm-dev-kit/extensions" /config/extensions

    # apply defaults only if /config/extensions is empty and a backup exists
    if [ -d /config/extensions.bak ] && [ -z "$(ls -A /config/extensions)" ]; then
      echo "/config/extensions is empty, restoring defaults"
      rsync -a -P --delete /config/extensions.bak/ /config/extensions/ || true
    else
      echo "Skipping restore, /config/extensions already has content or no backup exists."
    fi

    # link the /config/workspace to the users home directory under the vllm-dev-kit folder
    mkdir -vp "$HOME/vllm-dev-kit/workspace"
    ln -sv "$HOME/vllm-dev-kit/workspace" /config/workspace

    # set permissions
    chown -R abc:abc "$HOME/vllm-dev-kit"

