apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: "{{ .Release.Name }}"
  annotations:
    juno-innovations.com/workload: "Server"
    kuiper.juno-innovations.com/actions: "restart,stop"
spec:
  replicas: 1
  serviceName: "{{ .Release.Name }}"
  selector:
    matchLabels:
      kuiper.juno-innovations.com/kuiper-instance: "{{ .Release.Name }}"
  template:
    metadata:
      labels:
        kuiper.juno-innovations.com/kuiper-instance: "{{ .Release.Name }}"
      annotations:
        juno-innovations.com/workload: "Server"
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
      {{- if .Values.gpu }}
      runtimeClassName: nvidia
      {{- end }}
      {{- if .Values.pullSecret }}
      imagePullSecrets:
        - name: "{{ .Values.pullSecret }}"
      {{- end }}
      containers:
        - name: vllm
          image: "{{ .Values.registry }}/{{ .Values.repo }}:{{ .Values.tag }}"
          imagePullPolicy: IfNotPresent
          args:
            - "{{ .Values.model }}"
            {{- if .Values.served_model_name }}
            - "--served-model-name={{ .Values.served_model_name }}"
            {{- end }}
            - "--max-model-len={{ .Values.max_model_len }}"
            - "--max-num-batched-tokens={{ .Values.max_num_batched_tokens }}"
            - "--max-num-seqs={{ .Values.max_num_seqs }}"
            - "--gpu-memory-utilization={{ .Values.gpu_memory_utilization }}"
            {{- if .Values.quantization }}
            - "--quantization={{ .Values.quantization }}"
            {{- end }}
            {{- if .Values.enable_prefix_caching }}
            - --enable-prefix-caching
            {{- end }}
            {{- if .Values.enable_auto_tool_choice }}
            - --enable-auto-tool-choice
            {{- end }}
            {{- if .Values.tool_call_parser }}
            - "--tool-call-parser={{ .Values.tool_call_parser }}"
            {{- end }}
            {{- if .Values.reasoning_parser }}
            - "--reasoning-parser={{ .Values.reasoning_parser }}"
            {{- end }}
            - "--uvicorn-log-level=debug"
            - "--host=0.0.0.0"
            - "--port=8001"
          resources:
            requests:
              memory: "{{ .Values.memory }}"
              cpu: "{{ .Values.cpu }}"
            limits:
              {{- if .Values.gpu }}
              nvidia.com/gpu: "{{ .Values.gpu_count }}"
              {{- end }}
              {{- if .Values.cpuLimit }}
              cpu: "{{ .Values.cpuLimit }}"
              {{- end }}
              {{- if .Values.memoryLimit }}
              memory: "{{ .Values.memoryLimit }}"
              {{- end }}
          ports:
            - containerPort: 8001
              name: api
          startupProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 360
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          env:
            - name: HF_HUB_DISABLE_TELEMETRY
              value: "true"
            - name: VLLM_LOGGING_LEVEL
              value: "DEBUG"
            - name: HF_HUB_CACHE
              value: "/models"
            {{- if .Values.hf_token }}
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: "{{ .Release.Name }}-hf-token"
                  key: HF_TOKEN
            {{- end }}
            {{- range .Values.env }}
            - name: {{ .name | quote }}
              value: {{ .value | quote }}
            {{- end }}
          volumeMounts:
            - name: model-cache
              mountPath: /models
            - name: tmp
              mountPath: /tmp
        - name: nginx
          image: nginx:alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: "{{ .Release.Name }}-models"
        - name: tmp
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: {{ .Values.name }}-nginx
