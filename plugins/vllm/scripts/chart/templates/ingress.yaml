apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.name }}-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: {{ .Values.host }}
      http:
        paths:
          - path: "/vllm/{{ .Values.name }}"
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.name }}
                port:
                  number: 8000
