apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: "{{ .Values.name }}"
  labels:
    kuiper.juno-innovations.com/kuiper-instance: "{{ .Values.name }}"
spec:
  replicas: 1

  selector:
    matchLabels:
      kuiper.juno-innovations.com/kuiper-instance: "{{ .Values.name }}"

  template:
    metadata:
      labels:
        kuiper.juno-innovations.com/kuiper-instance: "{{ .Values.name }}"

    spec:
      {{- if .Values.terra_role }}
      serviceAccountName: {{ .Values.terra_role }}
      {{- end }}
      hostname: "{{ .Values.name }}"
      containers:
        - name: nginx
          image: "{{ .Values.nginx_registry }}/{{ .Values.nginx_repo }}:{{ .Values.nginx_tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: nginx
          volumeMounts:
            - name: nginx
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
        - name: wetty
          imagePullPolicy: IfNotPresent
          image: "{{ .Values.registry }}/{{ .Values.repo }}:{{ .Values.tag }}"
          command:
            - /bin/sh
          args:
            - /system.sh
          ports:
            - containerPort: 3000
              name: viewer
          env:
            - name: JUNO_PROJECT
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: JUNO_ENVIRONMENT
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: USER
              value: "{{ .Values.user }}"
            - name: HOME
              value: "/home/{{ .Values.user }}"
            - name: PUID
              value: "{{ .Values.puid }}"
            - name: PGID
              value: "{{ .Values.guid }}"
            - name: WORKSTATION_NAME
              value: "{{ .Values.name }}"
            {{- if .Values.packages }}
            - name: PACKAGES
              value: "{{ .Values.packages }}"
            {{- end }}
            {{- range .Values.env }}
            - name: {{ .name | quote }}
              value: {{ .value | quote }}
            {{- end }}
          volumeMounts:
            - name: tooling
              mountPath: /system.sh
              subPath: system.sh
              readOnly: true
            {{- if .Values.volumeMounts }}
            {{- toYaml .Values.volumeMounts | nindent 12 }}
            {{- end }}
      volumes:
        - name: tooling
          configMap:
            name: "{{ .Values.name }}-tooling"
        - name: nginx
          configMap:
            name: "{{ .Values.name }}-nginx"
        {{- if .Values.volumeMounts }}
        {{- toYaml .Values.volumes | nindent 8 }}
        {{- end }}


