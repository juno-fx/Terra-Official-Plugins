resource_id: wetty
name: wetty
icon: https://raw.githubusercontent.com/juno-fx/Terra-Official-Plugins/refs/heads/main/plugins/wetty/scripts/assets/logo.png
description: Terminal access in browser over http/https
category: Development
compatibility: genesis-deployment>=1.5.0,orion-deployment>=1.5.0
tags:
  - cluster-level
  - development
  - workload
fields: []
# wetty is a plain tmux/bash shell, not an application with its own env vars —
# these are generic shell-session variables useful to anything run in the terminal.
environment_variables:
  - name: TZ
    description: Timezone for the shell session, e.g. "America/New_York".
  - name: EDITOR
    description: Default text editor invoked by CLI tools (e.g. vim, nano).
