apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-terra-metadata
  labels:
    kuiper.juno-innovations.com/chart: "{{ .Release.Name }}-scripts-configmap"
  annotations:
    juno-innovations.com/workload: "Terminal"
data:
  chart: "{{ .Release.Name }}-scripts-configmap"
  description: "Wetty terminal"
  fields: |
    - name: registry
      description: "Registry to pull the image from"
      type: string
      required: true
      default: "wettyoss"
    - name: repo
      description: "Repository to pull the image from"
      type: string
      required: true
      default: "wetty"
    - name: tag
      description: "Tag to pull the image from"
      type: string
      required: true
      default: "2.5"
    - name: icon
      default: "https://raw.githubusercontent.com/juno-fx/Terra-Official-Plugins/refs/heads/main/plugins/wetty/scripts/assets/logo.png"
    - name: packages
      description: Additional packages to install. You can use spaces " " to install multiples.
      required: false
      default: vim
    - name: terra_role
      description: Name of a Terra role to assign to Development Kit. This refers to the plugin level installed roles.
      required: false
      type: k8sServiceAccount
    - name: nginx_registry
      description: "Registry to pull the nginx image from"
      type: string
      required: true
      default: "docker.io"
    - name: nginx_repo
      description: "Repository to pull the nginx image from"
      type: string
      required: true
      default: "nginx"
    - name: nginx_tag
      description: "Tag to pull the nginx image from"
      type: string
      required: true
      default: "1.29.3"
    - name: publicAccess
      description: "Allow public access (disable authentication)"
      type: boolean
      required: true
      default: false
    - name: ingressNamespace
      description: "Namespace of the ingress controller for plugin access"
      type: string
      required: true
      default: "ingress-nginx"
  # wetty is a plain tmux/bash shell, not an application with its own env vars —
  # these are generic shell-session variables useful to anything run in the terminal.
  env_hints: |
    - name: TZ
      description: Timezone for the shell session, e.g. "America/New_York".
    - name: EDITOR
      description: Default text editor invoked by CLI tools (e.g. vim, nano).