apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Release.Name }}-nvidia-gpu-operator
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Release.Name }}-gpu-operator
  sources:
    - repoURL: ${{ .Values.helm_repo }}
      chart: gpu-operator
      targetRevision: {{ .Values.version }}
      helm:
        releaseName: {{ .Release.Name }}-nvidia-gpu-operator
        values: |
          toolkit:
            enabled: true
            {{ if .Values.k3s }}
            env:
              - name: CONTAINERD_SOCKET
                value: /run/k3s/containerd/containerd.sock
              - name: CONTAINERD_CONFIG
                value: /var/lib/rancher/k3s/agent/etc/containerd/config.toml
            {{ end }}
          driver:
            enabled: true
            useOpenKernelModules: {{ .Values.open_kernel_modules }}
            nvidiaDriverCRD:
              enabled: {{ .Values.install_crds }}
          operator:
            cleanupCRD: {{ .Values.install_crds }}
            upgradeCRD: {{ .Values.install_crds }}
          sandboxWorkloads:
            enabled: true
            defaultWorkload: container
          devicePlugin:
            config:
              name: device-plugin-config
              create: true
              default: default
              data:
                default: |-
                  version: v1
                  flags:
                    migStrategy: none
                  sharing:
                    timeSlicing:
                      renameByDefault: false
                      failRequestsGreaterThanOne: false
                      resources:
                        - name: nvidia.com/gpu
                          replicas: {{ .Values.slice_count }}
          nfd:
            enabled: true
          dcgm:
            enabled: {{ .Values.dcgm_enabled }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: true
    syncOptions:
      - CreateNamespace=true
