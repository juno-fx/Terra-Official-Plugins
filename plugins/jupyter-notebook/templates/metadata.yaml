apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-terra-metadata
  labels:
    kuiper.juno-innovations.com/chart: "{{ .Release.Name }}-scripts-configmap"
  annotations:
    juno-innovations.com/workload: "Application"  # mark this as a workload and it's type for the
data:
  chart: "{{ .Release.Name }}-scripts-configmap"
  description: "Jupyter Notebook"
  fields: |
    - name: registry
      description: "Registry to pull the image from"
      type: string
      required: true
      default: "quay.io/jupyter"
    - name: gpu
      description: "Use a GPU"
      type: boolean
      required: true
    - name: repo
      description: "Repository to pull the image from"
      type: string
      required: true
      default: "datascience-notebook"
    - name: tag
      description: "Tag to pull the image from"
      type: string
      required: true
      default: "lab-4.4.9"
    - name: timeslice_config
      description: "Support for for Liqid GPU sharing profiles."
      type: string
      required: false
    - name: product
      description: "GPU product to use if gpu is true"
      type: string
      required: true
    - name: slices
      description: "This is passed to nvidia.com/gpu: <slices> to enable GPU sharing with the specified number of slices or cards."
      type: string
      required: true
    - name: icon
      default: "https://raw.githubusercontent.com/juno-fx/Terra-Official-Plugins/refs/heads/main/plugins/jupyter-notebook/scripts/assets/template-icon.png"
