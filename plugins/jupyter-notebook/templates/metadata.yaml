apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-terra-metadata
  labels:
    kuiper.juno-innovations.com/chart: "{{ .Release.Name }}-scripts-configmap"
  annotations:
    juno-innovations.com/workload: "Application"  # mark this as a workload and it's type for the
data:
  chart: "{{ .Release.Name }}-scripts-configmap"
  description: "Jupyter Notebook"
  fields: |
    - name: registry
      description: "Registry to pull the image from"
      type: string
      required: true
      default: "quay.io/jupyter"
    - name: gpu
      description: "Use a GPU"
      type: boolean
      required: true
    - name: repo
      description: "Repository to pull the image from"
      type: string
      required: true
      default: "datascience-notebook"
    - name: tag
      description: "Tag to pull the image from"
      type: string
      required: true
      default: "lab-4.4.9"
    - name: icon
      default: "https://raw.githubusercontent.com/juno-fx/Terra-Official-Plugins/refs/heads/main/plugins/jupyter-notebook/scripts/assets/template-icon.png"
  env_hints: |
    - name: GRANT_SUDO
      description: Grants the notebook user passwordless sudo, useful for installing OS packages with apt from within the notebook's terminal.
    - name: RESTARTABLE
      description: Runs Jupyter in a restart loop so quitting or a kernel restart doesn't kill the container.
    - name: DOCKER_STACKS_JUPYTER_CMD
      description: Launches a different frontend (notebook, nbclassic, retro) instead of the default JupyterLab.
