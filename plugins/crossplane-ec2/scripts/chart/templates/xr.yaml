apiVersion: crossplane.juno-innovations.com/v1alpha1
kind: EC2Instance
metadata:
  name: {{.Values.name}}-ec2
  namespace: {{.Release.Namespace}}
  annotations:
    kuiper.juno-innovations.com/use-private-dns: "true"
    kuiper.juno-innovations.com/expose: "22"
spec:
  compositionSelector:
    matchLabels:
      kuiper.juno-innovations.com/kuiper-instance: "{{.Values.name}}"
