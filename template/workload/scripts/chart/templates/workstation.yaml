apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: "{{ .Values.name }}"
  annotations:
    # Workload type shown in the Hubble UI — must match the annotation in templates/metadata.yaml.
    juno-innovations.com/workload: "WORKLOAD_TYPE"
  labels:
    app: "{{ .Values.name }}"

spec:
  replicas: 1

  selector:
    matchLabels:
      app: "{{ .Values.name }}"

  template:
    metadata:
      labels:
        app: "{{ .Values.name }}"

    spec:
      automountServiceAccountToken: false
      hostname: "{{ .Values.name }}"

      # Workload nodes must carry the label juno-innovations.com/workstation: "true"
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: juno-innovations.com/workstation
                    operator: In
                    values:
                      - "true"
                  {{- if .Values.selector }}
                  {{- range .Values.selector }}
                  - key: {{ .key | quote }}
                    operator: In
                    values:
                      - {{ .value | quote }}
                  {{- end }}
                  {{- end }}

      tolerations:
        - key: "juno-innovations.com/workstation"
          operator: "Exists"
          effect: "NoSchedule"

      {{- if .Values.gpu }}
      runtimeClassName: nvidia
      {{- end }}

      {{- if .Values.pullSecret }}
      imagePullSecrets:
        - name: "{{ .Values.pullSecret }}"
      {{- end }}

      containers:
        - name: PLUGIN
          imagePullPolicy: IfNotPresent
          image: "{{ .Values.registry }}/{{ .Values.repo }}:{{ .Values.tag }}"
          resources:
            requests:
              memory: "{{ .Values.memory }}"
              cpu: "{{ .Values.cpu }}"
            {{- if or (or .Values.gpu .Values.memoryLimit) .Values.cpuLimit }}
            limits:
              {{- if .Values.gpu }}
              nvidia.com/gpu: "1"
              {{- end }}
              {{- if .Values.cpuLimit }}
              cpu: "{{ .Values.cpuLimit }}"
              {{- end }}
              {{- if .Values.memoryLimit }}
              memory: "{{ .Values.memoryLimit }}"
              {{- end }}
            {{- end }}
          startupProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 5
            failureThreshold: 60
            periodSeconds: 2
          livenessProbe:
            tcpSocket:
              port: 3000
            failureThreshold: 24
            periodSeconds: 5
          ports:
            - containerPort: 3000
              name: viewer
          env:
            - name: JUNO_WORKSTATION
              value: "{{ .Values.name }}"
            - name: JUNO_PROJECT
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: JUNO_ENVIRONMENT
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: USER
              value: "{{ .Values.user }}"
            - name: HOME
              value: "/home/{{ .Values.user }}"
            - name: UID
              value: "{{ .Values.puid }}"
            - name: GID
              value: "{{ .Values.guid }}"
            - name: PREFIX
              value: "/polaris/{{ .Values.name }}/"
            {{- range .Values.env }}
            - name: {{ .name | quote }}
              value: {{ .value | quote }}
            {{- end }}
          volumeMounts:
            - mountPath: /dev/shm
              name: shm
            {{- if .Values.volumeMounts }}
            {{- toYaml .Values.volumeMounts | nindent 12 }}
            {{- end }}
            {{- if .Values.plugins }}
            {{- range .Values.plugins }}
            - name: {{ .name | quote }}
              subPath: {{ .file | quote }}
              mountPath: "/etc/helios/init.d/{{ .name }}/{{ .file }}"
            {{- end }}
            {{- end }}

      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
        {{- if .Values.volumeMounts }}
        {{- toYaml .Values.volumes | nindent 8 }}
        {{- end }}
        {{- if .Values.plugins }}
        {{- range .Values.plugins }}
        - name: {{ .name | quote }}
          configMap:
            name: {{ .config | quote }}
            defaultMode: 0777
        {{- end }}
        {{- end }}
